<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0a0a0a">
<title>Tabelle — WM Tippspiel 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--gold:#ffd700;--red:#cc0000;--green:#16a34a;--orange:#ea580c;--bg:#0a0a0a;--card:#111;--border:#2a2a2a;--text:#ddd;--muted:#888}
html{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column}
/* SCROLLBARS */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#1a1a1a}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
*{scrollbar-width:thin;scrollbar-color:var(--gold) #1a1a1a}
/* HEADER */
.g-hdr{background:#0d0d0d;border-bottom:3px solid var(--gold);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:sticky;top:0;z-index:200;flex-shrink:0}
.g-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.g-flag{width:26px;height:17px;display:flex;flex-direction:column;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
.g-flag s{flex:1;display:block}
.g-brand-text h1{font-size:12px;font-weight:700;color:#fff;line-height:1.2}
.g-brand-text p{font-size:9px;color:var(--gold)}
/* NAV */
.g-nav{display:flex;align-items:center;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.g-nav::-webkit-scrollbar{display:none}
.g-nav a{display:flex;align-items:center;gap:4px;color:var(--muted);font-size:11px;padding:6px 9px;border-radius:5px;text-decoration:none;border:1px solid transparent;white-space:nowrap;flex-shrink:0;transition:color .15s,border-color .15s,background .15s;-webkit-user-select:none;user-select:none}
.g-nav a:hover{color:#fff;border-color:var(--border);background:#1a1a1a}
.g-nav a.active{color:var(--gold);border-color:var(--gold);background:#1a1200}
.g-nav-div{width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 1px}
/* USER AREA */
.g-user{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px}
.g-login-btn{background:var(--gold);color:#000;border:none;padding:6px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.g-user-name{font-size:11px;color:#ddd;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.g-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.g-avatar-ph{width:26px;height:26px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;flex-shrink:0}
/* MOBILE NAV (bottom bar) */
.g-mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:2px solid var(--gold);z-index:300;padding:4px 0 env(safe-area-inset-bottom,0)}
.g-mobile-nav-inner{display:flex;justify-content:space-around}
.g-mobile-nav a{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 4px;color:var(--muted);text-decoration:none;font-size:9px;min-width:52px;transition:color .15s}
.g-mobile-nav a.active{color:var(--gold)}
.g-mobile-nav a span:first-child{font-size:18px;line-height:1}
/* MOBILE BODY PADDING */
.g-content{flex:1}
@media(max-width:700px){
  .g-nav{display:none}
  .g-mobile-nav{display:block}
  .g-content{padding-bottom:calc(60px + env(safe-area-inset-bottom,0))}
  .g-brand-text p{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header class="g-hdr" role="banner">
  <a class="g-brand" href="/">
    <div class="g-flag"><s style="background:#000"></s><s style="background:var(--red)"></s><s style="background:var(--gold)"></s></div>
    <div class="g-brand-text"><h1>Fanclub Manelo98</h1><p>WM Tippspiel 2026</p></div>
  </a>
  <nav class="g-nav" aria-label="Hauptnavigation" id="gNav"></nav>
  <div class="g-user" id="gUser">
    <button class="g-login-btn" onclick="location.href='/login.html'">Anmelden</button>
  </div>
</header>

<nav class="g-mobile-nav" aria-label="Mobile Navigation">
  <div class="g-mobile-nav-inner" id="gMobNav"></div>
</nav>

<div class="g-content">

<style>
.t-head{background:linear-gradient(180deg,#0d0d0d,#0a0a0a);padding:10px 12px 8px;border-bottom:1px solid #1a1a1a;text-align:center}
.t-eye{font-size:8px;letter-spacing:4px;color:#cc0000;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.t-h{font-size:clamp(14px,3vw,20px);font-weight:900;color:#fff}
.t-h span{color:#ffd700}
.t-inner{max-width:700px;margin:0 auto;padding:12px}
.t-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.t-stat{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:10px;text-align:center}
.t-stat-v{font-size:22px;font-weight:900;color:#ffd700}
.t-stat-l{font-size:10px;color:#888;margin-top:2px}
.t-podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:16px;padding:16px}
.t-pod{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;max-width:160px}
.t-pod-av{border-radius:50%;object-fit:cover;border:3px solid #2a2a2a}
.t-pod-av-ph{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#000;border:3px solid #2a2a2a;flex-shrink:0}
.t-pod-name{font-size:12px;font-weight:700;color:#ddd;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-pod-pts{font-size:18px;font-weight:900;color:#ffd700}
.t-pod-bar{width:100%;border-radius:6px 6px 0 0}
.t-pod-pos{font-size:20px}
.t-list{background:#111;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden}
.t-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #1a1a1a;transition:background .15s}
.t-row:last-child{border-bottom:none}
.t-row:hover{background:#1a1a1a}
.t-pos{font-size:14px;font-weight:700;color:#888;width:24px;text-align:center;flex-shrink:0}
.t-av{width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0}
.t-av-ph{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#000;flex-shrink:0}
.t-name{flex:1;font-size:14px;font-weight:600;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.t-sub{font-size:10px;color:#666}
.t-pts{font-size:16px;font-weight:900;color:#ffd700;text-align:right;flex-shrink:0}
.t-bar-w{width:80px;background:#1a1a1a;border-radius:4px;overflow:hidden;flex-shrink:0}
.t-bar{height:6px;border-radius:4px;transition:width .3s}
.t-empty{text-align:center;padding:60px 20px;color:#888}
.t-empty-icon{font-size:48px;margin-bottom:12px}
@media(max-width:600px){.t-stats{grid-template-columns:repeat(2,1fr)}.t-bar-w{display:none}.t-pod-pts{font-size:14px}}
</style>

<div class="t-head">
  <div class="t-eye">Fanclub Manelo98</div>
  <div class="t-h">RANGLISTE <span>/ TABELLE</span></div>
</div>
<div class="t-inner" id="tContent">
  <div style="text-align:center;padding:40px;color:#888">⏳ Wird geladen…</div>
</div>

<script>
const COLORS2=['#e74c3c','#e67e22','#2ecc71','#3498db','#9b59b6','#1abc9c','#f39c12'];
function avatarColor2(n){let h=0;for(let c of n)h=((h<<5)-h)+c.charCodeAt(0);return COLORS2[Math.abs(h)%COLORS2.length];}
function initials2(n){return(n||'?').split(/[\s_]/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';}

function av(r,w=32,h=32){
  const col=avatarColor2(r.username);
  const ini=initials2(r.username);
  return r.avatar
    ?`<img class="t-av" src="${r.avatar}" alt="${r.username}" width="${w}" height="${h}" style="width:${w}px;height:${h}px">`
    :`<div class="t-av-ph" style="background:${col};width:${w}px;height:${h}px">${ini}</div>`;
}

function renderTable(rankings, matches, user){
  const el=document.getElementById('tContent');
  if(!user){
    el.innerHTML=`<div class="t-empty">
      <div class="t-empty-icon">🔒</div>
      <h3 style="color:#ddd;margin-bottom:8px">Nur für Mitspieler</h3>
      <p style="margin-bottom:16px">Melde dich an um die Rangliste zu sehen.</p>
      <a href="/login.html" style="background:#ffd700;color:#000;padding:10px 22px;border-radius:8px;font-size:14px;font-weight:700;text-decoration:none;display:inline-block">Anmelden</a>
    </div>`;
    return;
  }
  if(!rankings||!rankings.length){
    el.innerHTML=`<div class="t-empty"><div class="t-empty-icon">🏆</div><h3 style="color:#ddd;margin-bottom:8px">Noch keine Punkte</h3><p>Die Rangliste erscheint nach dem ersten gewerteten Spiel.</p></div>`;
    return;
  }

  const total=matches?matches.length:104;
  const done=matches?matches.filter(m=>m.status==='done').length:0;
  const max=Math.max(...rankings.map(r=>r.points),1);

  let html=`<div class="t-stats">
    <div class="t-stat"><div class="t-stat-v">${done}</div><div class="t-stat-l">Gespielt</div></div>
    <div class="t-stat"><div class="t-stat-v">${total-done}</div><div class="t-stat-l">Noch offen</div></div>
    <div class="t-stat"><div class="t-stat-v">${total}</div><div class="t-stat-l">Spiele gesamt</div></div>
    <div class="t-stat"><div class="t-stat-v">${rankings.length}</div><div class="t-stat-l">Mitspieler</div></div>
  </div>`;

  // Podium top 3
  if(rankings.length>=1){
    const ORDER=rankings.length>=3?[1,0,2]:rankings.length===2?[0,1]:[0];
    const HEIGHTS=[120,150,100];
    const BORDERS=['#aaa','#ffd700','#cd7f32'];
    const SIZES=[48,60,44];
    const POSES=['🥈','🥇','🥉'];
    html+=`<div class="t-podium">`;
    ORDER.forEach(i=>{
      if(!rankings[i])return;
      const r=rankings[i];
      const h=HEIGHTS[i]||100,border=BORDERS[i]||'#aaa',sz=SIZES[i]||40,pos=POSES[i]||`${i+1}.`;
      const col=avatarColor2(r.username);
      html+=`<div class="t-pod" style="margin-bottom:${i===0?0:i===1?0:0}px">
        <div class="t-pod-pos">${pos}</div>
        ${r.avatar?`<img class="t-pod-av" src="${r.avatar}" alt="${r.username}" style="width:${sz}px;height:${sz}px;border-color:${border}">`
          :`<div class="t-pod-av-ph" style="background:${col};width:${sz}px;height:${sz}px;font-size:${sz/3}px;border-color:${border}">${initials2(r.username)}</div>`}
        <div class="t-pod-name" style="max-width:${sz+40}px" title="${r.username}">${r.username}</div>
        <div class="t-pod-pts">${r.points} Pkt</div>
        <div class="t-pod-bar" style="height:${h}px;background:${col}22;border:1px solid ${col}44;border-bottom:none"></div>
      </div>`;
    });
    html+=`</div>`;
  }

  // Full list
  html+=`<div class="t-list">`;
  rankings.forEach((r,i)=>{
    const col=avatarColor2(r.username);
    const pct=Math.round(r.points/max*100);
    html+=`<div class="t-row">
      <div class="t-pos" style="color:${i===0?'#ffd700':i===1?'#aaa':i===2?'#cd7f32':'#555'}">${i+1}.</div>
      ${av(r)}
      <div style="flex:1;min-width:0">
        <div class="t-name">${r.username}</div>
        <div class="t-sub">${r.evaluated||0} Tipps gewertet${r.wm_tip?` · WM-Tipp: ${r.wm_tip}`:''}</div>
      </div>
      <div class="t-bar-w"><div class="t-bar" style="width:${pct}%;background:${col}"></div></div>
      <div class="t-pts">${r.points} Pkt</div>
    </div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

let tUser=null;

async function loadAll(){
  const[uD,rD,mD]=await Promise.all([
    fetch('/api/me',{credentials:'include'}).then(r=>r.ok?r.json():null).catch(()=>null),
    fetch('/api/rankings',{credentials:'include'}).then(r=>r.ok?r.json():[]).catch(()=>[]),
    fetch('/api/matches',{credentials:'include'}).then(r=>r.ok?r.json():[]).catch(()=>[]),
  ]);
  tUser=uD;
  renderTable(rD,mD,tUser);
}

function onUserLoaded(u){tUser=u;} // extra update from shared header
loadAll();
setInterval(loadAll,60000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)loadAll()});
</script>
</div>

<script>
const G_PAGES=[
  {id:'index',label:'Start',icon:'🏠',url:'/'},
  {id:'spielplan',label:'Spielplan/Tipps',icon:'⚽',url:'/spielplan.html'},
  {id:'spielbaum',label:'Spielbaum',icon:'🌳',url:'/spielbaum.html'},
  {id:'tabelle',label:'Tabelle',icon:'🏆',url:'/tabelle.html'},
  {id:'auswertung',label:'Auswertung',icon:'📊',url:'/auswertung.html'},
  {id:'profil',label:'Profil',icon:'👤',url:'/profil.html'},
];
// Admin page added after user check
const G_CURRENT='tabelle';

// Build desktop nav
const nav=document.getElementById('gNav');
G_PAGES.forEach((p,i)=>{
  if(i>0){const d=document.createElement('div');d.className='g-nav-div';nav.appendChild(d);}
  const a=document.createElement('a');
  a.href=p.url;a.textContent=p.icon+' '+p.label;
  if(p.id===G_CURRENT)a.className='active';
  nav.appendChild(a);
});

// Build mobile nav
const mob=document.getElementById('gMobNav');
G_PAGES.forEach(p=>{
  const a=document.createElement('a');
  a.href=p.url;
  a.innerHTML=`<span>${p.icon}</span><span>${p.label}</span>`;
  if(p.id===G_CURRENT)a.className='active';
  mob.appendChild(a);
});

// Load user session
(async()=>{
  try{
    const r=await fetch('/api/me',{credentials:'include'});
    if(r.ok){
      const u=await r.json();
      const el=document.getElementById('gUser');
      const initials=u.username.slice(0,2).toUpperCase();
      const col=['#e74c3c','#e67e22','#2ecc71','#3498db','#9b59b6'][u.username.charCodeAt(0)%5];
      el.innerHTML=`${u.avatar?`<img class="g-avatar" src="${u.avatar}" alt="${u.username}">`:`<div class="g-avatar-ph" style="background:${col}">${initials}</div>`}<span class="g-user-name">${u.username}</span>`;
      // Check admin
      try{
        const ar=await fetch('/api/admin/check',{credentials:'include'});
        if(ar.ok){
          const aa=await ar.json();
          if(aa.is_admin){
            const nav=document.getElementById('gNav');
            const mob=document.getElementById('gMobNav');
            const div=document.createElement('div');div.className='g-nav-div';nav.appendChild(div);
            const a=document.createElement('a');
            a.textContent='🔧 Admin';
            a.href='/';
            a.onclick=(e)=>{e.preventDefault();window._goAdmin=true;location.href='/';}
            nav.appendChild(a);
            const ma=document.createElement('a');ma.href='/';ma.innerHTML='<span>🔧</span><span>Admin</span>';
            ma.onclick=a.onclick;mob.appendChild(ma);
          }
        }
      }catch{}
      if(typeof onUserLoaded==='function')onUserLoaded(u);
    } else {
      if(typeof onUserLoaded==='function')onUserLoaded(null);
    }
  }catch{if(typeof onUserLoaded==='function')onUserLoaded(null);}
})();
</script>
