<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0a0a0a">
<title>Kader — WM Tippspiel 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--gold:#ffd700;--red:#cc0000;--green:#16a34a;--orange:#ea580c;--bg:#0a0a0a;--card:#111;--border:#2a2a2a;--text:#ddd;--muted:#888}
html{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#1a1a1a}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
*{scrollbar-width:thin;scrollbar-color:var(--gold) #1a1a1a}
/* HEADER */
.g-hdr{background:#0d0d0d;border-bottom:3px solid var(--gold);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:sticky;top:0;z-index:200;flex-shrink:0}
.g-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.g-flag{width:26px;height:17px;display:flex;flex-direction:column;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
.g-flag s{flex:1;display:block}
.g-brand-text h1{font-size:12px;font-weight:700;color:#fff;line-height:1.2}
.g-brand-text p{font-size:9px;color:var(--gold)}
.g-nav{display:flex;align-items:center;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.g-nav::-webkit-scrollbar{display:none}
.g-nav a{display:flex;align-items:center;gap:4px;color:var(--muted);font-size:11px;padding:6px 9px;border-radius:5px;text-decoration:none;border:1px solid transparent;white-space:nowrap;flex-shrink:0;transition:color .15s,border-color .15s,background .15s;-webkit-user-select:none;user-select:none}
.g-nav a:hover{color:#fff;border-color:var(--border);background:#1a1a1a}
.g-nav a.active{color:var(--gold);border-color:var(--gold);background:#1a1200}
.g-nav-div{width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 1px}
.g-user{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px}
.g-login-btn{background:var(--gold);color:#000;border:none;padding:6px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.g-user-name{font-size:11px;color:#ddd;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.g-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.g-avatar-ph{width:26px;height:26px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;flex-shrink:0}
.g-mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:2px solid var(--gold);z-index:300;padding:4px 0 env(safe-area-inset-bottom,0)}
.g-mobile-nav-inner{display:flex;justify-content:space-around}
.g-mobile-nav a{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 4px;color:var(--muted);text-decoration:none;font-size:9px;min-width:52px;transition:color .15s}
.g-mobile-nav a.active{color:var(--gold)}
.g-mobile-nav a span:first-child{font-size:18px;line-height:1}
.g-content{flex:1}
@media(max-width:700px){
  .g-nav{display:none}
  .g-mobile-nav{display:block}
  .g-content{padding-bottom:calc(60px + env(safe-area-inset-bottom,0))}
  .g-brand-text p{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* PAGE STYLES */
.k-head{background:linear-gradient(180deg,#0d0d0d,#0a0a0a);padding:10px 12px 8px;border-bottom:1px solid #1a1a1a;text-align:center}
.k-eye{font-size:8px;letter-spacing:4px;color:#cc0000;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.k-h{font-size:clamp(14px,3vw,20px);font-weight:900;color:#fff}
.k-h span{color:#ffd700}
.k-sub{font-size:11px;color:#666;margin-top:3px}

.k-wrap{max-width:900px;margin:0 auto;padding:16px 12px 32px}

/* SEARCH + FILTER */
.k-controls{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.k-search{flex:1;min-width:200px;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:10px 14px;color:#ddd;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;-webkit-appearance:none}
.k-search:focus{border-color:var(--gold)}
.k-search::placeholder{color:#555}
.k-group-select{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:10px 14px;color:#ddd;font-size:13px;font-family:inherit;outline:none;cursor:pointer;transition:border-color .15s;-webkit-appearance:none}
.k-group-select:focus{border-color:var(--gold)}

/* TEAM GRID */
.k-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:24px}
.k-team-card{background:#111;border:1px solid #2a2a2a;border-radius:10px;padding:14px 12px;cursor:pointer;transition:border-color .2s,background .2s,transform .15s;text-align:center;-webkit-user-select:none;user-select:none;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.k-team-card:hover{border-color:var(--gold);background:#1a1200;transform:translateY(-2px)}
.k-team-card:active{transform:scale(0.97);background:#1a1200;border-color:var(--gold)}
.k-team-card.active{border-color:var(--gold);background:#1a1200}
.k-team-flag{width:56px;height:38px;margin:0 auto 8px;border-radius:4px;overflow:hidden;border:1px solid #2a2a2a}
.k-team-name{font-size:12px;font-weight:700;color:#ddd}
.k-team-group{font-size:10px;color:#666;margin-top:2px}

/* KADER PANEL */
.k-panel{background:#111;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden;margin-bottom:16px;display:none}
.k-panel.visible{display:block}
.k-panel-head{background:#0d0d0d;border-bottom:1px solid #2a2a2a;padding:14px 16px;display:flex;align-items:center;gap:12px}
.k-panel-flag{width:64px;height:43px;border-radius:4px;overflow:hidden;border:1px solid #333;flex-shrink:0}
.k-panel-info{flex:1}
.k-panel-country{font-size:18px;font-weight:900;color:#fff}
.k-panel-meta{font-size:11px;color:#666;margin-top:2px}
.k-panel-close{background:none;border:1px solid #333;color:#888;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s,color .15s}
.k-panel-close:hover{border-color:#666;color:#ddd}

/* POSITIONS */
.k-pos-section{padding:12px 16px;border-bottom:1px solid #1a1a1a}
.k-pos-section:last-child{border-bottom:none}
.k-pos-label{font-size:10px;font-weight:700;letter-spacing:2px;color:#555;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.k-pos-label::after{content:'';flex:1;height:1px;background:#1a1a1a}
.k-player-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.k-player{display:flex;align-items:center;gap:10px;padding:8px 10px;background:#0d0d0d;border-radius:6px;border:1px solid #1a1a1a;transition:border-color .15s}
.k-player:hover{border-color:#2a2a2a}
.k-player-nr{font-size:13px;font-weight:700;color:#555;width:20px;text-align:center;flex-shrink:0}
.k-player-info{flex:1;min-width:0}
.k-player-name{font-size:13px;font-weight:600;color:#ddd;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-player-club{font-size:10px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-player-age{font-size:11px;color:#555;flex-shrink:0}
.k-cap{font-size:9px;color:#ffd700;font-weight:700;margin-left:4px}

/* LOADING / EMPTY */
.k-loading{text-align:center;padding:40px;color:#666;font-size:13px}
.k-empty{text-align:center;padding:32px;color:#666;font-size:13px}
.k-info-banner{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#666;display:flex;gap:8px;align-items:center}

/* Tablet (768px) */
@media(max-width:768px){
  .k-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
  .k-player-list{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .k-panel-head{padding:12px}
  .k-panel-country{font-size:16px}
}
/* Smartphone (480px) */
@media(max-width:480px){
  .k-wrap{padding:10px 8px 24px}
  .k-grid{grid-template-columns:repeat(3,1fr);gap:6px}
  .k-team-card{padding:10px 6px}
  .k-team-flag{width:44px;height:30px}
  .k-team-name{font-size:11px}
  .k-team-group{font-size:9px}
  .k-controls{flex-direction:column;gap:6px}
  .k-search{min-width:unset;font-size:16px}
  .k-group-select{width:100%;font-size:16px}
  .k-player-list{grid-template-columns:1fr}
  .k-player{padding:8px}
  .k-player-name{font-size:12px}
  .k-player-club{font-size:9px}
  .k-player-age{font-size:10px}
  .k-player-nr{font-size:12px;width:18px}
  .k-panel-head{padding:10px 12px;gap:10px}
  .k-panel-flag{width:52px;height:35px}
  .k-panel-country{font-size:15px}
  .k-panel-meta{font-size:10px}
  .k-panel-close{width:28px;height:28px;font-size:14px}
  .k-pos-section{padding:10px 12px}
  .k-pos-label{font-size:9px}
  .k-info-banner{font-size:11px;padding:10px 12px}
}
/* Sehr kleine Screens (360px) */
@media(max-width:360px){
  .k-grid{grid-template-columns:repeat(2,1fr)}
  .k-team-flag{width:40px;height:27px}
}
</style>
</head>

// Für Teams ohne detaillierten Kader — Platzhalter
function getSquad(id) {
  return SQUADS[id] || null;
}

// ============================================================
// RENDER
// ============================================================
let activeTeam = null;

function renderGrid(filter = '', groupFilter = '') {
  const grid = document.getElementById('kGrid');
  const filtered = TEAMS.filter(t => {
    const matchName = t.name.toLowerCase().includes(filter.toLowerCase());
    const matchGroup = !groupFilter || t.group === groupFilter;
    return matchName && matchGroup;
  });

  if (!filtered.length) {
    grid.innerHTML = `<div class="k-empty" style="grid-column:1/-1">Keine Teams gefunden.</div>`;
    return;
  }

  grid.innerHTML = filtered.map(t => `
    <div class="k-team-card${activeTeam === t.id ? ' active' : ''}" onclick="showTeam('${t.id}')" data-id="${t.id}">
      <div class="k-team-flag"><img src="https://flagicons.lipis.dev/flags/4x3/${t.cc}.svg" alt="${t.name}" loading="lazy" onerror="this.style.display='none'"></div>
      <div class="k-team-name">${t.name}</div>
      <div class="k-team-group">Gruppe ${t.group} · ${t.confed}</div>
    </div>
  `).join('');
}

function showTeam(id) {
  const team = TEAMS.find(t => t.id === id);
  if (!team) return;
  activeTeam = id;

  // Update active state
  document.querySelectorAll('.k-team-card').forEach(c => {
    c.classList.toggle('active', c.dataset.id === id);
  });

  const panel = document.getElementById('kPanel');
  const squad = getSquad(id);

  // Scroll to panel
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});

  if (!squad) {
    panel.className = 'k-panel visible';
    panel.innerHTML = `
      <div class="k-panel-head">
        <div class="k-panel-flag"><img src="https://flagicons.lipis.dev/flags/4x3/${team.cc}.svg" alt="${team.name}" loading="lazy"></div>
        <div class="k-panel-info">
          <div class="k-panel-country">${team.name}</div>
          <div class="k-panel-meta">Gruppe ${team.group} · ${team.confed}</div>
        </div>
        <button class="k-panel-close" onclick="closePanel()">✕</button>
      </div>
      <div class="k-loading">⏳ Kader wird noch bekanntgegeben…</div>
    `;
    return;
  }

  const posLabels = {
    tor: '🧤 Tor',
    abwehr: '🛡️ Abwehr',
    mittelfeld: '⚙️ Mittelfeld',
    sturm: '⚡ Sturm'
  };

  let html = `
    <div class="k-panel-head">
      <div class="k-panel-flag"><img src="https://flagicons.lipis.dev/flags/4x3/${team.cc}.svg" alt="${team.name}" loading="lazy"></div>
      <div class="k-panel-info">
        <div class="k-panel-country">${team.name}</div>
        <div class="k-panel-meta">Gruppe ${team.group} · ${team.confed} · Trainer: ${squad.trainer}</div>
      </div>
      <button class="k-panel-close" onclick="closePanel()">✕</button>
    </div>
  `;

  ['tor','abwehr','mittelfeld','sturm'].forEach(pos => {
    const players = squad[pos];
    if (!players || !players.length) return;
    html += `
      <div class="k-pos-section">
        <div class="k-pos-label">${posLabels[pos]}</div>
        <div class="k-player-list">
          ${players.map(p => `
            <div class="k-player">
              <div class="k-player-nr">${p[0]}</div>
              <div class="k-player-info">
                <div class="k-player-name">${p[1]}${p[4] ? ' <span class="k-cap">©</span>' : ''}</div>
                <div class="k-player-club">${p[2]}</div>
              </div>
              <div class="k-player-age">${p[3]}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  });

  panel.className = 'k-panel visible';
  panel.innerHTML = html;
}

function closePanel() {
  activeTeam = null;
  document.getElementById('kPanel').className = 'k-panel';
  document.querySelectorAll('.k-team-card').forEach(c => c.classList.remove('active'));
}

// Init
renderGrid();

// Search + Filter
document.getElementById('kSearch').addEventListener('input', e => {
  renderGrid(e.target.value, document.getElementById('kGroupFilter').value);
});
document.getElementById('kGroupFilter').addEventListener('change', e => {
  renderGrid(document.getElementById('kSearch').value, e.target.value);
});
</script>

<script>
const G_PAGES=[
  {id:'index',label:'Start',icon:'🏠',url:'/'},
  {id:'spielplan',label:'Spielplan/Tipps',icon:'⚽',url:'/spielplan.html'},
  {id:'spielbaum',label:'Spielbaum',icon:'🌳',url:'/spielbaum.html'},
  {id:'tabelle',label:'Tabelle',icon:'🏆',url:'/tabelle.html'},
  {id:'auswertung',label:'Auswertung',icon:'📊',url:'/auswertung.html'},
  {id:'kader',label:'Kader',icon:'👕',url:'/kader.html'},
  {id:'profil',label:'Profil',icon:'👤',url:'/profil.html'},
];
const G_CURRENT='kader';

const nav=document.getElementById('gNav');
G_PAGES.forEach((p,i)=>{
  if(i>0){const d=document.createElement('div');d.className='g-nav-div';nav.appendChild(d);}
  const a=document.createElement('a');
  a.href=p.url;a.textContent=p.icon+' '+p.label;
  if(p.id===G_CURRENT)a.className='active';
  nav.appendChild(a);
});

const mob=document.getElementById('gMobNav');
G_PAGES.forEach(p=>{
  const a=document.createElement('a');
  a.href=p.url;
  a.innerHTML=`<span>${p.icon}</span><span>${p.label}</span>`;
  if(p.id===G_CURRENT)a.className='active';
  mob.appendChild(a);
});

(async()=>{
  try{
    const r=await fetch('/api/me',{credentials:'include'});
    if(r.ok){
      const u=await r.json();
      const el=document.getElementById('gUser');
      const initials=u.username.slice(0,2).toUpperCase();
      const col=['#e74c3c','#e67e22','#2ecc71','#3498db','#9b59b6'][u.username.charCodeAt(0)%5];
      el.innerHTML=`${u.avatar?`<img class="g-avatar" src="${u.avatar}" alt="${u.username}">`:`<div class="g-avatar-ph" style="background:${col}">${initials}</div>`}<span class="g-user-name">${u.username}</span>`;
      try{
        const ar=await fetch('/api/admin/check',{credentials:'include'});
        if(ar.ok){
          const aa=await ar.json();
          if(aa.is_admin){
            const nav=document.getElementById('gNav');
            const mob=document.getElementById('gMobNav');
            const div=document.createElement('div');div.className='g-nav-div';nav.appendChild(div);
            const a=document.createElement('a');a.textContent='🔧 Admin';a.href='/';
            a.onclick=(e)=>{e.preventDefault();window._goAdmin=true;location.href='/';};
            nav.appendChild(a);
            const ma=document.createElement('a');ma.href='/';ma.innerHTML='<span>🔧</span><span>Admin</span>';
            ma.onclick=a.onclick;mob.appendChild(ma);
          }
        }
      }catch{}
    }
  }catch{}
})();
</script>
