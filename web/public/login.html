<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0a0a0a">
<title>Anmelden — WM Tippspiel 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--gold:#ffd700;--red:#cc0000;--green:#16a34a;--orange:#ea580c;--bg:#0a0a0a;--card:#111;--border:#2a2a2a;--text:#ddd;--muted:#888}
html{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column}
/* SCROLLBARS */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#1a1a1a}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
*{scrollbar-width:thin;scrollbar-color:var(--gold) #1a1a1a}
/* HEADER */
.g-hdr{background:#0d0d0d;border-bottom:3px solid var(--gold);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:sticky;top:0;z-index:200;flex-shrink:0}
.g-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.g-flag{width:26px;height:17px;display:flex;flex-direction:column;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
.g-flag s{flex:1;display:block}
.g-brand-text h1{font-size:12px;font-weight:700;color:#fff;line-height:1.2}
.g-brand-text p{font-size:9px;color:var(--gold)}
/* NAV */
.g-nav{display:flex;align-items:center;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.g-nav::-webkit-scrollbar{display:none}
.g-nav a{display:flex;align-items:center;gap:4px;color:var(--muted);font-size:11px;padding:6px 9px;border-radius:5px;text-decoration:none;border:1px solid transparent;white-space:nowrap;flex-shrink:0;transition:color .15s,border-color .15s,background .15s;-webkit-user-select:none;user-select:none}
.g-nav a:hover{color:#fff;border-color:var(--border);background:#1a1a1a}
.g-nav a.active{color:var(--gold);border-color:var(--gold);background:#1a1200}
.g-nav-div{width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 1px}
/* USER AREA */
.g-user{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px}
.g-login-btn{background:var(--gold);color:#000;border:none;padding:6px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.g-user-name{font-size:11px;color:#ddd;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.g-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.g-avatar-ph{width:26px;height:26px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;flex-shrink:0}
/* MOBILE NAV (bottom bar) */
.g-mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:2px solid var(--gold);z-index:300;padding:4px 0 env(safe-area-inset-bottom,0)}
.g-mobile-nav-inner{display:flex;justify-content:space-around}
.g-mobile-nav a{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 4px;color:var(--muted);text-decoration:none;font-size:9px;min-width:52px;transition:color .15s}
.g-mobile-nav a.active{color:var(--gold)}
.g-mobile-nav a span:first-child{font-size:18px;line-height:1}
/* MOBILE BODY PADDING */
.g-content{flex:1}
@media(max-width:700px){
  .g-nav{display:none}
  .g-mobile-nav{display:block}
  .g-content{padding-bottom:calc(60px + env(safe-area-inset-bottom,0))}
  .g-brand-text p{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header class="g-hdr" role="banner">
  <a class="g-brand" href="/">
    <div class="g-flag"><s style="background:#000"></s><s style="background:var(--red)"></s><s style="background:var(--gold)"></s></div>
    <div class="g-brand-text"><h1>Fanclub Manelo98</h1><p>WM Tippspiel 2026</p></div>
  </a>
  <nav class="g-nav" aria-label="Hauptnavigation" id="gNav"></nav>
  <div class="g-user" id="gUser">
    <button class="g-login-btn" onclick="location.href='/login.html'">Anmelden</button>
  </div>
</header>

<nav class="g-mobile-nav" aria-label="Mobile Navigation">
  <div class="g-mobile-nav-inner" id="gMobNav"></div>
</nav>

<div class="g-content">

<style>
.l-wrap{max-width:440px;margin:0 auto;padding:20px 16px 40px}
/* CARD */
.l-card{background:#111;border:1px solid #2a2a2a;border-radius:14px;overflow:hidden}
.l-card-hero{background:linear-gradient(180deg,#1a1200,#0d0d0d);padding:24px 20px 20px;text-align:center;border-bottom:2px solid #ffd700}
.l-flag{width:48px;height:32px;display:flex;flex-direction:column;border-radius:5px;overflow:hidden;border:1px solid rgba(255,255,255,.2);margin:0 auto 12px}
.l-flag s{flex:1;display:block}
.l-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:3px}
.l-title span{color:#ffd700}
.l-sub{font-size:12px;color:#888}
/* TABS */
.l-tabs{display:flex;border-bottom:1px solid #2a2a2a}
.l-tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:600;color:#888;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.l-tab.on{color:#ffd700;border-bottom-color:#ffd700}
/* FORM */
.l-body{padding:20px}
.l-discord-btn{width:100%;background:#5865F2;color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:16px;transition:opacity .2s}
.l-discord-btn:hover{opacity:.9}
.l-divider{display:flex;align-items:center;gap:10px;margin-bottom:16px;color:#555;font-size:12px}
.l-divider::before,.l-divider::after{content:'';flex:1;height:1px;background:#2a2a2a}
.l-label{display:block;font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.l-input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;color:#ddd;padding:11px 14px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:14px;-webkit-appearance:none}
.l-input:focus{border-color:#ffd700}
.l-pw-wrap{position:relative;margin-bottom:14px}
.l-pw-wrap .l-input{margin-bottom:0;padding-right:44px}
.l-pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#888;cursor:pointer;font-size:18px;padding:4px;font-family:inherit}
.l-submit{width:100%;background:#ffd700;color:#000;border:none;padding:13px;border-radius:8px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;transition:opacity .2s;margin-top:4px}
.l-submit:hover{opacity:.9}
.l-submit:disabled{opacity:.5;cursor:default}
.l-err{background:#2a0000;border:1px solid #cc0000;color:#ff6666;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.l-ok{background:#0d2a0d;border:1px solid #16a34a;color:#4ade80;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none}
.l-hint{text-align:center;font-size:12px;color:#555;margin-top:12px}
.l-hint a{color:#ffd700;text-decoration:none}
.l-forgot{text-align:right;margin-top:-10px;margin-bottom:14px}
.l-forgot a{font-size:12px;color:#888;text-decoration:none}
.l-forgot a:hover{color:#ffd700}
.l-discord-info{background:#1a1c3a;border:1px solid #5865F2;border-radius:8px;padding:10px 14px;font-size:12px;color:#a5b4fc;margin-bottom:16px;line-height:1.5}
@media(max-width:500px){
  .l-wrap{padding:12px 10px 80px}
  .l-card{border-radius:10px}
  .l-body{padding:16px}
  .l-title{font-size:18px}
}
</style>

<div class="l-wrap">
  <div class="l-card">
    <div class="l-card-hero">
      <div class="l-flag">
        <s style="background:#000"></s>
        <s style="background:#cc0000"></s>
        <s style="background:#ffd700"></s>
      </div>
      <div class="l-title">Fanclub <span>Manelo98</span></div>
      <div class="l-sub">WM Tippspiel 2026</div>
    </div>

    <div class="l-tabs">
      <button class="l-tab on" id="tabLogin" onclick="switchTab('login')">Anmelden</button>
      <button class="l-tab" id="tabReg" onclick="switchTab('register')">Registrieren</button>
    </div>

    <!-- LOGIN -->
    <div class="l-body" id="loginForm">
      <button class="l-discord-btn" onclick="doDiscord()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Mit Discord anmelden
      </button>
      <div class="l-discord-info">💬 Bei Discord-Login wird dein Discord-Name als Anzeigename verwendet — automatisch und privat.</div>
      <div class="l-divider">oder mit E-Mail</div>
      <div class="l-err" id="loginErr"></div>
      <div class="l-ok" id="loginOk"></div>
      <label class="l-label">E-Mail-Adresse</label>
      <input class="l-input" id="loginEmail" type="email" placeholder="name@beispiel.de" autocomplete="email" inputmode="email">
      <label class="l-label">Passwort</label>
      <div class="l-pw-wrap">
        <input class="l-input" id="loginPw" type="password" placeholder="Dein Passwort" autocomplete="current-password">
        <button class="l-pw-eye" onclick="togglePw('loginPw',this)" type="button" aria-label="Passwort anzeigen">👁</button>
      </div>
      <div class="l-forgot"><a href="#">Passwort vergessen?</a></div>
      <button class="l-submit" id="loginBtn" onclick="doLogin()">Anmelden</button>
      <div class="l-hint">Noch kein Konto? <a onclick="switchTab('register')">Registrieren</a></div>
    </div>

    <!-- REGISTER -->
    <div class="l-body" id="regForm" style="display:none">
      <div class="l-err" id="regErr"></div>
      <div class="l-ok" id="regOk"></div>
      <label class="l-label">Anzeigename</label>
      <input class="l-input" id="regName" type="text" placeholder="Dein Name im Fanclub" autocomplete="username" maxlength="30">
      <label class="l-label">E-Mail-Adresse</label>
      <input class="l-input" id="regEmail" type="email" placeholder="name@beispiel.de" autocomplete="email" inputmode="email">
      <label class="l-label">Passwort (min. 8 Zeichen)</label>
      <div class="l-pw-wrap">
        <input class="l-input" id="regPw" type="password" placeholder="Sicheres Passwort wählen" autocomplete="new-password">
        <button class="l-pw-eye" onclick="togglePw('regPw',this)" type="button" aria-label="Passwort anzeigen">👁</button>
      </div>
      <label class="l-label">Passwort bestätigen</label>
      <div class="l-pw-wrap">
        <input class="l-input" id="regPw2" type="password" placeholder="Passwort wiederholen" autocomplete="new-password">
        <button class="l-pw-eye" onclick="togglePw('regPw2',this)" type="button" aria-label="Passwort anzeigen">👁</button>
      </div>
      <button class="l-submit" id="regBtn" onclick="doRegister()">Konto erstellen</button>
      <div class="l-hint">Bereits registriert? <a onclick="switchTab('login')">Anmelden</a></div>
    </div>
  </div>
</div>

<script>
function onUserLoaded(u){if(u)location.href='/';}

function switchTab(t){
  const isLogin=t==='login';
  document.getElementById('tabLogin').className='l-tab'+(isLogin?' on':'');
  document.getElementById('tabReg').className='l-tab'+(isLogin?'':' on');
  document.getElementById('loginForm').style.display=isLogin?'block':'none';
  document.getElementById('regForm').style.display=isLogin?'none':'block';
}

function togglePw(id,btn){
  const inp=document.getElementById(id);
  const show=inp.type==='password';
  inp.type=show?'text':'password';
  btn.textContent=show?'🙈':'👁';
}

function showErr(id,msg){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=msg;el.style.display='block';
  document.getElementById(id.replace('Err','Ok')).style.display='none';
}
function showOk(id,msg){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=msg;el.style.display='block';
  document.getElementById(id.replace('Ok','Err')).style.display='none';
}

function doDiscord(){location.href='/auth/discord';}

async function doLogin(){
  const btn=document.getElementById('loginBtn');
  const email=document.getElementById('loginEmail').value.trim();
  const pw=document.getElementById('loginPw').value;
  if(!email||!pw){showErr('loginErr','Bitte alle Felder ausfüllen.');return;}
  btn.disabled=true;btn.textContent='Wird angemeldet…';
  try{
    const r=await fetch('/api/login',{method:'POST',credentials:'include',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pw})});
    if(r.ok){
      showOk('loginOk','✅ Erfolgreich angemeldet! Weiterleitung…');
      setTimeout(()=>location.href='/',800);
    }else{
      const d=await r.json().catch(()=>({}));
      showErr('loginErr',d.detail||'E-Mail oder Passwort falsch.');
      btn.disabled=false;btn.textContent='Anmelden';
    }
  }catch(e){
    showErr('loginErr','Netzwerkfehler. Bitte erneut versuchen.');
    btn.disabled=false;btn.textContent='Anmelden';
  }
}

// Allow Enter key
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const lf=document.getElementById('loginForm');
  const rf=document.getElementById('regForm');
  if(lf&&lf.style.display!=='none')doLogin();
  else if(rf&&rf.style.display!=='none')doRegister();
});

async function doRegister(){
  const btn=document.getElementById('regBtn');
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const pw=document.getElementById('regPw').value;
  const pw2=document.getElementById('regPw2').value;
  if(!name||!email||!pw){showErr('regErr','Bitte alle Felder ausfüllen.');return;}
  if(name.length<2){showErr('regErr','Name muss mindestens 2 Zeichen haben.');return;}
  if(pw.length<8){showErr('regErr','Passwort muss mindestens 8 Zeichen haben.');return;}
  if(pw!==pw2){showErr('regErr','Passwörter stimmen nicht überein.');return;}
  btn.disabled=true;btn.textContent='Konto wird erstellt…';
  try{
    const r=await fetch('/api/register',{method:'POST',credentials:'include',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({username:name,email,password:pw})});
    if(r.ok){
      showOk('regOk','✅ Konto erstellt! Du kannst dich jetzt anmelden.');
      setTimeout(()=>switchTab('login'),1500);
    }else{
      const d=await r.json().catch(()=>({}));
      showErr('regErr',d.detail||'Registrierung fehlgeschlagen.');
    }
    btn.disabled=false;btn.textContent='Konto erstellen';
  }catch(e){
    showErr('regErr','Netzwerkfehler. Bitte erneut versuchen.');
    btn.disabled=false;btn.textContent='Konto erstellen';
  }
}
</script>
</div>

<script>
const G_PAGES=[
  {id:'index',label:'Start',icon:'🏠',url:'/'},
  {id:'spielplan',label:'Spielplan/Tipps',icon:'⚽',url:'/spielplan.html'},
  {id:'spielbaum',label:'Spielbaum',icon:'🌳',url:'/spielbaum.html'},
  {id:'tabelle',label:'Tabelle',icon:'🏆',url:'/tabelle.html'},
  {id:'auswertung',label:'Auswertung',icon:'📊',url:'/auswertung.html'},
  {id:'profil',label:'Profil',icon:'👤',url:'/profil.html'},
];
// Admin page added after user check
const G_CURRENT='login';

// Build desktop nav
const nav=document.getElementById('gNav');
G_PAGES.forEach((p,i)=>{
  if(i>0){const d=document.createElement('div');d.className='g-nav-div';nav.appendChild(d);}
  const a=document.createElement('a');
  a.href=p.url;a.textContent=p.icon+' '+p.label;
  if(p.id===G_CURRENT)a.className='active';
  nav.appendChild(a);
});

// Build mobile nav
const mob=document.getElementById('gMobNav');
G_PAGES.forEach(p=>{
  const a=document.createElement('a');
  a.href=p.url;
  a.innerHTML=`<span>${p.icon}</span><span>${p.label}</span>`;
  if(p.id===G_CURRENT)a.className='active';
  mob.appendChild(a);
});

// Load user session
(async()=>{
  try{
    const r=await fetch('/api/me',{credentials:'include'});
    if(r.ok){
      const u=await r.json();
      const el=document.getElementById('gUser');
      const initials=u.username.slice(0,2).toUpperCase();
      const col=['#e74c3c','#e67e22','#2ecc71','#3498db','#9b59b6'][u.username.charCodeAt(0)%5];
      el.innerHTML=`${u.avatar?`<img class="g-avatar" src="${u.avatar}" alt="${u.username}">`:`<div class="g-avatar-ph" style="background:${col}">${initials}</div>`}<span class="g-user-name">${u.username}</span>`;
      // Check admin
      try{
        const ar=await fetch('/api/admin/check',{credentials:'include'});
        if(ar.ok){
          const aa=await ar.json();
          if(aa.is_admin){
            const nav=document.getElementById('gNav');
            const mob=document.getElementById('gMobNav');
            const div=document.createElement('div');div.className='g-nav-div';nav.appendChild(div);
            const a=document.createElement('a');
            a.textContent='🔧 Admin';
            a.href='/';
            a.onclick=(e)=>{e.preventDefault();window._goAdmin=true;location.href='/';}
            nav.appendChild(a);
            const ma=document.createElement('a');ma.href='/';ma.innerHTML='<span>🔧</span><span>Admin</span>';
            ma.onclick=a.onclick;mob.appendChild(ma);
          }
        }
      }catch{}
      if(typeof onUserLoaded==='function')onUserLoaded(u);
    } else {
      if(typeof onUserLoaded==='function')onUserLoaded(null);
    }
  }catch{if(typeof onUserLoaded==='function')onUserLoaded(null);}
})();
</script>
