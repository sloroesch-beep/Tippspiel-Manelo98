<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM 2026 Spielbaum — Fanclub Manelo98</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#ffd700;--red:#cc0000;--dark:#111;--darker:#0a0a0a;--border:#2a2a2a;--green:#16a34a;--orange:#ea580c;}
html,body{background:var(--darker);color:#ddd;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;}

.hdr{background:#0d0d0d;border-bottom:3px solid var(--gold);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.hdr-l{display:flex;align-items:center;gap:10px;}
.hdr-flag{width:30px;height:20px;display:flex;flex-direction:column;border-radius:3px;overflow:hidden;border:1px solid rgba(255,255,255,.15);}
.hdr-flag div{flex:1;}
.hdr h1{font-size:13px;font-weight:700;color:#fff;}
.hdr p{font-size:10px;color:var(--gold);}
.hdr-back{background:#1a1a1a;border:1px solid var(--border);color:var(--gold);padding:7px 14px;border-radius:6px;font-size:12px;font-weight:600;text-decoration:none;}

.pg-head{text-align:center;padding:14px 16px 10px;border-bottom:1px solid #1a1a1a;}
.pg-eye{font-size:9px;letter-spacing:4px;color:var(--red);font-weight:700;text-transform:uppercase;margin-bottom:3px;}
.pg-head h2{font-size:clamp(16px,4vw,24px);font-weight:900;color:#fff;}
.pg-head h2 span{color:var(--gold);}
.pg-head p{color:#444;font-size:11px;margin-top:3px;}
.tri{display:flex;justify-content:center;margin-top:7px;}
.tri span{width:40px;height:3px;}

.legend{display:none;flex-wrap:wrap;gap:12px;align-items:center;padding:7px 16px;background:#0d0d0d;border-bottom:1px solid #1a1a1a;font-size:10px;}
.leg-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:3px;}

/* ── MATCH CARD ── */
.mc{background:#111;border:1px solid var(--border);border-radius:5px;overflow:hidden;width:150px;flex-shrink:0;}
.mc-row{display:flex;align-items:center;gap:4px;padding:4px 6px;border-bottom:1px solid #1a1a1a;}
.mc-row:last-of-type{border-bottom:none;}
.mc-row.win{background:#0d1a0d;}
.mc-tip{font-size:8px;text-align:center;padding:2px 0;border-top:1px solid #1a1a1a;}
.mc img{width:20px;height:13px;object-fit:cover;border-radius:2px;flex-shrink:0;}
.mc-ph{width:20px;height:13px;background:#2a2a2a;border-radius:2px;flex-shrink:0;}
.mc-name{flex:1;font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mc-score{font-size:10px;font-weight:700;min-width:12px;text-align:right;}

/* ── GRUPPE CARD ── */
.gc{background:#111;border:1px solid var(--border);border-radius:7px;overflow:hidden;width:210px;flex-shrink:0;}
.gc-head{background:linear-gradient(135deg,#1a1200,#0d0d0d);border-bottom:2px solid var(--gold);padding:5px 8px;display:flex;align-items:center;justify-content:space-between;}
.gc-name{font-size:10px;font-weight:800;color:var(--gold);letter-spacing:1px;}
.gc-flags{display:flex;gap:2px;}
.gc table{width:100%;border-collapse:collapse;font-size:9px;}
.gc th{background:#0a0a0a;padding:2px 5px;color:#444;text-align:left;}
.gc td{padding:2px 5px;border-bottom:1px solid #161616;vertical-align:middle;}
.gc-spiele{background:#0a0a0a;border-top:1px solid #1a1a1a;}
.gs{display:flex;align-items:center;gap:3px;padding:2px 5px;border-bottom:1px solid #0d0d0d;font-size:8px;}
.gs-date{color:#444;width:28px;flex-shrink:0;}
.gs-home{flex:1;text-align:right;color:#777;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gs-sc{width:34px;text-align:center;font-weight:700;flex-shrink:0;}
.gs-away{flex:1;color:#777;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── FINALE ── */
.fin{background:linear-gradient(180deg,#1a1200,#0d0d0d);border:2px solid var(--gold);border-radius:10px;padding:12px;text-align:center;width:185px;flex-shrink:0;}
.fin-lbl{font-size:8px;letter-spacing:3px;color:var(--gold);font-weight:800;margin-bottom:4px;}
.fin-date{font-size:8px;color:#444;margin-bottom:8px;}
.fin-card{background:#0d0d0d;border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-bottom:7px;}
.fin-row{display:flex;align-items:center;gap:5px;padding:5px 8px;border-bottom:1px solid #1a1a1a;}
.fin-row:last-child{border-bottom:none;}
.fin-row.win{background:#0d1a0d;}
.fin-team{flex:1;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.fin-sc{font-size:13px;font-weight:800;color:var(--gold);}
.fin-winner{background:var(--gold);color:#000;padding:6px;border-radius:5px;font-size:10px;font-weight:900;}
.fin-tbd{border:1px dashed var(--gold);color:var(--gold);padding:6px;border-radius:5px;font-size:8px;letter-spacing:1px;}
.p3-box{margin-top:8px;padding-top:7px;border-top:1px solid #1a1a1a;font-size:8px;}
.p3-lbl{color:#444;margin-bottom:2px;}
.p3-teams{color:#666;margin-bottom:1px;}
.p3-sc{font-weight:700;color:var(--gold);}

/* ── KO COLUMN LABEL ── */
.ko-lbl{font-size:7px;font-weight:800;color:var(--gold);letter-spacing:2px;text-align:center;margin-bottom:5px;text-transform:uppercase;white-space:nowrap;}

/* ── DESKTOP BRACKET ── */
/* Uses a table-like structure with fixed row heights */
.bracket-wrap{overflow-x:auto;overflow-y:visible;padding:12px 16px 16px;
  scrollbar-width:thin;scrollbar-color:var(--gold) #1a1a1a;}
.bracket-wrap::-webkit-scrollbar{height:8px;}
.bracket-wrap::-webkit-scrollbar-track{background:#1a1a1a;border-radius:4px;}
.bracket-wrap::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px;}

.bracket{display:flex;align-items:stretch;gap:0;}
.b-col{display:flex;flex-direction:column;flex-shrink:0;}
.b-sep{width:6px;flex-shrink:0;}
.b-sep-lg{width:10px;flex-shrink:0;}

/* Each KO column uses flex to space cards evenly */
.b-ko{display:flex;flex-direction:column;justify-content:space-around;flex-shrink:0;width:154px;}
.b-ko-top{display:flex;flex-direction:column;justify-content:flex-start;gap:5px;flex-shrink:0;width:154px;}
.b-fin{display:flex;align-items:center;justify-content:center;flex-shrink:0;}

/* ── MOBILE ── */
.mob{display:none;padding:10px;}
.mob-runde{background:#111;border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden;}
.mob-head{background:linear-gradient(135deg,#1a1200,#0d0d0d);border-bottom:2px solid var(--gold);padding:8px 12px;display:flex;justify-content:space-between;align-items:center;}
.mob-head h3{font-size:12px;font-weight:700;color:var(--gold);}
.mob-head span{font-size:10px;color:#555;}
.mob-body{padding:8px;display:flex;flex-wrap:wrap;gap:6px;}
.mob-gc-grid{padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;}

/* ── RESPONSIVE ── */
@media(min-width:1400px){
  .bracket-wrap{display:block;}
  .mob{display:none;}
}
@media(min-width:900px) and (max-width:1399px){
  .bracket-wrap{display:block;}
  .mob{display:none;}
}
@media(max-width:899px){
  .bracket-wrap{display:none!important;}
  .mob{display:block!important;}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="hdr-flag">
      <div style="background:#000;"></div>
      <div style="background:var(--red);"></div>
      <div style="background:var(--gold);"></div>
    </div>
    <div><h1>Fanclub Manelo98</h1><p>WM Tippspiel 2026</p></div>
  </div>
  <a class="hdr-back" href="/">← Zurück</a>
</div>

<div class="pg-head">
  <div class="pg-eye">Fanclub Manelo98</div>
  <h2>FUSSBALL WM 2026 <span>— SPIELBAUM</span></h2>
  <p>Alle 104 Spiele · Gruppenphase · K.O.-Runde · Finale</p>
  <div class="tri">
    <span style="background:#000;border:1px solid #222;"></span>
    <span style="background:var(--red);"></span>
    <span style="background:var(--gold);"></span>
  </div>
</div>

<div class="legend" id="leg">
  <span style="color:#888;">Deine Tipps:</span>
  <span><span class="leg-dot" style="background:var(--green);"></span><span style="color:var(--green);">✅ Exakt (3 Pkt)</span></span>
  <span><span class="leg-dot" style="background:var(--orange);"></span><span style="color:var(--orange);">🟠 Tendenz (1 Pkt)</span></span>
  <span><span class="leg-dot" style="background:var(--red);"></span><span style="color:var(--red);">❌ Falsch (0 Pkt)</span></span>
</div>

<div class="bracket-wrap" id="bracketWrap"></div>
<div class="mob" id="mobView"></div>

<script>
const FLAGS={'Mexiko':'mx','Suedafrika':'za','Suedkorea':'kr','Tschechien':'cz','Kanada':'ca','Bosnien-Herzegowina':'ba','Katar':'qa','Schweiz':'ch','Brasilien':'br','Marokko':'ma','Haiti':'ht','Schottland':'gb-sct','USA':'us','Paraguay':'py','Australien':'au','Tuerkei':'tr','Deutschland':'de','Curacao':'cw','Elfenbeinkueste':'ci','Ecuador':'ec','Niederlande':'nl','Japan':'jp','Schweden':'se','Tunesien':'tn','Belgien':'be','Aegypten':'eg','Iran':'ir','Neuseeland':'nz','Spanien':'es','Kap Verde':'cv','Saudi-Arabien':'sa','Uruguay':'uy','Frankreich':'fr','Senegal':'sn','Irak':'iq','Norwegen':'no','Argentinien':'ar','Algerien':'dz','Oesterreich':'at','Jordanien':'jo','Portugal':'pt','DR Kongo':'cd','Usbekistan':'uz','Kolumbien':'co','England':'gb-eng','Kroatien':'hr','Ghana':'gh','Panama':'pa'};
let M=[],T={},U=null;

async function api(url){try{const r=await fetch(url,{credentials:'include'});if(!r.ok)return null;return r.json();}catch{return null;}}
function byG(g){return M.filter(m=>m.group===g).sort((a,b)=>a.id-b.id);}
function fl(t,w=20,h=13){const c=FLAGS[t];if(!c||!t)return`<span class="mc-ph" style="width:${w}px;height:${h}px;"></span>`;return`<img style="width:${w}px;height:${h}px;object-fit:cover;border-radius:2px;flex-shrink:0;" src="https://flagcdn.com/w40/${c}.png" alt="${t}" onerror="this.style.opacity=0">`;}
function sc(m){if(!m)return'–:–';if(m.status==='done'&&m.home_score!==null)return`${m.home_score}:${m.away_score}`;if(m.status==='live'&&m.home_score!==null)return`🔴 ${m.home_score}:${m.away_score}`;return'–:–';}
function tipCol(m){if(!U)return null;const t=T[m.id];if(!t||t.home===undefined)return null;if(t.points===3)return'#16a34a';if(t.points===1)return'#ea580c';if(t.points===0)return'#cc0000';return null;}

function mc(m,w=150){
  if(!m)return`<div style="width:${w}px;height:46px;border:1px dashed #2a2a2a;border-radius:5px;background:#0d0d0d;flex-shrink:0;"></div>`;
  const dn=m.status==='done'&&m.home_score!==null,lv=m.status==='live'&&m.home_score!==null;
  const hs=dn||lv?m.home_score:null,as=dn||lv?m.away_score:null;
  const hw=dn&&hs>as,aw=dn&&as>hs;
  const col=tipCol(m),bc=col||(lv?'#cc0000':dn?'#ffd700':'#2a2a2a');
  const t=U?T[m.id]:null;
  const tip=t&&t.home!==undefined&&col?`<div class="mc-tip" style="color:${col};">${t.points===3?'✅':t.points===1?'🟠':'❌'} ${t.home}:${t.away}</div>`:'';
  return`<div class="mc" style="width:${w}px;border-color:${bc};">
    <div class="mc-row${hw?' win':''}">
      ${fl(m.home)}<span class="mc-name" style="color:${hw?'#ffd700':'#ccc'};font-weight:${hw?700:400};">${m.home||'?'}</span>
      <span class="mc-score" style="color:${hw?'#ffd700':'#555'};">${hs!==null?hs:''}</span>
    </div>
    <div class="mc-row${aw?' win':''}">
      ${fl(m.away)}<span class="mc-name" style="color:${aw?'#ffd700':'#ccc'};font-weight:${aw?700:400};">${m.away||'?'}</span>
      <span class="mc-score" style="color:${aw?'#ffd700':'#555'};">${as!==null?as:''}</span>
    </div>
    ${tip}
  </div>`;
}

function gcCard(g){
  const sp=byG(g);
  if(!sp.length)return`<div class="gc"><div class="gc-head"><span class="gc-name">GRUPPE ${g}</span></div></div>`;
  const teams=[...new Set([...sp.map(m=>m.home),...sp.map(m=>m.away)])];
  const st={};teams.forEach(t=>{st[t]={pts:0,gd:0,gf:0,sp:0};});
  sp.filter(m=>m.status==='done'&&m.home_score!==null).forEach(m=>{
    st[m.home].sp++;st[m.away].sp++;
    st[m.home].gf+=m.home_score;st[m.home].gd+=m.home_score-m.away_score;
    st[m.away].gf+=m.away_score;st[m.away].gd+=m.away_score-m.home_score;
    if(m.home_score>m.away_score)st[m.home].pts+=3;
    else if(m.home_score<m.away_score)st[m.away].pts+=3;
    else{st[m.home].pts++;st[m.away].pts++;}
  });
  const srt=[...teams].sort((a,b)=>st[b].pts-st[a].pts||st[b].gd-st[a].gd||st[b].gf-st[a].gf);
  const tRows=srt.map((t,i)=>`<tr><td style="color:${i<2?'#ffd700':'#555'};text-align:center;width:14px;">${i+1}</td><td style="width:22px;">${fl(t,17,11)}</td><td style="max-width:75px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#bbb;">${t}</td><td style="text-align:center;color:#555;">${st[t].sp}</td><td style="text-align:center;color:${i<2?'#ffd700':'#888'};font-weight:700;">${st[t].pts}</td></tr>`).join('');
  const sRows=sp.map(m=>{
    const col=tipCol(m);const t2=U?T[m.id]:null;
    return`<div class="gs" style="${col?`background:${col}15;`:''}">
      <span class="gs-date">${(m.date||'').slice(0,6)}</span>
      <span class="gs-home">${m.home}</span>
      <span class="gs-sc" style="color:${m.status==='done'?'#ffd700':'#333'};">${sc(m)}</span>
      <span class="gs-away">${m.away}</span>
      ${U&&t2&&t2.home!==undefined?`<span style="font-size:8px;width:14px;text-align:right;flex-shrink:0;color:${col||'#555'};">${t2.points===3?'✅':t2.points===1?'🟠':t2.points===0?'❌':''}</span>`:'<span style="width:14px;"></span>'}
    </div>`;
  }).join('');
  return`<div class="gc"><div class="gc-head"><span class="gc-name">GRUPPE ${g}</span><div class="gc-flags">${teams.slice(0,4).map(t=>fl(t,17,11)).join('')}</div></div>
    <table><thead><tr><th style="width:14px;">#</th><th style="width:22px;"></th><th>Team</th><th style="text-align:center;">Sp</th><th style="text-align:center;">Pkt</th></tr></thead><tbody>${tRows}</tbody></table>
    <div class="gc-spiele">${sRows}</div></div>`;
}

function finCard(){
  const fin=M.find(m=>m.group==='FIN'),p3=M.find(m=>m.group==='P3');
  const dn=fin&&fin.status==='done'&&fin.home_score!==null;
  const w=dn?(fin.home_score>fin.away_score?fin.home:fin.away):'';
  return`<div class="fin">
    <div class="fin-lbl">🏆 FINALE</div>
    <div class="fin-date">19. Juli 2026 · New York/New Jersey</div>
    ${fin?`<div class="fin-card">
      <div class="fin-row${dn&&fin.home_score>fin.away_score?' win':''}">${fl(fin.home,22,15)}<span class="fin-team">${fin.home||'?'}</span><span class="fin-sc">${dn?fin.home_score:''}</span></div>
      <div class="fin-row${dn&&fin.away_score>fin.home_score?' win':''}">${fl(fin.away,22,15)}<span class="fin-team">${fin.away||'?'}</span><span class="fin-sc">${dn?fin.away_score:''}</span></div>
    </div>${dn?`<div class="fin-winner">🏆 Weltmeister: ${w}</div>`:`<div class="fin-tbd">WELTMEISTER 2026</div>`}`:`<div style="color:#333;padding:10px;font-size:11px;">Ausstehend</div>`}
    ${p3?`<div class="p3-box"><div class="p3-lbl">🥉 Platz 3 · 18. Juli</div><div class="p3-teams">${p3.home||'?'} – ${p3.away||'?'}</div><div class="p3-sc">${sc(p3)}</div></div>`:''}
  </div>`;
}

function buildBracket(){
  const sf=byG('SF'),af=byG('AF'),vf=byG('VF'),hf=byG('HF');
  const sfL=sf.slice(0,8),sfR=sf.slice(8);
  const afL=af.slice(0,4),afR=af.slice(4);
  const vfL=vf.slice(0,2),vfR=vf.slice(2);
  const hfL=hf.slice(0,1),hfR=hf.slice(1);
  const gL=['A','B','C','D','E','F'],gR=['G','H','I','J','K','L'];

  // Build using a flex row with each column using justify-content:space-around
  // so cards are evenly distributed vertically matching the SF column height

  function koColAround(items,w=150){
    return`<div style="display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:4px;">${items.map(m=>mc(m,w)).join('')}</div>`;
  }

  function koColTop(items,w=150){
    return`<div style="display:flex;flex-direction:column;justify-content:flex-start;gap:5px;">${items.map(m=>mc(m,w)).join('')}</div>`;
  }

  // Wrapper for each column with label
  function col(label,inner,width){
    return`<div style="flex-shrink:0;width:${width}px;display:flex;flex-direction:column;">
      <div class="ko-lbl">${label}</div>
      ${inner}
    </div>`;
  }

  const SEP=`<div style="width:6px;flex-shrink:0;"></div>`;
  const SEP_LG=`<div style="width:10px;flex-shrink:0;"></div>`;

  // The bracket uses stretch alignment so all columns are same height
  return`<div style="display:flex;align-items:stretch;gap:0;min-height:600px;">

    <!-- GRUPPEN LINKS -->
    <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
      ${gL.map(g=>gcCard(g)).join('')}
    </div>
    ${SEP_LG}

    <!-- SF LINKS: 8 Spiele, top-aligned -->
    ${col('Sechzehntelfinale', koColTop(sfL,150), 150)}
    ${SEP}

    <!-- AF LINKS: 4 Spiele, space-around -->
    ${col('Achtelfinale', koColAround(afL,150), 150)}
    ${SEP}

    <!-- VF LINKS: 2 Spiele, space-around -->
    ${col('Viertelfinale', koColAround(vfL,150), 150)}
    ${SEP}

    <!-- HF LINKS: 1 Spiel, space-around -->
    ${col('Halbfinale', koColAround(hfL,150), 150)}
    ${SEP_LG}

    <!-- FINALE MITTE -->
    <div style="flex-shrink:0;display:flex;align-items:center;justify-content:center;">${finCard()}</div>
    ${SEP_LG}

    <!-- HF RECHTS -->
    ${col('Halbfinale', koColAround(hfR,150), 150)}
    ${SEP}

    <!-- VF RECHTS -->
    ${col('Viertelfinale', koColAround(vfR,150), 150)}
    ${SEP}

    <!-- AF RECHTS -->
    ${col('Achtelfinale', koColAround(afR,150), 150)}
    ${SEP}

    <!-- SF RECHTS -->
    ${col('Sechzehntelfinale', koColTop(sfR,150), 150)}
    ${SEP_LG}

    <!-- GRUPPEN RECHTS -->
    <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
      ${gR.map(g=>gcCard(g)).join('')}
    </div>
  </div>`;
}

function buildMobile(){
  const sf=byG('SF'),af=byG('AF'),vf=byG('VF'),hf=byG('HF'),p3=byG('P3');
  const fin=M.find(m=>m.group==='FIN');
  const dn=fin&&fin.status==='done'&&fin.home_score!==null;
  const w=dn?(fin.home_score>fin.away_score?fin.home:fin.away):'';

  let h=`<div style="background:#111;border:2px solid #ffd700;border-radius:10px;padding:14px;text-align:center;margin-bottom:12px;">
    <div style="font-size:9px;letter-spacing:3px;color:#ffd700;font-weight:800;margin-bottom:6px;">🏆 FINALE · 19. Juli 2026</div>
    ${fin?`<div style="background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;overflow:hidden;margin-bottom:8px;max-width:300px;margin:0 auto 8px;">
      <div style="display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid #1a1a1a;${dn&&fin.home_score>fin.away_score?'background:#0d1a0d;':''}">${fl(fin.home,24,16)}<span style="flex:1;font-size:12px;color:#ddd;">${fin.home||'?'}</span><span style="font-size:15px;font-weight:800;color:#ffd700;">${dn?fin.home_score:''}</span></div>
      <div style="display:flex;align-items:center;gap:6px;padding:7px 10px;${dn&&fin.away_score>fin.home_score?'background:#0d1a0d;':''}">${fl(fin.away,24,16)}<span style="flex:1;font-size:12px;color:#ddd;">${fin.away||'?'}</span><span style="font-size:15px;font-weight:800;color:#ffd700;">${dn?fin.away_score:''}</span></div>
    </div>
    ${dn?`<div style="background:#ffd700;color:#000;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:900;display:inline-block;">🏆 Weltmeister: ${w}</div>`:`<div style="border:1px dashed #ffd700;color:#ffd700;padding:7px 14px;border-radius:6px;font-size:10px;display:inline-block;">WELTMEISTER 2026</div>`}`
    :`<div style="color:#333;">Ausstehend</div>`}
  </div>`;

  const rounds=[
    [p3,'🥉 Platz 3','18. Juli'],
    [hf,'Halbfinale','14.–15. Juli'],
    [vf,'Viertelfinale','9.–11. Juli'],
    [af,'Achtelfinale','4.–8. Juli'],
    [sf,'Sechzehntelfinale','28. Juni – 4. Juli'],
  ];
  rounds.forEach(([items,lbl,dt])=>{
    if(!items||!items.length)return;
    h+=`<div class="mob-runde"><div class="mob-head"><h3>${lbl}</h3><span>${dt}</span></div><div class="mob-body">${items.map(m=>mc(m,155)).join('')}</div></div>`;
  });

  h+=`<div class="mob-runde"><div class="mob-head"><h3>📋 Gruppenphase</h3><span>11. Juni – 28. Juni</span></div><div class="mob-gc-grid">${'ABCDEFGHIJKL'.split('').map(g=>gcCard(g)).join('')}</div></div>`;
  return h;
}

async function loadAndRender(){
  const [mD,tD,uD]=await Promise.all([api('/api/matches'),api('/api/tips'),api('/api/me')]);
  if(mD)M=mD;
  if(uD){U=uD;document.getElementById('leg').style.display='flex';}
  if(tD)T=tD;
  document.getElementById('bracketWrap').innerHTML=buildBracket();
  document.getElementById('mobView').innerHTML=buildMobile();
}

loadAndRender();

// Auto-refresh alle 30s
setInterval(async()=>{
  const [mD,tD]=await Promise.all([api('/api/matches'),api('/api/tips')]);
  if(mD)M=mD;if(tD)T=tD;
  document.getElementById('bracketWrap').innerHTML=buildBracket();
  document.getElementById('mobView').innerHTML=buildMobile();
},30000);

// Refresh wenn Tab wieder aktiv
document.addEventListener('visibilitychange',()=>{if(!document.hidden)loadAndRender();});
</script>
