<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0a0a0a">
<title>Mein Profil — WM Tippspiel 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--gold:#ffd700;--red:#cc0000;--green:#16a34a;--orange:#ea580c;--bg:#0a0a0a;--card:#111;--border:#2a2a2a;--text:#ddd;--muted:#888}
html{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column}
/* SCROLLBARS */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#1a1a1a}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
*{scrollbar-width:thin;scrollbar-color:var(--gold) #1a1a1a}
/* HEADER */
.g-hdr{background:#0d0d0d;border-bottom:3px solid var(--gold);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:sticky;top:0;z-index:200;flex-shrink:0}
.g-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.g-flag{width:26px;height:17px;display:flex;flex-direction:column;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
.g-flag s{flex:1;display:block}
.g-brand-text h1{font-size:12px;font-weight:700;color:#fff;line-height:1.2}
.g-brand-text p{font-size:9px;color:var(--gold)}
/* NAV */
.g-nav{display:flex;align-items:center;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.g-nav::-webkit-scrollbar{display:none}
.g-nav a{display:flex;align-items:center;gap:4px;color:var(--muted);font-size:11px;padding:6px 9px;border-radius:5px;text-decoration:none;border:1px solid transparent;white-space:nowrap;flex-shrink:0;transition:color .15s,border-color .15s,background .15s;-webkit-user-select:none;user-select:none}
.g-nav a:hover{color:#fff;border-color:var(--border);background:#1a1a1a}
.g-nav a.active{color:var(--gold);border-color:var(--gold);background:#1a1200}
.g-nav-div{width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 1px}
/* USER AREA */
.g-user{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px}
.g-login-btn{background:var(--gold);color:#000;border:none;padding:6px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.g-user-name{font-size:11px;color:#ddd;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.g-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.g-avatar-ph{width:26px;height:26px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;flex-shrink:0}
/* MOBILE NAV (bottom bar) */
.g-mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:2px solid var(--gold);z-index:300;padding:4px 0 env(safe-area-inset-bottom,0)}
.g-mobile-nav-inner{display:flex;justify-content:space-around}
.g-mobile-nav a{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 4px;color:var(--muted);text-decoration:none;font-size:9px;min-width:52px;transition:color .15s}
.g-mobile-nav a.active{color:var(--gold)}
.g-mobile-nav a span:first-child{font-size:18px;line-height:1}
/* MOBILE BODY PADDING */
.g-content{flex:1}
@media(max-width:700px){
  .g-nav{display:none}
  .g-mobile-nav{display:block}
  .g-content{padding-bottom:calc(60px + env(safe-area-inset-bottom,0))}
  .g-brand-text p{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header class="g-hdr" role="banner">
  <a class="g-brand" href="/">
    <div class="g-flag"><s style="background:#000"></s><s style="background:var(--red)"></s><s style="background:var(--gold)"></s></div>
    <div class="g-brand-text"><h1>Fanclub Manelo98</h1><p>WM Tippspiel 2026</p></div>
  </a>
  <nav class="g-nav" aria-label="Hauptnavigation" id="gNav"></nav>
  <div class="g-user" id="gUser">
    <button class="g-login-btn" onclick="location.href='/login.html'">Anmelden</button>
  </div>
</header>

<nav class="g-mobile-nav" aria-label="Mobile Navigation">
  <div class="g-mobile-nav-inner" id="gMobNav"></div>
</nav>

<div class="g-content">

<style>
.p-wrap{max-width:600px;margin:0 auto;padding:16px 12px 40px}
.p-head{background:linear-gradient(180deg,#0d0d0d,#0a0a0a);padding:10px 12px 8px;border-bottom:1px solid #1a1a1a;text-align:center;margin-bottom:16px}
.p-eye{font-size:8px;letter-spacing:4px;color:#cc0000;font-weight:700;text-transform:uppercase;margin-bottom:2px}
.p-h{font-size:clamp(14px,3vw,20px);font-weight:900;color:#fff}
.p-h span{color:#ffd700}

/* AVATAR SECTION */
.p-avatar-section{display:flex;flex-direction:column;align-items:center;padding:24px 16px;background:#111;border:1px solid #2a2a2a;border-radius:12px;margin-bottom:16px}
.p-avatar{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #ffd700;margin-bottom:12px}
.p-avatar-ph{width:90px;height:90px;border-radius:50%;border:3px solid #ffd700;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:#000;margin-bottom:12px;flex-shrink:0}
.p-name{font-size:20px;font-weight:800;color:#fff;margin-bottom:4px}
.p-sub{font-size:12px;color:#888}

/* STATS */
.p-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.p-stat{background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:12px;text-align:center}
.p-stat-v{font-size:24px;font-weight:900;color:#ffd700}
.p-stat-l{font-size:11px;color:#888;margin-top:2px}

/* CARD */
.p-card{background:#111;border:1px solid #2a2a2a;border-radius:10px;overflow:hidden;margin-bottom:12px}
.p-card-head{background:linear-gradient(135deg,#1a1200,#0d0d0d);border-bottom:2px solid #ffd700;padding:10px 16px;font-size:13px;font-weight:700;color:#ffd700}
.p-card-body{padding:16px}

/* FORM */
.p-label{font-size:11px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
.p-input{width:100%;background:#0d0d0d;border:1px solid #2a2a2a;color:#ddd;padding:10px 12px;border-radius:8px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:12px}
.p-input:focus{border-color:#ffd700}

/* UPLOAD */
.p-upload-area{border:2px dashed #2a2a2a;border-radius:8px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:12px;background:#0d0d0d}
.p-upload-area:hover{border-color:#ffd700;background:#1a1200}
.p-upload-area.drag{border-color:#ffd700;background:#1a1200}
.p-upload-icon{font-size:32px;margin-bottom:8px}
.p-upload-text{font-size:13px;color:#888}
.p-upload-text strong{color:#ffd700}
.p-upload-sub{font-size:11px;color:#555;margin-top:4px}
.p-upload-input{display:none}
.p-progress{display:none;height:4px;background:#1a1a1a;border-radius:2px;margin-bottom:12px;overflow:hidden}
.p-progress-bar{height:100%;background:linear-gradient(90deg,#ffd700,#ff9500);border-radius:2px;width:0%;transition:width .3s}
.p-url-row{display:flex;gap:8px;margin-bottom:12px}
.p-url-input{flex:1;background:#0d0d0d;border:1px solid #2a2a2a;color:#ddd;padding:10px 12px;border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.p-url-input:focus{border-color:#ffd700}
.p-url-btn{background:#1a1200;border:1px solid #ffd700;color:#ffd700;padding:10px 14px;border-radius:8px;font-size:13px;cursor:pointer;white-space:nowrap;font-family:inherit}

/* BUTTONS */
.p-save-btn{width:100%;background:#ffd700;color:#000;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s}
.p-save-btn:hover{opacity:.9}
.p-save-btn:disabled{opacity:.5;cursor:default}
.p-logout-btn{width:100%;background:transparent;border:1px solid #cc0000;color:#cc0000;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;margin-top:8px;transition:all .2s}
.p-logout-btn:hover{background:#cc0000;color:#fff}
.p-msg{padding:8px 12px;border-radius:6px;font-size:12px;font-weight:600;margin-bottom:12px;display:none}
.p-msg.ok{background:#0d2a0d;color:#16a34a;border:1px solid #16a34a}
.p-msg.err{background:#2a0000;color:#cc0000;border:1px solid #cc0000}
@media(max-width:500px){.p-stats{grid-template-columns:repeat(3,1fr)}.p-stat-v{font-size:18px}}
</style>

<div class="p-head">
  <div class="p-eye">Fanclub Manelo98</div>
  <div class="p-h">MEIN <span>PROFIL</span></div>
</div>

<div class="p-wrap" id="pWrap">
  <div style="text-align:center;padding:40px;color:#888">⏳ Wird geladen…</div>
</div>

<script>
const COLORS=['#e74c3c','#e67e22','#2ecc71','#3498db','#9b59b6','#1abc9c','#f39c12'];
function avatarColor(n){let h=0;for(let c of(n||''))h=((h<<5)-h)+c.charCodeAt(0);return COLORS[Math.abs(h)%COLORS.length];}
function initials(n){return(n||'?').split(/[\s_]/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';}

let pUser=null,pRankings=[];

function renderProfile(){
  const u=pUser;
  if(!u){
    document.getElementById('pWrap').innerHTML=`<div style="text-align:center;padding:40px">
      <div style="font-size:48px;margin-bottom:12px">🔒</div>
      <p style="color:#888;margin-bottom:16px">Bitte anmelden um dein Profil zu sehen</p>
      <a href="/login.html" style="background:#ffd700;color:#000;padding:10px 20px;border-radius:8px;text-decoration:none;font-weight:700">Anmelden</a>
    </div>`;
    return;
  }
  const col=avatarColor(u.username);
  const ini=initials(u.username);
  const rank=pRankings.findIndex(r=>r.username===u.username)+1;
  const myRank=pRankings.find(r=>r.username===u.username);
  const pts=myRank?.points||0;
  const tipped=myRank?.total||0;

  document.getElementById('pWrap').innerHTML=`
    <!-- AVATAR CARD -->
    <div class="p-avatar-section">
      ${u.avatar
        ?`<img class="p-avatar" src="${u.avatar}" id="avImg" alt="${u.username}">`
        :`<div class="p-avatar-ph" style="background:${col}" id="avImg">${ini}</div>`}
      <div class="p-name">${u.username}</div>
      <div class="p-sub">Fanclub Manelo98 · WM Tippspiel 2026</div>
    </div>

    <!-- STATS -->
    <div class="p-stats">
      <div class="p-stat"><div class="p-stat-v">${pts}</div><div class="p-stat-l">Punkte</div></div>
      <div class="p-stat"><div class="p-stat-v">${tipped}</div><div class="p-stat-l">Tipps</div></div>
      <div class="p-stat"><div class="p-stat-v">${rank||'–'}</div><div class="p-stat-l">Platz</div></div>
    </div>

    <!-- PROFILE EDIT -->
    <div class="p-card">
      <div class="p-card-head">✏️ Profil bearbeiten</div>
      <div class="p-card-body">
        <div class="p-msg" id="pMsg"></div>
        <label class="p-label">Anzeigename</label>
        <input class="p-input" id="pName" type="text" value="${u.username}" maxlength="30" placeholder="Dein Name">
        <button class="p-save-btn" onclick="saveProfile()">💾 Name speichern</button>
      </div>
    </div>

    <!-- AVATAR UPLOAD -->
    <div class="p-card">
      <div class="p-card-head">📷 Profilbild ändern</div>
      <div class="p-card-body">
        <div class="p-msg" id="upMsg"></div>

        <!-- File Upload -->
        <div class="p-upload-area" id="dropZone" onclick="document.getElementById('fileIn').click()"
             ondragover="event.preventDefault();this.classList.add('drag')"
             ondragleave="this.classList.remove('drag')"
             ondrop="handleDrop(event)">
          <div class="p-upload-icon">📤</div>
          <div class="p-upload-text">Klicken oder Bild hierher ziehen<br><strong>vom PC, Smartphone oder Tablet</strong></div>
          <div class="p-upload-sub">JPG, PNG, GIF, WebP — max. 5MB</div>
        </div>
        <input type="file" id="fileIn" accept="image/*" class="p-upload-input" onchange="uploadFile(this.files[0])">
        <div class="p-progress" id="upProg"><div class="p-progress-bar" id="upProgBar"></div></div>

        <!-- URL Input -->
        <div style="text-align:center;color:#555;font-size:11px;margin:8px 0">— oder Bild-URL eingeben —</div>
        <div class="p-url-row">
          <input class="p-url-input" id="urlIn" type="url" placeholder="https://example.com/bild.jpg" oninput="previewUrl(this.value)">
          <button class="p-url-btn" onclick="saveUrl()">Speichern</button>
        </div>
      </div>
    </div>

    <!-- LOGOUT -->
    <div class="p-card">
      <div class="p-card-head">⚙️ Account</div>
      <div class="p-card-body">
        <button class="p-logout-btn" onclick="doLogout()">🚪 Abmelden</button>
      </div>
    </div>`;
}

function showMsg(id, text, type){
  const el=document.getElementById(id);
  if(!el)return;
  el.textContent=text;el.className=`p-msg ${type}`;el.style.display='block';
  setTimeout(()=>{el.style.display='none'},4000);
}

async function saveProfile(){
  const name=document.getElementById('pName')?.value?.trim();
  if(!name){showMsg('pMsg','Name darf nicht leer sein','err');return;}
  const r=await fetch('/api/profile',{method:'POST',credentials:'include',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({username:name})});
  if(r.ok){const u=await r.json();pUser=u;renderProfile();showMsg('pMsg','✅ Gespeichert!','ok');}
  else showMsg('pMsg','❌ Fehler beim Speichern','err');
}

async function uploadFile(file){
  if(!file)return;
  if(file.size>5*1024*1024){showMsg('upMsg','❌ Bild zu groß (max. 5MB)','err');return;}
  const prog=document.getElementById('upProg');
  const bar=document.getElementById('upProgBar');
  if(prog)prog.style.display='block';
  if(bar){bar.style.width='30%';}
  const fd=new FormData();fd.append('file',file);
  try{
    const r=await fetch('/api/upload-avatar',{method:'POST',credentials:'include',body:fd});
    if(bar)bar.style.width='100%';
    if(r.ok){
      const d=await r.json();
      if(pUser)pUser.avatar=d.avatar;
      setTimeout(()=>{if(prog)prog.style.display='none';renderProfile();showMsg('upMsg','✅ Profilbild gespeichert!','ok');},500);
    }else{
      if(prog)prog.style.display='none';
      showMsg('upMsg','❌ Upload fehlgeschlagen','err');
    }
  }catch(e){if(prog)prog.style.display='none';showMsg('upMsg','❌ Netzwerkfehler','err');}
}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('dropZone')?.classList.remove('drag');
  const file=e.dataTransfer?.files?.[0];
  if(file&&file.type.startsWith('image/'))uploadFile(file);
  else showMsg('upMsg','❌ Nur Bilddateien erlaubt','err');
}

function previewUrl(url){
  // Just validate URL format
}

async function saveUrl(){
  const url=document.getElementById('urlIn')?.value?.trim();
  if(!url){showMsg('upMsg','Bitte eine URL eingeben','err');return;}
  const r=await fetch('/api/profile',{method:'POST',credentials:'include',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({avatar:url})});
  if(r.ok){const u=await r.json();pUser=u;renderProfile();showMsg('upMsg','✅ Bild gespeichert!','ok');}
  else showMsg('upMsg','❌ Fehler','err');
}

async function doLogout(){
  await fetch('/api/logout',{method:'POST',credentials:'include'});
  location.href='/';
}

function onUserLoaded(u){pUser=u;renderProfile();}

function setPage(p){if(p==='login')location.href='/login.html';}

async function loadData(){
  const[uD,rD]=await Promise.all([
    fetch('/api/me',{credentials:'include'}).then(r=>r.ok?r.json():null).catch(()=>null),
    fetch('/api/rankings',{credentials:'include'}).then(r=>r.ok?r.json():[]).catch(()=>[]),
  ]);
  if(uD)pUser=uD;
  pRankings=rD||[];
  renderProfile();
}
loadData();
</script>
</div>

<script>
const G_PAGES=[
  {id:'index',label:'Start',icon:'🏠',url:'/'},
  {id:'spielplan',label:'Spielplan/Tipps',icon:'⚽',url:'/spielplan.html'},
  {id:'spielbaum',label:'Spielbaum',icon:'🌳',url:'/spielbaum.html'},
  {id:'tabelle',label:'Tabelle',icon:'🏆',url:'/tabelle.html'},
  {id:'auswertung',label:'Auswertung',icon:'📊',url:'/auswertung.html'},
  {id:'profil',label:'Profil',icon:'👤',url:'/profil.html'},
];
// Admin page added after user check
const G_CURRENT='profil';

// Build desktop nav
const nav=document.getElementById('gNav');
G_PAGES.forEach((p,i)=>{
  if(i>0){const d=document.createElement('div');d.className='g-nav-div';nav.appendChild(d);}
  const a=document.createElement('a');
  a.href=p.url;a.textContent=p.icon+' '+p.label;
  if(p.id===G_CURRENT)a.className='active';
  nav.appendChild(a);
});

// Build mobile nav
const mob=document.getElementById('gMobNav');
G_PAGES.forEach(p=>{
  const a=document.createElement('a');
  a.href=p.url;
  a.innerHTML=`<span>${p.icon}</span><span>${p.label}</span>`;
  if(p.id===G_CURRENT)a.className='active';
  mob.appendChild(a);
});

// Load user session
(async()=>{
  try{
    const r=await fetch('/api/me',{credentials:'include'});
    if(r.ok){
      const u=await r.json();
      const el=document.getElementById('gUser');
      const initials=u.username.slice(0,2).toUpperCase();
      const col=['#e74c3c','#e67e22','#2ecc71','#3498db','#9b59b6'][u.username.charCodeAt(0)%5];
      el.innerHTML=`${u.avatar?`<img class="g-avatar" src="${u.avatar}" alt="${u.username}">`:`<div class="g-avatar-ph" style="background:${col}">${initials}</div>`}<span class="g-user-name">${u.username}</span>`;
      // Check admin
      try{
        const ar=await fetch('/api/admin/check',{credentials:'include'});
        if(ar.ok){
          const aa=await ar.json();
          if(aa.is_admin){
            const nav=document.getElementById('gNav');
            const mob=document.getElementById('gMobNav');
            const div=document.createElement('div');div.className='g-nav-div';nav.appendChild(div);
            const a=document.createElement('a');
            a.textContent='🔧 Admin';
            a.href='/';
            a.onclick=(e)=>{e.preventDefault();window._goAdmin=true;location.href='/';}
            nav.appendChild(a);
            const ma=document.createElement('a');ma.href='/';ma.innerHTML='<span>🔧</span><span>Admin</span>';
            ma.onclick=a.onclick;mob.appendChild(ma);
          }
        }
      }catch{}
      if(typeof onUserLoaded==='function')onUserLoaded(u);
    } else {
      if(typeof onUserLoaded==='function')onUserLoaded(null);
    }
  }catch{if(typeof onUserLoaded==='function')onUserLoaded(null);}
})();
</script>
