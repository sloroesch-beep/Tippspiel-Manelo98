<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0a0a0a">
<title>Profil — WM Tippspiel 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--gold:#ffd700;--red:#cc0000;--green:#16a34a;--orange:#ea580c;--bg:#0a0a0a;--card:#111;--border:#2a2a2a;--text:#ddd;--muted:#888}
html{height:100%;-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column}
/* SCROLLBARS */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#1a1a1a}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
*{scrollbar-width:thin;scrollbar-color:var(--gold) #1a1a1a}
/* HEADER */
.g-hdr{background:#0d0d0d;border-bottom:3px solid var(--gold);height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:sticky;top:0;z-index:200;flex-shrink:0}
.g-brand{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0}
.g-flag{width:26px;height:17px;display:flex;flex-direction:column;border-radius:2px;overflow:hidden;border:1px solid rgba(255,255,255,.15)}
.g-flag s{flex:1;display:block}
.g-brand-text h1{font-size:12px;font-weight:700;color:#fff;line-height:1.2}
.g-brand-text p{font-size:9px;color:var(--gold)}
/* NAV */
.g-nav{display:flex;align-items:center;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.g-nav::-webkit-scrollbar{display:none}
.g-nav a{display:flex;align-items:center;gap:4px;color:var(--muted);font-size:11px;padding:6px 9px;border-radius:5px;text-decoration:none;border:1px solid transparent;white-space:nowrap;flex-shrink:0;transition:color .15s,border-color .15s,background .15s;-webkit-user-select:none;user-select:none}
.g-nav a:hover{color:#fff;border-color:var(--border);background:#1a1a1a}
.g-nav a.active{color:var(--gold);border-color:var(--gold);background:#1a1200}
.g-nav-div{width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 1px}
/* USER AREA */
.g-user{display:flex;align-items:center;gap:6px;flex-shrink:0;margin-left:8px}
.g-login-btn{background:var(--gold);color:#000;border:none;padding:6px 12px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.g-user-name{font-size:11px;color:#ddd;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
.g-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.g-avatar-ph{width:26px;height:26px;border-radius:50%;border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#000;flex-shrink:0}
/* MOBILE NAV (bottom bar) */
.g-mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0d0d0d;border-top:2px solid var(--gold);z-index:300;padding:4px 0 env(safe-area-inset-bottom,0)}
.g-mobile-nav-inner{display:flex;justify-content:space-around}
.g-mobile-nav a{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 4px;color:var(--muted);text-decoration:none;font-size:9px;min-width:52px;transition:color .15s}
.g-mobile-nav a.active{color:var(--gold)}
.g-mobile-nav a span:first-child{font-size:18px;line-height:1}
/* MOBILE BODY PADDING */
.g-content{flex:1}
@media(max-width:700px){
  .g-nav{display:none}
  .g-mobile-nav{display:block}
  .g-content{padding-bottom:calc(60px + env(safe-area-inset-bottom,0))}
  .g-brand-text p{display:none}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<header class="g-hdr" role="banner">
  <a class="g-brand" href="/">
    <div class="g-flag"><s style="background:#000"></s><s style="background:var(--red)"></s><s style="background:var(--gold)"></s></div>
    <div class="g-brand-text"><h1>Fanclub Manelo98</h1><p>WM Tippspiel 2026</p></div>
  </a>
  <nav class="g-nav" aria-label="Hauptnavigation" id="gNav"></nav>
  <div class="g-user" id="gUser">
    <button class="g-login-btn" onclick="location.href='/login.html'">Anmelden</button>
  </div>
</header>

<nav class="g-mobile-nav" aria-label="Mobile Navigation">
  <div class="g-mobile-nav-inner" id="gMobNav"></div>
</nav>

<div class="g-content">

<style>.auth-top-stripe{height:5px;background:linear-gradient(to right,#1a1a1a 33.3%,#cc0000 33.3% 66.6%,#ffcc00 66.6%);}
.auth-top-body{padding:24px;text-align:center;}
.auth-top-flag{display:flex;flex-direction:column;width:42px;height:28px;border-radius:4px;overflow:hidden;margin:0 auto 12px;border:1px solid rgba(255,255,255,.2);}
.auth-top-flag span{flex:1;display:block;}
.auth-top h1{color:#fff;font-size:18px;font-weight:700;margin-bottom:3px;}
.auth-top h1 span{color:var(--gold);}
.auth-top p{color:rgba(255,255,255,.5);font-size:12px;}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:38px;}
.profile-page{max-width:540px;}
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.profile-head{background:var(--dark);border-bottom:3px solid var(--gold);padding:14px 20px;display:flex;align-items:center;gap:10px;}
.profile-head h2{color:#fff;font-size:14px;font-weight:700;}
.profile-body{padding:22px 24px;}
.avatar-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);flex-shrink:0;}
.avatar-preview-ph{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;border:3px solid var(--gold);flex-shrink:0;}
.avatar-section{display:flex;align-items:center;gap:20px;margin-bottom:20px;}
.avatar-info h3{font-size:15px;font-weight:700;margin-bottom:4px;}
.avatar-info p{font-size:12px;color:var(--muted);line-height:1.5;}
.avatar-methods{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:0;}
.profile-stat{background:#f9f9f9;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;}
.profile-stat .val{font-size:20px;font-weight:700;color:var(--black);}
.profile-stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.prof-inner{max-width:600px;margin:0 auto;padding:12px}</style>
<div class="prof-inner" id="profContent"><div style="text-align:center;padding:40px;color:#888">Wird geladen…</div></div>
<script>
const COLORS=['#e74c3c','#e67e22','#2ecc71','#3498db','#9b59b6','#1abc9c','#f39c12'];
let pState={user:null,rankings:[]};
const state={get user(){return pState.user},get rankings(){return pState.rankings}};

function avatarColor(n){let h=0;for(let c of n)h=((h<<5)-h)+c.charCodeAt(0);return COLORS[Math.abs(h)%COLORS.length];}

function initials(n){return n.split(/[\s_]/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}

function renderProfil(){
  if(!state.user){
    return`<div class="locked-overlay">
      <div class="lock-icon">🔒</div>
      <h3>Bitte anmelden</h3>
      <p>Melde dich an um dein Profil zu bearbeiten.</p>
      <button onclick="setPage('login')">Jetzt anmelden</button>
    </div>`;
  }
  const col=avatarColor(state.user.username);
  const avHTML=state.user.avatar
    ?`<img class="avatar-preview" src="${state.user.avatar}" alt="${state.user.username}" id="av-preview">`
    :`<div class="avatar-preview-ph" style="background:${col};" id="av-preview">${initials(state.user.username)}</div>`;

  return`<div class="profile-page">
    <div class="profile-card">
      <div class="profile-head"><h2>👤 Mein Profil</h2></div>
      <div class="profile-body">
        <div class="success-msg" id="prof-success">✓ Profil erfolgreich gespeichert!</div>
        <div class="err-msg" id="prof-err"></div>
        <div class="avatar-section">
          ${avHTML}
          <div class="avatar-info">
            <h3>${state.user.username}</h3>
            <p style="font-size:12px;color:var(--muted);">Klick auf "Bild hochladen" um ein Foto von deinem Gerät zu wählen — funktioniert auf Windows, iPhone, Android und Mac.</p>
          </div>
        </div>

        <div class="field">
          <label>Anzeigename <span class="hint-tag">(sichtbar für alle Mitspieler)</span></label>
          <input type="text" id="prof-name" value="${state.user.username}" placeholder="Dein Anzeigename">
        </div>

        <div class="field">
          <div class="method-label">Profilbild</div>
          <div class="avatar-methods">
            <div>
              <label class="method-label" style="margin-bottom:6px;">📁 Vom Gerät hochladen</label>
              <label class="upload-btn" for="prof-file-input">
                📷 Bild auswählen
                <span style="font-size:11px;color:var(--muted);">(JPG, PNG, GIF — max. 5MB)</span>
              </label>
              <input type="file" id="prof-file-input" accept="image/*" style="display:none;" onchange="uploadAvatar(this)">
              <div class="upload-progress" id="upload-progress">⏳ Wird hochgeladen…</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;"><div style="flex:1;height:1px;background:var(--border);"></div><span style="font-size:11px;color:var(--hint);">oder</span><div style="flex:1;height:1px;background:var(--border);"></div></div>
            <div>
              <label class="method-label" style="margin-bottom:6px;">🔗 Bild-URL eingeben</label>
              <input type="url" id="prof-avatar" value="${state.user.avatar&&!state.user.avatar.startsWith('data:')?state.user.avatar:''}" placeholder="https://beispiel.com/meinbild.jpg" oninput="previewAvatar(this.value)" style="width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;outline:none;">
            </div>
          </div>
        </div>

        <button class="save-btn" onclick="saveProfile()">💾 Profil speichern</button>
      </div>
    </div>

    <div class="profile-card">
      <div class="profile-head"><h2>📊 Meine Statistiken</h2></div>
      <div class="profile-body">
        <div class="profile-stats">
          <div class="profile-stat">
            <div class="val">${state.rankings.find(r=>r.username===state.user.username)?.points||0}</div>
            <div class="lbl">Punkte</div>
          </div>
          <div class="profile-stat">
            <div class="val">${state.rankings.find(r=>r.username===state.user.username)?.total||0}</div>
            <div class="lbl">Tipps abgegeben</div>
          </div>
          <div class="profile-stat">
            <div class="val">${(state.rankings.findIndex(r=>r.username===state.user.username)+1)||'-'}</div>
            <div class="lbl">Platz in Tabelle</div>
          </div>
        </div>
      </div>
    </div>

    ${state.user.avatar?'':`<div class="profile-card">
      <div class="profile-head"><h2>💡 Tipp: Discord-Login für automatisches Profilbild</h2></div>
      <div class="profile-body">
        <p style="font-size:13px;color:var(--muted);line-height:1.6;">
          Wenn du dich über Discord anmeldest, wird dein Discord-Profilbild automatisch übernommen — ohne URL eintippen zu müssen.
        </p>
      </div>
    </div>`}
  </div>`;
}

function previewAvatar(url){
  const el=document.getElementById('av-preview');
  if(!el)return;
  if(url&&url.startsWith('http')){
    el.outerHTML=`<img class="avatar-preview" src="${url}" alt="Vorschau" id="av-preview" onerror="this.style.opacity='.3'">`;
  }
}

function togglePw(){const i=document.getElementById('f-pw');if(i)i.type=i.type==='password'?'text':'password';}

function checkStr(v){
  const f=document.getElementById('str-fill');if(!f)return;
  let s=0;if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  f.style.width=(s*25)+'%';f.style.background=s<=1?'#dc2626':s===2?'#ea580c':s===3?'#ca8a04':'#16a34a';
}

function showErr(m){const e=document.getElementById('err-msg');if(e){e.textContent=m;e.style.display='block';}}
async function doLogout(){
  await fetch('/api/logout',{method:'POST',credentials:'include'});
  location.href='/';
}
async function doSaveProfile(e){
  e&&e.preventDefault();
  const username=document.getElementById('prof-username')?.value||'';
  const r=await fetch('/api/profile',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
  if(r.ok){const u=await r.json();pState.user=u;document.getElementById('profContent').innerHTML=renderProfil();}
}
function setPage(p){if(p==='login')location.href='/login.html';}
let _initDone=false;
function onUserLoaded(u){pState.user=u;if(_initDone){if(u)loadData();else{document.getElementById('profContent').innerHTML=renderProfil();}}}
async function loadData(){
  const[uD,rD]=await Promise.all([
    fetch('/api/me',{credentials:'include'}).then(r=>r.ok?r.json():null).catch(()=>null),
    fetch('/api/rankings',{credentials:'include'}).then(r=>r.ok?r.json():[]).catch(()=>[]),
  ]);
  if(!pState.user && uD) pState.user=uD;
  pState.rankings=rD||[];
  _initDone=true;
  document.getElementById('profContent').innerHTML=renderProfil();
}
// Show something immediately
document.getElementById('profContent').innerHTML='<div style="text-align:center;padding:40px;color:#888">Profil wird geladen…</div>';
</script>
</div>

<script>
const G_PAGES=[
  {id:'index',label:'Start',icon:'🏠',url:'/'},
  {id:'spielplan',label:'Spielplan',icon:'⚽',url:'/spielplan.html'},
  {id:'spielbaum',label:'Spielbaum',icon:'🌳',url:'/spielbaum.html'},
  {id:'tabelle',label:'Tabelle',icon:'🏆',url:'/tabelle.html'},
  {id:'auswertung',label:'Auswertung',icon:'📊',url:'/auswertung.html'},
  {id:'profil',label:'Profil',icon:'👤',url:'/profil.html'},
];
const G_CURRENT='profil';

// Build desktop nav
const nav=document.getElementById('gNav');
G_PAGES.forEach((p,i)=>{
  if(i>0){const d=document.createElement('div');d.className='g-nav-div';nav.appendChild(d);}
  const a=document.createElement('a');
  a.href=p.url;a.textContent=p.icon+' '+p.label;
  if(p.id===G_CURRENT)a.className='active';
  nav.appendChild(a);
});

// Build mobile nav
const mob=document.getElementById('gMobNav');
G_PAGES.forEach(p=>{
  const a=document.createElement('a');
  a.href=p.url;
  a.innerHTML=`<span>${p.icon}</span><span>${p.label}</span>`;
  if(p.id===G_CURRENT)a.className='active';
  mob.appendChild(a);
});

// Load user session
(async()=>{
  try{
    const r=await fetch('/api/me',{credentials:'include'});
    if(r.ok){
      const u=await r.json();
      const el=document.getElementById('gUser');
      const initials=u.username.slice(0,2).toUpperCase();
      const col=['#e74c3c','#e67e22','#2ecc71','#3498db','#9b59b6'][u.username.charCodeAt(0)%5];
      el.innerHTML=`${u.avatar?`<img class="g-avatar" src="${u.avatar}" alt="${u.username}">`:`<div class="g-avatar-ph" style="background:${col}">${initials}</div>`}<span class="g-user-name">${u.username}</span>`;
      if(typeof onUserLoaded==='function')onUserLoaded(u);
    } else {
      if(typeof onUserLoaded==='function')onUserLoaded(null);
    }
  }catch{if(typeof onUserLoaded==='function')onUserLoaded(null);}
})();
</script>
