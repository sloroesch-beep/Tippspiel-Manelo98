<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM Tippspiel 2026 — Fanclub Manelo98</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#1a1a1a;--red:#cc0000;--gold:#ffcc00;--gold-light:#ffe566;--gold-dark:#b8960a;
  --dark:#111;--dark2:#1e1e1e;--surface:#fff;--bg:#f5f5f5;--border:#e0e0e0;
  --text:#1a1a1a;--muted:#666;--hint:#999;
  --green:#16a34a;--green-bg:#dcfce7;--orange:#ea580c;--discord:#5865f2;
  --radius:10px;--radius-sm:6px;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
img{max-width:100%;}

/* TOP BAR */
.topbar{background:var(--dark);border-bottom:3px solid var(--gold);padding:0 20px;display:flex;align-items:center;height:54px;position:sticky;top:0;z-index:100;}
.logo{color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.de-flag{display:flex;flex-direction:column;width:24px;height:16px;border-radius:2px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.2);}
.de-flag span{flex:1;display:block;}
.de-f1{background:#1a1a1a;}
.de-f2{background:#cc0000;}
.de-f3{background:#ffcc00;}
.logo-text{display:flex;flex-direction:column;line-height:1.2;}
.logo-main{color:#fff;font-size:14px;font-weight:700;}
.logo-sub{color:var(--gold);font-size:10px;font-weight:400;letter-spacing:.5px;}
.topnav{display:flex;margin-left:20px;gap:0;}
.topnav a{padding:0 13px;height:54px;display:flex;align-items:center;font-size:13px;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;}
.topnav a.active,.topnav a:hover{color:#fff;}
.topnav a.active{border-bottom-color:var(--gold);}
.user-area{margin-left:auto;display:flex;align-items:center;gap:10px;}
.uav{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);}
.uav-ph{width:30px;height:30px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;border:2px solid var(--gold);}
.uname{color:rgba(255,255,255,.85);font-size:13px;}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.6);padding:4px 10px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;transition:all .15s;}
.logout-btn:hover{border-color:var(--gold);color:var(--gold);}
.login-btn{background:var(--gold);border:none;color:var(--black);padding:6px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.login-btn:hover{background:var(--gold-light);}

/* DE STRIPE */
.de-stripe{height:5px;background:linear-gradient(to right, #1a1a1a 33.3%, #cc0000 33.3% 66.6%, #ffcc00 66.6%);}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 59px);}
.sidebar{width:190px;background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;flex-shrink:0;}

/* SPIELBAUM */
.spielbaum-page{padding:4px 0;}
.spielbaum-title{text-align:center;margin-bottom:20px;}
.spielbaum-title h2{font-size:22px;font-weight:700;color:var(--black);}
.spielbaum-title h2 span{color:var(--red);}
.spielbaum-title p{font-size:13px;color:var(--muted);margin-top:4px;}

.sb-runde{margin-bottom:24px;}
.sb-runde-header{background:var(--dark);color:#fff;padding:10px 16px;border-radius:var(--radius) var(--radius) 0 0;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);}
.sb-runde-header h3{font-size:14px;font-weight:700;letter-spacing:.3px;}
.sb-runde-header span{font-size:12px;color:rgba(255,255,255,.6);}

.sb-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;}
.sb-table th{background:#f0f0f0;padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);}
.sb-table th:not(:first-child){text-align:center;}
.sb-table td{padding:9px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle;}
.sb-table tr:last-child td{border-bottom:none;}
.sb-table tr:hover td{background:#fafafa;}
.sb-table td.nr{color:var(--hint);font-size:11px;width:28px;}
.sb-table td.datum{color:var(--muted);font-size:12px;white-space:nowrap;width:80px;}
.sb-table td.uhrzeit{color:var(--muted);font-size:12px;width:50px;}
.sb-table td.ort{color:var(--muted);font-size:12px;width:120px;}
.sb-table td.spiel{font-weight:600;}
.sb-table td.ergebnis{text-align:center;width:80px;}
.sb-score{display:inline-flex;align-items:center;gap:4px;background:var(--dark);color:#fff;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:700;}
.sb-score.done{background:var(--green);}
.sb-score.live{background:var(--red);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}
.sb-score-open{color:var(--hint);font-size:12px;}

.finale-card{background:var(--dark);border:3px solid var(--gold);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:24px;}
.finale-card h3{color:var(--gold);font-size:18px;font-weight:700;margin-bottom:4px;}
.finale-card .finale-datum{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:16px;}
.finale-teams{display:flex;align-items:center;justify-content:center;gap:20px;font-size:20px;font-weight:700;color:#fff;}
.finale-vs{color:var(--gold);font-size:24px;}
.finale-score{font-size:28px;font-weight:700;color:var(--gold);margin-top:12px;}
.weltmeister-box{margin-top:16px;background:var(--gold);color:var(--black);padding:10px 20px;border-radius:var(--radius-sm);font-size:16px;font-weight:700;display:inline-block;}

.sb-sec{font-size:10px;font-weight:700;color:var(--hint);letter-spacing:.6px;text-transform:uppercase;padding:12px 8px 5px;}
.sb-sec:first-child{padding-top:4px;}
.sb-link{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--muted);cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left;}
.sb-link:hover{background:#f5f5f5;color:var(--text);}
.sb-link.active{background:#fff8dc;color:#8b6914;font-weight:600;border-left:3px solid var(--gold);}
.sb-link.locked{opacity:.4;cursor:default;}
.sb-link.locked:hover{background:none;color:var(--muted);}
.main{flex:1;padding:20px 24px;max-width:860px;overflow-x:hidden;}

/* WELCOME PAGE */
.welcome-hero{background:var(--dark);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;position:relative;}
.hero-stripe{height:6px;background:linear-gradient(to right,#1a1a1a 33.3%,#cc0000 33.3% 66.6%,#ffcc00 66.6%);}
.hero-body{padding:36px 32px;display:flex;align-items:center;gap:32px;}
.hero-flag-big{display:flex;flex-direction:column;width:72px;height:48px;border-radius:6px;overflow:hidden;flex-shrink:0;border:2px solid rgba(255,255,255,.15);}
.hero-flag-big span{flex:1;display:block;}
.hero-text h1{color:#fff;font-size:26px;font-weight:700;margin-bottom:6px;}
.hero-text h1 span{color:var(--gold);}
.hero-text p{color:rgba(255,255,255,.6);font-size:14px;line-height:1.6;max-width:460px;}
.hero-btns{display:flex;gap:10px;margin-top:20px;}
.hero-btn-primary{background:var(--gold);border:none;color:var(--black);padding:10px 22px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
.hero-btn-primary:hover{background:var(--gold-light);}
.hero-btn-secondary{background:none;border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);padding:10px 22px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;transition:all .15s;}
.hero-btn-secondary:hover{border-color:var(--gold);color:var(--gold);}

.welcome-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.wcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;}
.wcard-icon{font-size:28px;margin-bottom:10px;}
.wcard h3{font-size:14px;font-weight:600;margin-bottom:6px;}
.wcard p{font-size:12px;color:var(--muted);line-height:1.5;}

.points-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:20px;}
.points-box h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text);}
.pts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pts-card{border-radius:var(--radius-sm);padding:12px;text-align:center;}
.pts-card.exact{background:#dcfce7;border:1px solid #86efac;}
.pts-card.tend{background:#fef9c3;border:1px solid #fde047;}
.pts-card.wrong{background:#f5f5f5;border:1px solid var(--border);}
.pts-num{font-size:26px;font-weight:700;}
.pts-card.exact .pts-num{color:#16a34a;}
.pts-card.tend .pts-num{color:#ca8a04;}
.pts-card.wrong .pts-num{color:var(--hint);}
.pts-label{font-size:11px;color:var(--muted);margin-top:3px;}

.login-teaser{background:var(--dark);border-radius:var(--radius);padding:20px 24px;display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.login-teaser-text h3{color:#fff;font-size:15px;font-weight:600;margin-bottom:4px;}
.login-teaser-text p{color:rgba(255,255,255,.55);font-size:13px;}
.login-teaser-btn{background:var(--gold);border:none;color:var(--black);padding:9px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.login-teaser-btn:hover{background:var(--gold-light);}

/* MATCH CARDS */
.group-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:12px 0 7px;display:flex;align-items:center;gap:6px;}
.group-label:first-child{padding-top:0;}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;margin-bottom:6px;transition:border-color .15s;}
.match-card:hover{border-color:#ccc;}
.match-card.tipped{border-color:#86efac;background:#f0fdf4;}
.match-top{display:flex;align-items:center;gap:6px;margin-bottom:11px;}
.match-time{font-size:11px;color:var(--muted);}
.status-pill{margin-left:auto;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;}
.pill-open{background:#fff8dc;color:#8b6914;}
.pill-done{background:var(--green-bg);color:#166534;}
.teams-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.team-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0;}
.team-flag{width:48px;height:32px;object-fit:cover;border-radius:4px;border:1px solid var(--border);}
.team-flag-fallback{width:48px;height:32px;border-radius:4px;border:1px solid var(--border);background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.team-name{font-size:12px;font-weight:600;color:var(--text);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.score-center{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;}
.score-label{font-size:10px;font-weight:700;color:var(--hint);letter-spacing:.4px;}
.score-row{display:flex;align-items:center;gap:4px;}
.score-box{width:36px;height:36px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:#f9f9f9;font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center;user-select:none;}
.score-box.filled{background:var(--surface);border-color:var(--gold-dark);}
.score-colon{font-size:18px;color:var(--hint);font-weight:300;}
.ctrl-row{display:flex;gap:3px;}
.ctrl{width:28px;height:22px;border:1px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .1s;}
.ctrl:hover{background:#f0f0f0;color:var(--text);}
.ctrl.plus:hover{background:#fff8dc;border-color:var(--gold-dark);color:var(--gold-dark);}
.ctrl.minus:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626;}

/* GROUP TABLE */
.grp-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:16px 0 8px;}
.grp-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.grp-table th{background:var(--dark);color:#fff;padding:8px 10px;font-weight:600;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;}
.grp-table th:not(:first-child){text-align:center;}
.grp-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);}
.grp-table td:not(:first-child){text-align:center;color:var(--muted);}
.grp-table tr:last-child td{border-bottom:none;}
.grp-table tr.qualified td{background:#f0fdf4;}
.grp-table tr.qualified td:first-child{border-left:3px solid var(--green);}
.grp-table tr.qualified-3rd td{background:#fffbeb;}
.grp-table tr.qualified-3rd td:first-child{border-left:3px solid var(--orange);}
.team-flag-sm{width:20px;height:14px;object-fit:cover;border-radius:2px;vertical-align:middle;margin-right:5px;}
.grp-legend{display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--muted);flex-wrap:wrap;}
.grp-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* KO CARDS */
.ko-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:border-color .15s;}
.ko-card:hover{border-color:#ccc;}
.ko-card.tipped{border-color:#86efac;background:#f0fdf4;}
.ko-team{flex:1;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;}
.ko-team.right{justify-content:flex-end;}
.ko-placeholder{font-size:12px;color:var(--muted);font-style:italic;font-weight:400;}
.ko-date{font-size:10px;color:var(--hint);}

/* RANKINGS */
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;}
.rank-head{background:var(--dark);border-bottom:3px solid var(--gold);padding:11px 18px;display:flex;align-items:center;gap:8px;}
.rank-head h2{color:#fff;font-size:13px;font-weight:700;}
.rank-head span{color:rgba(255,255,255,.4);font-size:12px;margin-left:auto;}
.rank-row{display:flex;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);gap:12px;transition:background .1s;}
.rank-row:last-child{border-bottom:none;}
.rank-row:hover{background:#fafafa;}
.rpos{width:24px;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0;}
.rname{flex:1;display:flex;align-items:center;gap:9px;font-size:14px;font-weight:500;}
.rav{width:28px;height:28px;border-radius:50%;object-fit:cover;}
.rav-ph{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.rbar-w{width:80px;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;}
.rbar{height:5px;border-radius:3px;}
.rpts{font-weight:700;font-size:15px;color:var(--black);min-width:30px;text-align:right;}
.rtips{font-size:11px;color:var(--hint);min-width:50px;text-align:right;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat-c{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
.stat-v{font-size:22px;font-weight:700;color:var(--black);}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px;}

/* RESULTS */
.res-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;}
.res-head{background:var(--dark);border-bottom:3px solid var(--gold);padding:10px 16px;display:flex;align-items:center;gap:8px;}
.res-head h3{color:#fff;font-size:13px;font-weight:700;}
.res-row{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid var(--border);gap:8px;font-size:13px;}
.res-row:last-child{border-bottom:none;}
.res-name{width:90px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.res-tip{flex:1;color:var(--muted);}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;}
.badge-exact{background:var(--green-bg);color:#166534;}
.badge-tend{background:#fef9c3;color:#854d0e;}
.badge-wrong{background:#f5f5f5;color:var(--hint);}
.res-pts{font-weight:700;font-size:13px;min-width:36px;text-align:right;}

/* AUTH */
.auth-scene{min-height:calc(100vh - 59px);display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px 16px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:390px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.auth-top{background:var(--dark);padding:0;}
.auth-top-stripe{height:5px;background:linear-gradient(to right,#1a1a1a 33.3%,#cc0000 33.3% 66.6%,#ffcc00 66.6%);}
.auth-top-body{padding:24px;text-align:center;}
.auth-top-flag{display:flex;flex-direction:column;width:42px;height:28px;border-radius:4px;overflow:hidden;margin:0 auto 12px;border:1px solid rgba(255,255,255,.2);}
.auth-top-flag span{flex:1;display:block;}
.auth-top h1{color:#fff;font-size:18px;font-weight:700;margin-bottom:3px;}
.auth-top h1 span{color:var(--gold);}
.auth-top p{color:rgba(255,255,255,.5);font-size:12px;}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);}
.auth-tab{flex:1;padding:11px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border:none;border-bottom:3px solid transparent;background:none;transition:all .15s;}
.auth-tab.active{color:var(--black);border-bottom-color:var(--gold);}
.auth-body{padding:22px 24px;}
.disc-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--discord);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity .15s;}
.disc-btn:hover{opacity:.88;}
.info-box{border-radius:var(--radius-sm);padding:9px 12px;font-size:12px;margin-bottom:12px;display:flex;gap:7px;align-items:flex-start;line-height:1.4;}
.info-discord{background:#eef0fd;border:1px solid #c7d2fe;color:#3730a3;}
.info-privacy{background:#f0fdf4;border:1px solid #86efac;color:#166534;}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;}
.div-line{flex:1;height:1px;background:var(--border);}
.div-text{font-size:11px;color:var(--hint);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.field label .hint-tag{font-weight:400;color:var(--hint);font-size:10px;margin-left:4px;}
.field input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border-color .12s;}
.field input:focus{border-color:var(--gold-dark);}
.field input::placeholder{color:var(--hint);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:38px;}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--hint);font-size:16px;line-height:1;padding:2px;}
.str-bar{height:3px;border-radius:2px;background:#e5e7eb;margin-top:5px;overflow:hidden;}
.str-fill{height:100%;border-radius:2px;transition:width .2s,background .2s;}
.submit-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--dark);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .15s;border-bottom:3px solid var(--gold);}
.submit-btn:hover{background:#222;}
.err-msg{background:#fee2e2;color:#991b1b;font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:12px;display:none;}
.auth-hint{font-size:11px;color:var(--hint);text-align:center;margin-top:14px;line-height:1.5;}
.auth-hint a{color:var(--discord);cursor:pointer;text-decoration:none;}

  .mobile-group-bar::-webkit-scrollbar{display:none;}
  .mgb-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .12s;}
  .mgb-btn.active{background:var(--gold);border-color:var(--gold-dark);color:var(--black);}

</head>
<body>
<div id="root"></div>
<script>
const FLAGS={
  'Mexiko':'mx','Suedafrika':'za','Suedkorea':'kr','Tschechien':'cz',
  'Kanada':'ca','Bosnien-Herzegowina':'ba','Katar':'qa','Schweiz':'ch',
  'Brasilien':'br','Marokko':'ma','Haiti':'ht','Schottland':'gb-sct',
  'USA':'us','Paraguay':'py','Australien':'au','Tuerkei':'tr',
  'Deutschland':'de','Curacao':'cw','Elfenbeinkueste':'ci','Ecuador':'ec',
  'Niederlande':'nl','Japan':'jp','Schweden':'se','Tunesien':'tn',
  'Belgien':'be','Aegypten':'eg','Iran':'ir','Neuseeland':'nz',
  'Spanien':'es','Kap Verde':'cv','Saudi-Arabien':'sa','Uruguay':'uy',
  'Frankreich':'fr','Senegal':'sn','Irak':'iq','Norwegen':'no',
  'Argentinien':'ar','Algerien':'dz','Oesterreich':'at','Jordanien':'jo',
  'Portugal':'pt','DR Kongo':'cd','Usbekistan':'uz','Kolumbien':'co',
  'England':'gb-eng','Kroatien':'hr','Ghana':'gh','Panama':'pa',
};
const COLORS=['#cc0000','#ffcc00','#1a1a1a','#5865f2','#16a34a','#ea580c','#7c3aed','#0891b2'];

let state={
  user:null, page:'welcome', group:'A',
  matches:[], tips:{}, rankings:[], results:[],
  authTab:'login', authStep:'form', loading:true, isAdmin:false,
};

async function api(path,opts={}){
  const r=await fetch(path,{credentials:'include',headers:{'Content-Type':'application/json'},...opts});
  if(!r.ok){const e=await r.json().catch(()=>({detail:'Fehler'}));throw new Error(e.detail||'Fehler');}
  return r.json();
}

async function init(){
  try{state.user=await api('/api/me');}catch(e){}
  try{
    state.matches=await api('/api/matches');
    if(state.user){
      state.tips=await api('/api/tips');
      state.rankings=await api('/api/rankings');
      state.results=await api('/api/results');
    }
  }catch(e){}
  // Admin check
  try{const a=await api('/api/admin/check');state.isAdmin=a.is_admin;}catch(e){}
  state.loading=false;
  state.lastUpdate=new Date();
  render();
  setInterval(liveUpdate, 30000);
}

async function liveUpdate(){
  try{
    const live=await api('/api/live');
    let changed=false;
    live.forEach(m=>{
      const old=state.matches.find(x=>x.id===m.id);
      if(old&&(old.status!==m.status||old.home_score!==m.home_score||old.away_score!==m.away_score)){
        Object.assign(old,{status:m.status,home_score:m.home_score,away_score:m.away_score});
        changed=true;
      }
    });
    if(changed){
      if(state.user){
        state.rankings=await api('/api/rankings');
        state.results=await api('/api/results');
      }
      state.lastUpdate=new Date();
      render();
    }else{
      state.lastUpdate=new Date();
      const el=document.getElementById('last-update');
      if(el)el.textContent='Aktualisiert: '+state.lastUpdate.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    }
  }catch(e){console.log('Live update error:',e);}
}

function isMatchLocked(m){
  if(m.status!=='open')return true;
  try{
    const parts=m.date.split('.');
    const dt=new Date(`${parts[2]}-${parts[1]}-${parts[0]}T${m.time}:00Z`);
    return new Date()>=dt;
  }catch(e){return false;}
}

function timeUntilMatch(m){
  try{
    const parts=m.date.split('.');
    const dt=new Date(`${parts[2]}-${parts[1]}-${parts[0]}T${m.time}:00Z`);
    const diff=dt-new Date();
    if(diff<=0)return null;
    const h=Math.floor(diff/3600000);
    const min=Math.floor((diff%3600000)/60000);
    if(h>24)return`${Math.floor(h/24)}d ${h%24}h`;
    if(h>0)return`${h}h ${min}min`;
    return`${min}min`;
  }catch(e){return null;}
}

function flagUrl(t){const c=FLAGS[t];return c?`https://flagcdn.com/w80/${c}.png`:null;}
function flagEl(t,cls='team-flag'){
  const url=flagUrl(t);
  if(url)return`<img class="${cls}" src="${url}" alt="${t}" onerror="this.style.display='none'">`;
  return`<div class="team-flag-fallback">⚽</div>`;
}
function flagSmEl(t){
  const c=FLAGS[t];
  return c?`<img class="team-flag-sm" src="https://flagcdn.com/w40/${c}.png" alt="${t}" onerror="this.style.display='none'">`:'';}
function avatarColor(n){let h=0;for(let c of n)h=((h<<5)-h)+c.charCodeAt(0);return COLORS[Math.abs(h)%COLORS.length];}
function initials(n){return n.split(/[\s_]/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}

function calcGroupTable(group){
  const gm=state.matches.filter(m=>m.group===group);
  const teams={};
  gm.forEach(m=>{
    [m.home,m.away].forEach(t=>{if(!teams[t])teams[t]={name:t,sp:0,g:0,u:0,v:0,tore:0,gegen:0,pts:0};});
    if(m.status==='done'&&m.home_score!==null){
      const h=teams[m.home],a=teams[m.away];
      h.sp++;a.sp++;h.tore+=m.home_score;h.gegen+=m.away_score;
      a.tore+=m.away_score;a.gegen+=m.home_score;
      if(m.home_score>m.away_score){h.g++;h.pts+=3;a.v++;}
      else if(m.home_score<m.away_score){a.g++;a.pts+=3;h.v++;}
      else{h.u++;h.pts++;a.u++;a.pts++;}
    }
  });
  return Object.values(teams).sort((a,b)=>b.pts-a.pts||(b.tore-b.gegen)-(a.tore-a.gegen)||b.tore-a.tore);
}

function renderGroupTable(group){
  const rows=calcGroupTable(group);
  if(!rows.length)return'';
  let html=`<div class="grp-section-title">Gruppentabelle — Gruppe ${group}</div>
  <table class="grp-table"><thead><tr><th>Team</th><th>Sp</th><th>S</th><th>U</th><th>N</th><th>Tore</th><th>Pkt</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const cls=i<2?'qualified':i===2?'qualified-3rd':'';
    html+=`<tr class="${cls}"><td>${flagSmEl(r.name)}${r.name}</td><td>${r.sp}</td><td>${r.g}</td><td>${r.u}</td><td>${r.v}</td><td>${r.tore}:${r.gegen}</td><td><strong>${r.pts}</strong></td></tr>`;
  });
  html+=`</tbody></table>
  <div class="grp-legend">
    <div style="display:flex;align-items:center;gap:5px;"><div class="grp-legend-dot" style="background:#16a34a;border-radius:2px;width:10px;height:10px;"></div><span>Direkt weiter (Platz 1 & 2)</span></div>
    <div style="display:flex;align-items:center;gap:5px;"><div class="grp-legend-dot" style="background:#ea580c;border-radius:2px;width:10px;height:10px;"></div><span>Evtl. weiter als bester Dritter</span></div>
  </div>`;
  return html;
}

async function saveTip(mid,side,delta){
  if(!state.user)return;
  const t=state.tips[mid]||{home:null,away:null};
  let hv=t.home,av=t.away;
  if(side==='h')hv=Math.max(0,Math.min(9,(hv===null?0:hv)+delta));
  else av=Math.max(0,Math.min(9,(av===null?0:av)+delta));
  state.tips[mid]={home:hv,away:av};
  render();
  if(hv!==null&&av!==null){
    try{await api('/api/tips',{method:'POST',body:JSON.stringify({match_id:mid,home_tip:hv,away_tip:av})});}
    catch(e){console.error(e);}
  }
}

function renderMobileGroupBar(){
  if(state.page !== 'spielplan') return '';
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  const koItems = [
    ['SF','16tel'],['AF','Achtel'],['VF','Viertel'],['HF','Halb'],['FIN','🏆 Finale']
  ];
  let html = '<div class="mobile-group-bar">';
  groups.forEach(g => {
    html += `<button class="mgb-btn${state.group===g?' active':''}" onclick="setGroup('${g}')">Gr. ${g}</button>`;
  });
  html += '<div class="mgb-sep"></div>';
  koItems.forEach(([id,label]) => {
    html += `<button class="mgb-btn${state.group===id?' active':''}" onclick="setGroup('${id}')">${label}</button>`;
  });
  html += '</div>';
  return html;
}

function renderHeader(){
  const navItems=[
    ['welcome','🏠 Start'],
    ['spielplan','⚽ Spielplan'],
    ['spielbaum','🌳 Spielbaum'],
    ['tabelle','🏆 Tabelle'],
    ['auswertung','📊 Auswertung'],
    ['profil','👤 Profil'],
    state.isAdmin?['admin','🔧 Admin']:null,
  ];
  const uArea=state.user
    ?`<div style="display:flex;align-items:center;gap:8px;cursor:pointer;" onclick="setPage('profil')">
        ${state.user.avatar?`<img class="uav" src="${state.user.avatar}" alt="${state.user.username}">`:
          `<div class="uav-ph">${initials(state.user.username)}</div>`}
        <span class="uname">${state.user.username}</span>
      </div>
      <button class="logout-btn" onclick="setPage('profil')" style="border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.7);">Profil</button>
      <button class="logout-btn" onclick="doLogout()">Abmelden</button>`
    :`<button class="login-btn" onclick="setPage('login')">Anmelden / Registrieren</button>`;
  return`<header class="topbar">
    <a class="logo" onclick="setPage('welcome')">
      <div class="de-flag"><span class="de-f1"></span><span class="de-f2"></span><span class="de-f3"></span></div>
      <div class="logo-text"><span class="logo-main">Fanclub Manelo98</span><span class="logo-sub">WM Tippspiel 2026</span></div>
    </a>
    <nav class="topnav">
      ${navItems.filter(Boolean).map(([id,label])=>`<a class="${state.page===id?'active':''}" onclick="setPage('${id}')">${label}</a>`).join('')}
    </nav>
    <div class="user-area">${uArea}</div>
  </header>
  <div class="de-stripe"></div>`;
}

function renderSidebar(){

  const matches=state.matches.filter(m=>isKO?m.group.startsWith(state.group)||m.group===state.group:m.group===state.group);

    html+=`<div class="bot-bar">💬 <span>Melde dich an um Tipps abzugeben. <a href="#" onclick="setPage('login');return false;" style="color:#5865f2;font-weight:700;">Jetzt anmelden →</a></span></div>`;

function wmTrophy(place){
  const configs = {
    1: {
      cup: ['#FFD700','#FFA500','#FFE55C','#CC8800'],
      stem: ['#DAA520','#B8860B'],
      base: ['#FFD700','#CC8800'],
      textColor: '#7A4F00',
      size: 72
    },
    2: {
      cup: ['#E8E8E8','#A0A0A0','#F5F5F5','#888888'],
      stem: ['#C0C0C0','#909090'],
      base: ['#C0C0C0','#909090'],
      textColor: '#444444',
      size: 62
    },
    3: {
      cup: ['#CD7F32','#8B4513','#E8A46A','#7B3F00'],
      stem: ['#B87333','#8B4513'],
      base: ['#CD7F32','#8B4513'],
      textColor: '#5C2800',
      size: 54
    }
  };
  const c = configs[place];
  const s = c.size;
  const label = place === 1 ? '1.' : place === 2 ? '2.' : '3.';
  const fontSize = place === 1 ? 13 : place === 2 ? 12 : 11;
  return `<svg width="${s}" height="${s}" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="cup${place}" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="${c.cup[0]}"/>
        <stop offset="50%" stop-color="${c.cup[1]}"/>
        <stop offset="100%" stop-color="${c.cup[2]}"/>
      </linearGradient>
      <linearGradient id="stem${place}" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="${c.stem[0]}"/>
        <stop offset="100%" stop-color="${c.stem[1]}"/>
      </linearGradient>
      <linearGradient id="base${place}" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="${c.base[0]}"/>
        <stop offset="100%" stop-color="${c.base[1]}"/>
      </linearGradient>
    </defs>
    <!-- Henkel links -->
    <path d="M22 32 Q8 32 8 48 Q8 62 22 62" fill="none" stroke="url(#cup${place})" stroke-width="5" stroke-linecap="round"/>
    <!-- Henkel rechts -->
    <path d="M78 32 Q92 32 92 48 Q92 62 78 62" fill="none" stroke="url(#cup${place})" stroke-width="5" stroke-linecap="round"/>
    <!-- Pokal-Körper (WM-Form: oben breiter, Taille, unten breiter) -->
    <path d="M22 18 Q50 12 78 18 L72 55 Q65 72 58 76 L58 90 L42 90 Q35 72 28 55 Z" fill="url(#cup${place})"/>
    <!-- Glanzeffekt -->
    <path d="M30 22 Q40 18 52 20 L48 40 Q40 36 32 38 Z" fill="white" opacity="0.25"/>
    <!-- Fuß/Stiel -->
    <rect x="42" y="90" width="16" height="8" rx="2" fill="url(#stem${place})"/>
    <!-- Basis -->
    <rect x="28" y="98" width="44" height="10" rx="3" fill="url(#base${place})"/>
    <!-- Platz-Nummer im Pokal -->
    <text x="50" y="52" text-anchor="middle" dominant-baseline="central"
      font-family="Arial,sans-serif" font-size="${fontSize}" font-weight="900"
      fill="${c.textColor}" opacity="0.85">${label}</text>
  </svg>`;
}

async function uploadAvatar(input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024){ alert('Bild zu groß! Maximal 5MB.'); return; }
  const prog = document.getElementById('upload-progress');
  if(prog) prog.style.display='block';
  const formData = new FormData();
  formData.append('file', file);
  try{
    const r = await fetch('/api/upload-avatar', {method:'POST', credentials:'include', body:formData});
    if(!r.ok){ const e=await r.json(); throw new Error(e.detail||'Fehler'); }
    const data = await r.json();
    state.user.avatar = data.avatar;
    if(prog) prog.style.display='none';
    const sucEl = document.getElementById('prof-success');
    if(sucEl){ sucEl.textContent='✓ Profilbild erfolgreich hochgeladen!'; sucEl.style.display='block'; setTimeout(()=>sucEl.style.display='none',3000); }
    render();
  }catch(e){
    if(prog) prog.style.display='none';
    const errEl=document.getElementById('prof-err');
    if(errEl){ errEl.textContent=e.message; errEl.style.display='block'; }
  }
}

function previewAvatar(url){
  const el=document.getElementById('av-preview');
  if(!el)return;
  if(url&&url.startsWith('http')){
    el.outerHTML=`<img class="avatar-preview" src="${url}" alt="Vorschau" id="av-preview" onerror="this.style.opacity='.3'">`;
  }
}

async function saveProfile(){
  const name=document.getElementById('prof-name')?.value?.trim();
  const avatarUrl=document.getElementById('prof-avatar')?.value?.trim();
  const errEl=document.getElementById('prof-err');
  const sucEl=document.getElementById('prof-success');
  if(!name){if(errEl){errEl.textContent='Bitte einen Anzeigenamen eingeben.';errEl.style.display='block';}return;}
  try{
    await api('/api/profile',{method:'POST',body:JSON.stringify({username:name,avatar_url:avatarUrl})});
    state.user.username=name;
    if(avatarUrl)state.user.avatar=avatarUrl;
    if(errEl)errEl.style.display='none';
    if(sucEl){sucEl.style.display='block';setTimeout(()=>sucEl.style.display='none',3000);}
    render();
  }catch(e){
    if(errEl){errEl.textContent=e.message;errEl.style.display='block';}
  }
}

async function loadAdminUsers(){
  try{
    const users=await api('/api/admin/users');
    const count=document.getElementById('admin-user-count');
    const body=document.getElementById('admin-users-body');
    if(count)count.textContent=users.length+' Mitspieler';
    if(!body)return;
    if(!users.length){body.innerHTML='<div style="padding:16px;color:var(--muted);font-size:13px;">Noch keine Mitspieler</div>';return;}
    let html='<table class="admin-table"><thead><tr><th>Avatar</th><th>Anzeigename</th><th>Discord</th><th>Tipps</th><th>Punkte</th><th>Angemeldet</th><th>Aktionen</th></tr></thead><tbody>';
    users.forEach(u=>{
      const col=avatarColor(u.username);
      const av=u.avatar?`<img src="${u.avatar}" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">`:
        `<div style="width:28px;height:28px;border-radius:50%;background:${col};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;">${initials(u.username)}</div>`;
      const joined=u.joined_at?u.joined_at.split('T')[0]:'—';
      html+=`<tr>
        <td>${av}</td>
        <td><strong>${u.username}</strong></td>
        <td style="color:var(--muted);font-size:12px;">${u.discord_id||'E-Mail'}</td>
        <td>${u.tips}</td>
        <td><strong>${u.points}</strong></td>
        <td style="font-size:12px;color:var(--muted);">${joined}</td>
        <td style="display:flex;gap:5px;">
          <button class="admin-btn admin-btn-gold" onclick="adminResetUserTips(${u.id},'${u.username}')">Tipps reset</button>
          <button class="admin-btn admin-btn-red" onclick="adminDeleteUser(${u.id},'${u.username}')">Löschen</button>
        </td>
      </tr>`;
    });
    html+='</tbody></table>';
    body.innerHTML=html;
  }catch(e){console.error(e);}
}

async function adminDeleteUser(id,name){
  if(!confirm(`Nutzer "${name}" wirklich löschen? Alle Tipps werden ebenfalls gelöscht!`))return;
  try{
    await api(`/api/admin/users/${id}`,{method:'DELETE'});
    await loadAdminUsers();
    if(state.user)state.rankings=await api('/api/rankings');
    render();
  }catch(e){alert('Fehler: '+e.message);}
}

async function adminResetUserTips(id,name){
  if(!confirm(`Alle Tipps von "${name}" zurücksetzen?`))return;
  try{
    await api(`/api/admin/reset-user-tips/${id}`,{method:'POST'});
    await loadAdminUsers();
  }catch(e){alert('Fehler: '+e.message);}
}

async function adminResetTips(){
  if(!confirm('ALLE Tipps aller Mitspieler zurücksetzen? Dies kann nicht rückgängig gemacht werden!'))return;
  try{
    await api('/api/admin/reset-tips',{method:'POST'});
    state.tips={};state.rankings=[];state.results=[];
    await loadAdminUsers();
    render();
    alert('Alle Tipps wurden zurückgesetzt!');
  }catch(e){alert('Fehler: '+e.message);}
}

async function adminResetUsers(){
  if(!confirm('ALLE Nutzer und Tipps löschen? Alle müssen sich neu anmelden!'))return;
  if(!confirm('Wirklich sicher? Diese Aktion kann NICHT rückgängig gemacht werden!'))return;
  try{
    await api('/api/admin/reset-users',{method:'POST'});
    state.tips={};state.rankings=[];state.results=[];state.user=null;
    state.page='welcome';render();
    alert('Alle Nutzer wurden gelöscht!');
  }catch(e){alert('Fehler: '+e.message);}
}

async function adminSetResult(){
  const matchId=document.getElementById('admin-match-sel')?.value;
  const homeScore=parseInt(document.getElementById('admin-home-score')?.value);
  const awayScore=parseInt(document.getElementById('admin-away-score')?.value);
  if(!matchId){alert('Bitte ein Spiel auswählen!');return;}
  if(isNaN(homeScore)||isNaN(awayScore)){alert('Bitte Ergebnis eingeben!');return;}
  try{
    await api('/api/admin/result',{method:'POST',body:JSON.stringify({match_id:parseInt(matchId),home_score:homeScore,away_score:awayScore})});
    state.matches=await api('/api/matches');
    state.rankings=await api('/api/rankings');
    state.results=await api('/api/results');
    render();
    setTimeout(loadAdminUsers,500);
    alert('Ergebnis eingetragen und Punkte vergeben!');
  }catch(e){alert('Fehler: '+e.message);}
}

async function adminFetchScores(){
  const msg=document.getElementById("fetch-scores-msg");
  if(msg)msg.textContent="Wird abgerufen...";
  try{
    await api("/api/admin/fetch-scores",{method:"POST"});
    state.matches=await api("/api/matches");
    if(msg)msg.textContent="✅ Erfolgreich abgerufen!";
    setTimeout(()=>{if(msg)msg.textContent="";},3000);
    render();
    setTimeout(loadAdminUsers,500);
  }catch(e){
    if(msg)msg.textContent="❌ Fehler: "+e.message;
  }
}

function togglePw(){const i=document.getElementById('f-pw');if(i)i.type=i.type==='password'?'text':'password';}
function checkStr(v){
  const f=document.getElementById('str-fill');if(!f)return;
  let s=0;if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  f.style.width=(s*25)+'%';f.style.background=s<=1?'#dc2626':s===2?'#ea580c':s===3?'#ca8a04':'#16a34a';
}
function showErr(m){const e=document.getElementById('err-msg');if(e){e.textContent=m;e.style.display='block';}}

async function doLogin(){
  const email=document.getElementById('f-email')?.value?.trim();
  const pw=document.getElementById('f-pw')?.value;
  if(!email||!pw){showErr('Bitte alle Felder ausfüllen.');return;}
  try{
    await api('/api/login',{method:'POST',body:JSON.stringify({email,password:pw})});
    state.user=await api('/api/me');
    state.tips=await api('/api/tips');
    state.rankings=await api('/api/rankings');
    state.results=await api('/api/results');
    state.page='welcome';render();
  }catch(e){showErr(e.message);}
}

async function doRegister(){
  const name=document.getElementById('f-name')?.value?.trim();
  const email=document.getElementById('f-email')?.value?.trim();
  const pw=document.getElementById('f-pw')?.value;
  if(!name||!email||!pw){showErr('Bitte alle Felder ausfüllen.');return;}
  if(pw.length<8){showErr('Passwort muss mindestens 8 Zeichen haben.');return;}
  try{
    await api('/api/register',{method:'POST',body:JSON.stringify({username:name,email,password:pw})});
    state.user=await api('/api/me');
    state.tips=await api('/api/tips');
    state.rankings=await api('/api/rankings');
    state.page='welcome';render();
  }catch(e){showErr(e.message);}
}

async function doLogout(){
  await api('/api/logout',{method:'POST'});
  state.user=null;state.tips={};state.rankings=[];state.results=[];
  state.page='welcome';render();
}

function setPage(p){
  state.page=p;
  if(p==='spielplan')state.group='A';
  render();
}
function setGroup(g){state.group=g;state.page='spielplan';render();}

function render(){
  const root=document.getElementById('root');
  if(state.loading){root.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:18px;color:#999;">⚽ Wird geladen…</div>`;return;}

  if(state.page==='login'){root.innerHTML=renderHeader()+renderLogin();return;}

  let content='';
  if(state.page==='welcome')content=renderWelcome();
  else if(state.page==='spielplan')content=renderSpielplan();
  else if(state.page==='tabelle')content=renderTabelle();
  else if(state.page==='auswertung')content=renderAuswertung();
  else if(state.page==='profil')content=renderProfil();
  else if(state.page==='admin')content=renderAdmin();
  else if(state.page==='spielbaum')content=renderSpielbaum();

  const hasSidebar=state.page==='spielplan';
  root.innerHTML=renderHeader()+renderMobileGroupBar()+`
    <div class="layout">
      ${hasSidebar?renderSidebar():''}
      <main class="main">${content}</main>
    </div>`;
  if(state.page==='admin')setTimeout(loadAdminUsers,100);
}


function renderSpielbaum(){
  const ms = state.matches || [];

  function getSpiele(prefix){
    return ms.filter(m=>m.group && m.group.startsWith(prefix)).sort((a,b)=>a.id-b.id);
  }

  function scoreHtml(m){
    if(m.status==='done' && m.home_score!==null && m.away_score!==null){
      return`<span class="sb-score done">${m.home_score} : ${m.away_score}</span>`;
    } else if(m.status==='live' && m.home_score!==null){
      return`<span class="sb-score live">🔴 ${m.home_score} : ${m.away_score}</span>`;
    }
    return`<span class="sb-score-open">– : –</span>`;
  }

  function renderRunde(titel, prefix, datum){
    const spiele = getSpiele(prefix);
    if(!spiele.length) return '';
    const rows = spiele.map((m,i)=>`
      <tr>
        <td class="nr">${m.id}</td>
        <td class="datum">${m.date||''}</td>
        <td class="uhrzeit">${m.time||''}</td>
        <td class="spiel">${m.home} <span style="color:var(--hint);font-weight:400;">vs</span> ${m.away}</td>
        <td class="ergebnis">${scoreHtml(m)}</td>
      </tr>`).join('');
    return`
    <div class="sb-runde">
      <div class="sb-runde-header">
        <h3>${titel}</h3>
        <span>${datum}</span>
      </div>
      <table class="sb-table">
        <thead><tr>
          <th>#</th><th>Datum</th><th>Uhrzeit</th><th>Spiel</th><th>Ergebnis</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  // Finale separat
  const finale = ms.find(m=>m.group==='FIN');
  let finaleHtml = '';
  if(finale){
    const isDone = finale.status==='done' && finale.home_score!==null;
    finaleHtml=`
    <div class="finale-card">
      <h3>🏆 FINALE</h3>
      <div class="finale-datum">19. Juli 2026 · 21:00 Uhr · New York/New Jersey</div>
      <div class="finale-teams">
        <span>${finale.home}</span>
        <span class="finale-vs">vs</span>
        <span>${finale.away}</span>
      </div>
      ${isDone
        ?`<div class="finale-score">${finale.home_score} : ${finale.away_score}</div>
          <div class="weltmeister-box">🏆 Weltmeister: ${finale.home_score > finale.away_score ? finale.home : finale.away}</div>`
        :`<div style="color:rgba(255,255,255,.4);margin-top:12px;font-size:13px;">Ergebnis ausstehend</div>`}
    </div>`;
  }

  return`<div class="spielbaum-page">
    <div class="spielbaum-title">
      <h2>🌳 WM 2026 — <span>Spielbaum</span></h2>
      <p>Alle K.O.-Spiele der Fussball Weltmeisterschaft 2026</p>
    </div>

    ${renderRunde('Sechzehntelfinale', 'SF', '28. Juni – 4. Juli 2026')}
    ${renderRunde('Achtelfinale', 'AF', '4. Juli – 8. Juli 2026')}
    ${renderRunde('Viertelfinale', 'VF', '9. Juli – 11. Juli 2026')}
    ${renderRunde('Halbfinale', 'HF', '14. – 15. Juli 2026')}
    ${renderRunde('Spiel um Platz 3', 'P3', '18. Juli 2026')}
    ${finaleHtml}
  </div>`;
}
