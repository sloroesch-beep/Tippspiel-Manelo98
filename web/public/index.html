<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WM Tippspiel 2026 — Fanclub Manelo98</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#1a1a1a;--red:#cc0000;--gold:#ffcc00;--gold-light:#ffe566;--gold-dark:#b8960a;
  --dark:#111;--dark2:#1e1e1e;--surface:#fff;--bg:#f5f5f5;--border:#e0e0e0;
  --text:#1a1a1a;--muted:#666;--hint:#999;
  --green:#16a34a;--green-bg:#dcfce7;--orange:#ea580c;--discord:#5865f2;
  --radius:10px;--radius-sm:6px;
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}body.spielbaum-page{overflow-x:hidden;}
img{max-width:100%;}

/* TOP BAR */
.topbar{background:var(--dark);border-bottom:3px solid var(--gold);padding:0 20px;display:flex;align-items:center;height:54px;position:sticky;top:0;z-index:100;}
.logo{color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.de-flag{display:flex;flex-direction:column;width:24px;height:16px;border-radius:2px;overflow:hidden;flex-shrink:0;border:1px solid rgba(255,255,255,.2);}
.de-flag span{flex:1;display:block;}
.de-f1{background:#1a1a1a;}
.de-f2{background:#cc0000;}
.de-f3{background:#ffcc00;}
.logo-text{display:flex;flex-direction:column;line-height:1.2;}
.logo-main{color:#fff;font-size:14px;font-weight:700;}
.logo-sub{color:var(--gold);font-size:10px;font-weight:400;letter-spacing:.5px;}
.topnav{display:flex;margin-left:20px;gap:0;}
.topnav a{padding:0 13px;height:54px;display:flex;align-items:center;font-size:13px;color:rgba(255,255,255,.5);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;}
.topnav a.active,.topnav a:hover{color:#fff;}
.topnav a.active{border-bottom-color:var(--gold);}
.user-area{margin-left:auto;display:flex;align-items:center;gap:10px;}
.uav{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);}
.uav-ph{width:30px;height:30px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;border:2px solid var(--gold);}
.uname{color:rgba(255,255,255,.85);font-size:13px;}
.logout-btn{background:none;border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.6);padding:4px 10px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;transition:all .15s;}
.logout-btn:hover{border-color:var(--gold);color:var(--gold);}
.login-btn{background:var(--gold);border:none;color:var(--black);padding:6px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.login-btn:hover{background:var(--gold-light);}

/* DE STRIPE */
.de-stripe{height:5px;background:linear-gradient(to right, #1a1a1a 33.3%, #cc0000 33.3% 66.6%, #ffcc00 66.6%);}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 59px);overflow-x:visible;}
.sidebar{width:190px;background:var(--surface);border-right:1px solid var(--border);padding:12px 8px;flex-shrink:0;}

/* SPIELBAUM LEGACY */
.spielbaum-page{padding:4px 0;}
.spielbaum-title{text-align:center;margin-bottom:20px;}
.spielbaum-title h2{font-size:22px;font-weight:700;color:var(--black);}
.spielbaum-title h2 span{color:var(--red);}
.spielbaum-title p{font-size:13px;color:var(--muted);margin-top:4px;}

.sb-runde{margin-bottom:24px;}
.sb-runde-header{background:var(--dark);color:#fff;padding:10px 16px;border-radius:var(--radius) var(--radius) 0 0;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);}
.sb-runde-header h3{font-size:14px;font-weight:700;letter-spacing:.3px;}
.sb-runde-header span{font-size:12px;color:rgba(255,255,255,.6);}

.sb-table{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;}
.sb-table th{background:#f0f0f0;padding:8px 12px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);}
.sb-table th:not(:first-child){text-align:center;}
.sb-table td{padding:9px 12px;border-bottom:1px solid #f0f0f0;font-size:13px;vertical-align:middle;}
.sb-table tr:last-child td{border-bottom:none;}
.sb-table tr:hover td{background:#fafafa;}
.sb-table td.nr{color:var(--hint);font-size:11px;width:28px;}
.sb-table td.datum{color:var(--muted);font-size:12px;white-space:nowrap;width:80px;}
.sb-table td.uhrzeit{color:var(--muted);font-size:12px;width:50px;}
.sb-table td.ort{color:var(--muted);font-size:12px;width:120px;}
.sb-table td.spiel{font-weight:600;}
.sb-table td.ergebnis{text-align:center;width:80px;}
.sb-score{display:inline-flex;align-items:center;gap:4px;background:var(--dark);color:#fff;padding:3px 10px;border-radius:20px;font-size:13px;font-weight:700;}
.sb-score.done{background:var(--green);}
.sb-score.live{background:var(--red);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}
.sb-score-open{color:var(--hint);font-size:12px;}

.finale-card{background:var(--dark);border:3px solid var(--gold);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:24px;}
.finale-card h3{color:var(--gold);font-size:18px;font-weight:700;margin-bottom:4px;}
.finale-card .finale-datum{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:16px;}
.finale-teams{display:flex;align-items:center;justify-content:center;gap:20px;font-size:20px;font-weight:700;color:#fff;}
.finale-vs{color:var(--gold);font-size:24px;}
.finale-score{font-size:28px;font-weight:700;color:var(--gold);margin-top:12px;}
.weltmeister-box{margin-top:16px;background:var(--gold);color:var(--black);padding:10px 20px;border-radius:var(--radius-sm);font-size:16px;font-weight:700;display:inline-block;}

.sb-sec{font-size:10px;font-weight:700;color:var(--hint);letter-spacing:.6px;text-transform:uppercase;padding:12px 8px 5px;}
.sb-sec:first-child{padding-top:4px;}
.sb-link{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:var(--radius-sm);font-size:13px;color:var(--muted);cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left;}
.sb-link:hover{background:#f5f5f5;color:var(--text);}
.sb-link.active{background:#fff8dc;color:#8b6914;font-weight:600;border-left:3px solid var(--gold);}
.sb-link.locked{opacity:.4;cursor:default;}
.sb-link.locked:hover{background:none;color:var(--muted);}
.main{flex:1;padding:20px 24px;max-width:860px;}.main.full-width{max-width:100vw;padding:0;overflow:visible;width:100vw;margin-left:calc(-50vw + 50%);}

/* WELCOME PAGE */
.welcome-hero{background:var(--dark);border-radius:var(--radius);overflow:hidden;margin-bottom:20px;position:relative;}
.hero-stripe{height:6px;background:linear-gradient(to right,#1a1a1a 33.3%,#cc0000 33.3% 66.6%,#ffcc00 66.6%);}
.hero-body{padding:36px 32px;display:flex;align-items:center;gap:32px;}
.hero-flag-big{display:flex;flex-direction:column;width:72px;height:48px;border-radius:6px;overflow:hidden;flex-shrink:0;border:2px solid rgba(255,255,255,.15);}
.hero-flag-big span{flex:1;display:block;}
.hero-text h1{color:#fff;font-size:26px;font-weight:700;margin-bottom:6px;}
.hero-text h1 span{color:var(--gold);}
.hero-text p{color:rgba(255,255,255,.6);font-size:14px;line-height:1.6;max-width:460px;}
.hero-btns{display:flex;gap:10px;margin-top:20px;}
.hero-btn-primary{background:var(--gold);border:none;color:var(--black);padding:10px 22px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
.hero-btn-primary:hover{background:var(--gold-light);}
.hero-btn-secondary{background:none;border:1.5px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);padding:10px 22px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;transition:all .15s;}
.hero-btn-secondary:hover{border-color:var(--gold);color:var(--gold);}

.welcome-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;}
.wcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center;}
.wcard-icon{font-size:28px;margin-bottom:10px;}
.wcard h3{font-size:14px;font-weight:600;margin-bottom:6px;}
.wcard p{font-size:12px;color:var(--muted);line-height:1.5;}

.points-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;margin-bottom:20px;}
.points-box h3{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text);}
.pts-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pts-card{border-radius:var(--radius-sm);padding:12px;text-align:center;}
.pts-card.exact{background:#dcfce7;border:1px solid #86efac;}
.pts-card.tend{background:#fef9c3;border:1px solid #fde047;}
.pts-card.wrong{background:#f5f5f5;border:1px solid var(--border);}
.pts-num{font-size:26px;font-weight:700;}
.pts-card.exact .pts-num{color:#16a34a;}
.pts-card.tend .pts-num{color:#ca8a04;}
.pts-card.wrong .pts-num{color:var(--hint);}
.pts-label{font-size:11px;color:var(--muted);margin-top:3px;}

.login-teaser{background:var(--dark);border-radius:var(--radius);padding:20px 24px;display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.login-teaser-text h3{color:#fff;font-size:15px;font-weight:600;margin-bottom:4px;}
.login-teaser-text p{color:rgba(255,255,255,.55);font-size:13px;}
.login-teaser-btn{background:var(--gold);border:none;color:var(--black);padding:9px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;}
.login-teaser-btn:hover{background:var(--gold-light);}

/* MATCH CARDS */
.group-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:12px 0 7px;display:flex;align-items:center;gap:6px;}
.group-label:first-child{padding-top:0;}
.match-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;margin-bottom:6px;transition:border-color .15s;}
.match-card:hover{border-color:#ccc;}
.match-card.tipped{border-color:#86efac;background:#f0fdf4;}
.match-top{display:flex;align-items:center;gap:6px;margin-bottom:11px;}
.match-time{font-size:11px;color:var(--muted);}
.status-pill{margin-left:auto;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;}
.pill-open{background:#fff8dc;color:#8b6914;}
.pill-done{background:var(--green-bg);color:#166534;}
.teams-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.team-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0;}
.team-flag{width:48px;height:32px;object-fit:cover;border-radius:4px;border:1px solid var(--border);}
.team-flag-fallback{width:48px;height:32px;border-radius:4px;border:1px solid var(--border);background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:20px;}
.team-name{font-size:12px;font-weight:600;color:var(--text);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.score-center{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;}
.score-label{font-size:10px;font-weight:700;color:var(--hint);letter-spacing:.4px;}
.score-row{display:flex;align-items:center;gap:4px;}
.score-box{width:36px;height:36px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:#f9f9f9;font-size:16px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center;user-select:none;}
.score-box.filled{background:var(--surface);border-color:var(--gold-dark);}
.score-colon{font-size:18px;color:var(--hint);font-weight:300;}
.ctrl-row{display:flex;gap:3px;}
.ctrl{width:28px;height:22px;border:1px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all .1s;}
.ctrl:hover{background:#f0f0f0;color:var(--text);}
.ctrl.plus:hover{background:#fff8dc;border-color:var(--gold-dark);color:var(--gold-dark);}
.ctrl.minus:hover{background:#fee2e2;border-color:#fca5a5;color:#dc2626;}

/* GROUP TABLE */
.grp-section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:16px 0 8px;}
.grp-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.grp-table th{background:var(--dark);color:#fff;padding:8px 10px;font-weight:600;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;}
.grp-table th:not(:first-child){text-align:center;}
.grp-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);}
.grp-table td:not(:first-child){text-align:center;color:var(--muted);}
.grp-table tr:last-child td{border-bottom:none;}
.grp-table tr.qualified td{background:#f0fdf4;}
.grp-table tr.qualified td:first-child{border-left:3px solid var(--green);}
.grp-table tr.qualified-3rd td{background:#fffbeb;}
.grp-table tr.qualified-3rd td:first-child{border-left:3px solid var(--orange);}
.team-flag-sm{width:20px;height:14px;object-fit:cover;border-radius:2px;vertical-align:middle;margin-right:5px;}
.grp-legend{display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--muted);flex-wrap:wrap;}
.grp-legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* KO CARDS */
.ko-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;gap:10px;transition:border-color .15s;}
.ko-card:hover{border-color:#ccc;}
.ko-card.tipped{border-color:#86efac;background:#f0fdf4;}
.ko-team{flex:1;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;}
.ko-team.right{justify-content:flex-end;}
.ko-placeholder{font-size:12px;color:var(--muted);font-style:italic;font-weight:400;}
.ko-date{font-size:10px;color:var(--hint);}

/* RANKINGS */
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;}
.rank-head{background:var(--dark);border-bottom:3px solid var(--gold);padding:11px 18px;display:flex;align-items:center;gap:8px;}
.rank-head h2{color:#fff;font-size:13px;font-weight:700;}
.rank-head span{color:rgba(255,255,255,.4);font-size:12px;margin-left:auto;}
.rank-row{display:flex;align-items:center;padding:10px 18px;border-bottom:1px solid var(--border);gap:12px;transition:background .1s;}
.rank-row:last-child{border-bottom:none;}
.rank-row:hover{background:#fafafa;}
.rpos{width:24px;font-size:13px;font-weight:700;color:var(--muted);flex-shrink:0;}
.rname{flex:1;display:flex;align-items:center;gap:9px;font-size:14px;font-weight:500;}
.rav{width:28px;height:28px;border-radius:50%;object-fit:cover;}
.rav-ph{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;}
.rbar-w{width:80px;height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden;}
.rbar{height:5px;border-radius:3px;}
.rpts{font-weight:700;font-size:15px;color:var(--black);min-width:30px;text-align:right;}
.rtips{font-size:11px;color:var(--hint);min-width:50px;text-align:right;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.stat-c{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
.stat-v{font-size:22px;font-weight:700;color:var(--black);}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px;}

/* RESULTS */
.res-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px;}
.res-head{background:var(--dark);border-bottom:3px solid var(--gold);padding:10px 16px;display:flex;align-items:center;gap:8px;}
.res-head h3{color:#fff;font-size:13px;font-weight:700;}
.res-row{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid var(--border);gap:8px;font-size:13px;}
.res-row:last-child{border-bottom:none;}
.res-name{width:90px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.res-tip{flex:1;color:var(--muted);}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;}
.badge-exact{background:var(--green-bg);color:#166534;}
.badge-tend{background:#fef9c3;color:#854d0e;}
.badge-wrong{background:#f5f5f5;color:var(--hint);}
.res-pts{font-weight:700;font-size:13px;min-width:36px;text-align:right;}

/* AUTH */
.auth-scene{min-height:calc(100vh - 59px);display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px 16px;}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:390px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.08);}
.auth-top{background:var(--dark);padding:0;}
.auth-top-stripe{height:5px;background:linear-gradient(to right,#1a1a1a 33.3%,#cc0000 33.3% 66.6%,#ffcc00 66.6%);}
.auth-top-body{padding:24px;text-align:center;}
.auth-top-flag{display:flex;flex-direction:column;width:42px;height:28px;border-radius:4px;overflow:hidden;margin:0 auto 12px;border:1px solid rgba(255,255,255,.2);}
.auth-top-flag span{flex:1;display:block;}
.auth-top h1{color:#fff;font-size:18px;font-weight:700;margin-bottom:3px;}
.auth-top h1 span{color:var(--gold);}
.auth-top p{color:rgba(255,255,255,.5);font-size:12px;}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);}
.auth-tab{flex:1;padding:11px;font-size:13px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border:none;border-bottom:3px solid transparent;background:none;transition:all .15s;}
.auth-tab.active{color:var(--black);border-bottom-color:var(--gold);}
.auth-body{padding:22px 24px;}
.disc-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--discord);color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity .15s;}
.disc-btn:hover{opacity:.88;}
.info-box{border-radius:var(--radius-sm);padding:9px 12px;font-size:12px;margin-bottom:12px;display:flex;gap:7px;align-items:flex-start;line-height:1.4;}
.info-discord{background:#eef0fd;border:1px solid #c7d2fe;color:#3730a3;}
.info-privacy{background:#f0fdf4;border:1px solid #86efac;color:#166534;}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;}
.div-line{flex:1;height:1px;background:var(--border);}
.div-text{font-size:11px;color:var(--hint);}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:5px;}
.field label .hint-tag{font-weight:400;color:var(--hint);font-size:10px;margin-left:4px;}
.field input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border-color .12s;}
.field input:focus{border-color:var(--gold-dark);}
.field input::placeholder{color:var(--hint);}
.pw-wrap{position:relative;}
.pw-wrap input{padding-right:38px;}
.eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--hint);font-size:16px;line-height:1;padding:2px;}
.str-bar{height:3px;border-radius:2px;background:#e5e7eb;margin-top:5px;overflow:hidden;}
.str-fill{height:100%;border-radius:2px;transition:width .2s,background .2s;}
.submit-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--dark);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;transition:all .15s;border-bottom:3px solid var(--gold);}
.submit-btn:hover{background:#222;}
.err-msg{background:#fee2e2;color:#991b1b;font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:12px;display:none;}
.auth-hint{font-size:11px;color:var(--hint);text-align:center;margin-top:14px;line-height:1.5;}
.auth-hint a{color:var(--discord);cursor:pointer;text-decoration:none;}
.dc-modal{text-align:center;padding:24px;}
.dc-modal h2{font-size:15px;font-weight:700;margin-bottom:6px;}
.dc-modal p{font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.perm-list{text-align:left;background:#f9f9f9;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:18px;}
.perm-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:4px 0;}
.perm-ok{color:var(--green);}
.perm-no{color:var(--red);}
.dc-auth-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--discord);color:#fff;font-size:14px;font-weight:700;border:none;cursor:pointer;}
.back-link{display:block;font-size:12px;color:var(--muted);cursor:pointer;margin-top:12px;}

/* LOCKED OVERLAY */
.locked-overlay{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center;margin-bottom:12px;}
.locked-overlay .lock-icon{font-size:36px;margin-bottom:12px;}
.locked-overlay h3{font-size:16px;font-weight:700;margin-bottom:6px;}
.locked-overlay p{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.locked-overlay button{background:var(--gold);border:none;color:var(--black);padding:10px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;}

.profile-page{max-width:540px;}
.profile-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
.profile-head{background:var(--dark);border-bottom:3px solid var(--gold);padding:14px 20px;display:flex;align-items:center;gap:10px;}
.profile-head h2{color:#fff;font-size:14px;font-weight:700;}
.profile-body{padding:22px 24px;}
.avatar-preview{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid var(--gold);flex-shrink:0;}
.avatar-preview-ph{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;border:3px solid var(--gold);flex-shrink:0;}
.avatar-section{display:flex;align-items:center;gap:20px;margin-bottom:20px;}
.avatar-info h3{font-size:15px;font-weight:700;margin-bottom:4px;}
.avatar-info p{font-size:12px;color:var(--muted);line-height:1.5;}
.upload-btn{background:var(--surface);color:var(--text);border:1.5px dashed var(--border);padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px;}
.upload-btn:hover{border-color:var(--gold-dark);background:#fffbdc;}
.upload-progress{font-size:12px;color:var(--muted);margin-top:6px;display:none;}
.avatar-methods{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.method-label{font-size:11px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.save-btn{background:var(--dark);color:#fff;border:none;border-bottom:3px solid var(--gold);padding:10px 24px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
.save-btn:hover{background:#222;}
.success-msg{background:var(--green-bg);border:1px solid #86efac;color:#166534;font-size:12px;padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:12px;display:none;}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:0;}
.profile-stat{background:#f9f9f9;border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;}
.profile-stat .val{font-size:20px;font-weight:700;color:var(--black);}
.profile-stat .lbl{font-size:11px;color:var(--muted);margin-top:2px;}
.live-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;background:#fee2e2;color:#991b1b;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#dc2626;animation:pulse-dot 1s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.pill-live{background:#fee2e2;color:#991b1b;}
.pill-closed{background:#f5f5f5;color:#666;}
.score-result{font-size:20px;font-weight:700;color:var(--black);}
.tip-locked{font-size:11px;color:var(--red);margin-top:4px;text-align:center;}
.last-update{font-size:11px;color:var(--hint);text-align:right;margin-bottom:8px;}
.podium-wrap{margin-bottom:16px;}
.podium-row{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:16px;}
.podium-card{border-radius:var(--radius);overflow:hidden;text-align:center;position:relative;transition:transform .2s;}
.podium-card:hover{transform:translateY(-3px);}

.podium-1{background:linear-gradient(145deg,#f6d860,#e6b800,#f9e47a);border:2px solid #d4a017;width:200px;padding:20px 16px 16px;}
.podium-2{background:linear-gradient(145deg,#e8e8e8,#b8b8b8,#d8d8d8);border:2px solid #999;width:175px;padding:16px 14px 14px;}
.podium-3{background:linear-gradient(145deg,#e8c4a0,#b87333,#d4956a);border:2px solid #a0522d;width:155px;padding:14px 12px 12px;}

.podium-trophy{font-size:36px;margin-bottom:4px;display:block;}
.podium-1 .podium-trophy{font-size:44px;}
.podium-2 .podium-trophy{font-size:36px;}
.podium-3 .podium-trophy{font-size:30px;}

.podium-place{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;}
.podium-1 .podium-place{color:#8b6914;}
.podium-2 .podium-place{color:#555;}
.podium-3 .podium-place{color:#6b3a1f;}

.podium-av{margin:0 auto 8px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.8);}
.podium-1 .podium-av{width:60px;height:60px;}
.podium-2 .podium-av{width:52px;height:52px;}
.podium-3 .podium-av{width:46px;height:46px;}

.podium-av-ph{margin:0 auto 8px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;border:3px solid rgba(255,255,255,.8);}
.podium-1 .podium-av-ph{width:60px;height:60px;font-size:20px;}
.podium-2 .podium-av-ph{width:52px;height:52px;font-size:17px;}
.podium-3 .podium-av-ph{width:46px;height:46px;font-size:15px;}

.podium-name{font-weight:700;margin-bottom:4px;}
.podium-1 .podium-name{font-size:15px;color:#5c4400;}
.podium-2 .podium-name{font-size:13px;color:#333;}
.podium-3 .podium-name{font-size:12px;color:#4a2000;}

.podium-pts{font-weight:700;border-radius:20px;padding:3px 10px;display:inline-block;}
.podium-1 .podium-pts{background:rgba(255,255,255,.5);color:#8b6914;font-size:15px;}
.podium-2 .podium-pts{background:rgba(255,255,255,.5);color:#555;font-size:13px;}
.podium-3 .podium-pts{background:rgba(255,255,255,.4);color:#6b3a1f;font-size:12px;}

.podium-tips{font-size:10px;margin-top:3px;opacity:.7;}
.podium-1 .podium-tips{color:#8b6914;}
.podium-2 .podium-tips{color:#555;}
.podium-3 .podium-tips{color:#6b3a1f;}

.podium-base{height:8px;border-radius:0 0 6px 6px;margin:8px -16px -16px;}
.podium-1 .podium-base{background:rgba(0,0,0,.15);margin:-16px;}
.podium-2 .podium-base{background:rgba(0,0,0,.12);margin:-14px;}
.podium-3 .podium-base{background:rgba(0,0,0,.12);margin:-12px;}

.admin-page{max-width:980px;padding:0}
/* Tabs */
.adm-tabs{display:flex;gap:2px;padding:10px 10px 0;border-bottom:1px solid #1a1a1a;overflow-x:auto;scrollbar-width:none}
.adm-tabs::-webkit-scrollbar{display:none}
.adm-tab{padding:8px 14px;border-radius:6px 6px 0 0;font-size:12px;font-weight:600;color:#555;cursor:pointer;border:1px solid transparent;border-bottom:none;white-space:nowrap;transition:color .15s,background .15s;-webkit-user-select:none;user-select:none;background:none;font-family:inherit}
.adm-tab:hover{color:#ddd;background:#111}
.adm-tab.active{color:#ffd700;background:#111;border-color:#2a2a2a}
.adm-tab-content{display:none;padding:12px 10px}
.adm-tab-content.active{display:block}
/* Sections */
.adm-section{background:#111;border:1px solid #2a2a2a;border-radius:10px;margin-bottom:12px;overflow:hidden}
.adm-section-head{background:#0d0d0d;border-bottom:1px solid #1a1a1a;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.adm-section-head h2{font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:6px;margin:0}
.adm-section-head span{font-size:11px;color:#555}
.adm-section-body{padding:12px 14px}
/* Dashboard stats */
.adm-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:12px}
.adm-stat{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:12px;text-align:center}
.adm-stat-v{font-size:24px;font-weight:900;color:#ffd700;line-height:1}
.adm-stat-l{font-size:10px;color:#555;margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.adm-stat-sub{font-size:11px;color:#333;margin-top:2px}
/* Buttons */
.adm-btn{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;padding:7px 12px;color:#888;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
.adm-btn:hover{border-color:#555;color:#ddd}
.adm-btn.gold{border-color:#ffd70055;color:#ffd700}
.adm-btn.gold:hover{border-color:#ffd700;background:#1a1200}
.adm-btn.red{border-color:#cc000055;color:#ff6666}
.adm-btn.red:hover{border-color:#cc0000;background:#1a0000}
.adm-btn.green{border-color:#16a34a55;color:#4ade80}
.adm-btn.green:hover{border-color:#16a34a;background:#001a0d}
.adm-btn.blue{border-color:#3b82f655;color:#60a5fa}
.adm-btn.blue:hover{border-color:#3b82f6;background:#00101a}
.adm-btn.orange{border-color:#ea580c55;color:#fb923c}
.adm-btn.orange:hover{border-color:#ea580c;background:#1a0800}
.adm-btn-grid{display:flex;gap:6px;flex-wrap:wrap}
/* Tables */
.adm-table{width:100%;border-collapse:collapse;font-size:11px}
.adm-table th{text-align:left;padding:7px 10px;color:#444;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #1a1a1a;white-space:nowrap}
.adm-table td{padding:7px 10px;border-bottom:1px solid #0d0d0d;vertical-align:middle}
.adm-table tr:last-child td{border-bottom:none}
.adm-table tr:hover td{background:#0d0d0d}
/* Badges */
.adm-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;display:inline-block;white-space:nowrap}
.adm-badge.discord{background:#5865f222;color:#818cf8;border:1px solid #5865f244}
.adm-badge.email{background:#33333322;color:#666;border:1px solid #33333344}
.adm-badge.wm{background:#ffd70022;color:#ffd700;border:1px solid #ffd70044}
.adm-badge.live{background:#16a34a22;color:#4ade80;border:1px solid #16a34a44}
.adm-badge.done{background:#33333322;color:#555;border:1px solid #33333344}
.adm-badge.open{background:#3b82f622;color:#60a5fa;border:1px solid #3b82f644}
/* Tips detail */
.adm-tip-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:5px;border:1px solid #1a1a1a;margin-bottom:3px;font-size:10px;background:#0d0d0d;flex-wrap:wrap}
.adm-tip-match{flex:1;color:#888;min-width:120px}
.adm-tip-score{font-weight:700;color:#ddd;min-width:70px}
.adm-tip-pts.p3{color:#16a34a;font-weight:700}
.adm-tip-pts.p1{color:#ca8a04;font-weight:700}
.adm-tip-pts.p0{color:#dc2626}
.adm-tip-pts.pn{color:#333}
.adm-detail{background:#050505;border:1px solid #1a1a1a;border-radius:6px;padding:8px;margin-top:6px;display:none}
.adm-detail.open{display:block}
/* Forms */
.adm-form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.adm-form-row select,.adm-form-row input,.adm-select,.adm-input{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;padding:7px 10px;color:#ddd;font-size:12px;font-family:inherit;outline:none;transition:border-color .15s}
.adm-form-row select:focus,.adm-form-row input:focus,.adm-select:focus,.adm-input:focus{border-color:#ffd700}
.adm-form-row input[type=number]{width:60px;text-align:center}
.adm-msg{font-size:11px;padding:4px 0;color:#555;min-height:18px}
/* Match list */
.adm-match-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-bottom:1px solid #0d0d0d;font-size:11px;flex-wrap:wrap}
.adm-match-row:hover{background:#0d0d0d}
.adm-match-teams{flex:1;color:#ddd;font-weight:600}
.adm-match-meta{color:#444;font-size:10px}
/* System info */
.adm-info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.adm-info-card{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;padding:10px 12px}
.adm-info-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.adm-info-value{font-size:12px;color:#ddd;font-weight:600;word-break:break-all}
/* Discord */
.adm-discord-form{display:flex;flex-direction:column;gap:8px}
.adm-discord-form textarea{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;padding:10px;color:#ddd;font-size:12px;font-family:inherit;resize:vertical;min-height:80px;outline:none}
.adm-discord-form textarea:focus{border-color:#5865f2}
/* Danger */
.adm-danger{background:#110000;border:1px solid #2a0000;border-radius:10px;padding:12px 14px}
.adm-danger h3{color:#ff4444;font-size:12px;margin-bottom:4px}
.adm-danger p{font-size:10px;color:#555;margin-bottom:8px}
/* Tip stats bar */
.adm-bar{height:6px;border-radius:3px;background:#1a1a1a;overflow:hidden;display:flex;margin-top:3px}
.adm-bar-g{height:100%;background:#16a34a}
.adm-bar-y{height:100%;background:#ca8a04}
.adm-bar-r{height:100%;background:#dc2626}
/* Admin notice */
.admin-notice{background:#1a0a00;border:1px solid #ffd70033;border-radius:6px;padding:8px 12px;font-size:11px;color:#ca8a04;margin-bottom:10px;display:flex;gap:6px;align-items:center}
/* Compat */
.result-form{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.result-form select,.result-form input[type=number]{background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;padding:7px 10px;color:#ddd;font-size:12px;font-family:inherit;outline:none}
.result-form input[type=number]{width:55px;text-align:center}
.empty-state{text-align:center;padding:40px 20px;color:#555}
.bot-bar{display:none}
@media(max-width:600px){
  .adm-stats-grid{grid-template-columns:repeat(2,1fr)}
  .adm-table th:nth-child(n+5),.adm-table td:nth-child(n+5){display:none}
  .adm-info-grid{grid-template-columns:1fr}
}

@media(max-width:899px){
  .topnav{display:none!important;}
  .main{padding:12px 12px 80px!important;}
}
@media(max-width:768px){
  .sidebar{display:none;}
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .welcome-cards{grid-template-columns:1fr;}
  .hero-body{flex-direction:column;padding:24px;}
  .pts-grid{grid-template-columns:1fr 1fr 1fr;}
  .main{padding:12px;}
  .topnav a{padding:0 8px;font-size:12px;}
  .logo-sub{display:none;}
}
.mobile-group-bar{display:none;}
@media(max-width:768px){
  .mobile-group-bar{display:flex;overflow-x:auto;gap:6px;padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);-webkit-overflow-scrolling:touch;scrollbar-width:none;}
  .mobile-group-bar::-webkit-scrollbar{display:none;}
  .mgb-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .12s;}
  .mgb-btn.active{background:var(--gold);border-color:var(--gold-dark);color:var(--black);}
  .mgb-sep{width:1px;background:var(--border);flex-shrink:0;margin:4px 0;}
}

/* SPIELBAUM NEU */
.sb2-page{background:#f5f5f5;padding:0 0 30px 0;}

.sb2-header h2 span{color:var(--gold);}
.sb2-header p{color:rgba(255,255,255,.5);font-size:13px;margin-top:4px;}

.sb2-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.sb2-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:20px;}

<body>
<div id="root"></div>
<script>
const FLAGS={
  'Mexiko':'mx','Suedafrika':'za','Suedkorea':'kr','Tschechien':'cz',
  'Kanada':'ca','Bosnien-Herzegowina':'ba','Katar':'qa','Schweiz':'ch',
  'Brasilien':'br','Marokko':'ma','Haiti':'ht','Schottland':'gb-sct',
  'USA':'us','Paraguay':'py','Australien':'au','Tuerkei':'tr',
  'Deutschland':'de','Curacao':'cw','Elfenbeinkueste':'ci','Ecuador':'ec',
  'Niederlande':'nl','Japan':'jp','Schweden':'se','Tunesien':'tn',
  'Belgien':'be','Aegypten':'eg','Iran':'ir','Neuseeland':'nz',
  'Spanien':'es','Kap Verde':'cv','Saudi-Arabien':'sa','Uruguay':'uy',
  'Frankreich':'fr','Senegal':'sn','Irak':'iq','Norwegen':'no',
  'Argentinien':'ar','Algerien':'dz','Oesterreich':'at','Jordanien':'jo',
  'Portugal':'pt','DR Kongo':'cd','Usbekistan':'uz','Kolumbien':'co',
  'England':'gb-eng','Kroatien':'hr','Ghana':'gh','Panama':'pa',
};
const COLORS=['#cc0000','#ffcc00','#1a1a1a','#5865f2','#16a34a','#ea580c','#7c3aed','#0891b2'];

let state={
  user:null, page:'welcome', group:'A',
  matches:[], tips:{}, rankings:[], results:[],
  authTab:'login', authStep:'form', loading:true, isAdmin:false,
  spFilter:'',
};

async function api(path,opts={}){
  const r=await fetch(path,{credentials:'include',headers:{'Content-Type':'application/json'},...opts});
  if(!r.ok){const e=await r.json().catch(()=>({detail:'Fehler'}));throw new Error(e.detail||'Fehler');}
  return r.json();
}

async function init(){
  try{state.user=await api('/api/me');}catch(e){}
  try{
    state.matches=await api('/api/matches');
    if(state.user){
      state.tips=await api('/api/tips');
      state.rankings=await api('/api/rankings');
      state.results=await api('/api/results');
    }
  }catch(e){}
  // Admin check
  try{const a=await api('/api/admin/check');state.isAdmin=a.is_admin;}catch(e){}
  state.loading=false;
  state.lastUpdate=new Date();
  render();
  setInterval(liveUpdate, 30000);
}

async function liveUpdate(){
  try{
    const live=await api('/api/live');
    let changed=false;
    live.forEach(m=>{
      const old=state.matches.find(x=>x.id===m.id);
      if(old&&(old.status!==m.status||old.home_score!==m.home_score||old.away_score!==m.away_score)){
        Object.assign(old,{status:m.status,home_score:m.home_score,away_score:m.away_score});
        changed=true;
      }
    });
    if(changed){
      if(state.user){
        state.rankings=await api('/api/rankings');
        state.results=await api('/api/results');
      }
      state.lastUpdate=new Date();
      render();
    }else{
      state.lastUpdate=new Date();
      const el=document.getElementById('last-update');
      if(el)el.textContent='Aktualisiert: '+state.lastUpdate.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    }
  }catch(e){console.log('Live update error:',e);}
}

function isMatchLocked(m){
  if(m.status!=='open')return true;
  try{
    const parts=m.date.split('.');
    const dt=new Date(`${parts[2]}-${parts[1]}-${parts[0]}T${m.time}:00Z`);
    return new Date()>=dt;
  }catch(e){return false;}
}

function timeUntilMatch(m){
  try{
    const parts=m.date.split('.');
    const dt=new Date(`${parts[2]}-${parts[1]}-${parts[0]}T${m.time}:00Z`);
    const diff=dt-new Date();
    if(diff<=0)return null;
    const h=Math.floor(diff/3600000);
    const min=Math.floor((diff%3600000)/60000);
    if(h>24)return`${Math.floor(h/24)}d ${h%24}h`;
    if(h>0)return`${h}h ${min}min`;
    return`${min}min`;
  }catch(e){return null;}
}

function flagUrl(t){const c=FLAGS[t];return c?`https://flagcdn.com/w80/${c}.png`:null;}
function flagEl(t,cls='team-flag'){
  const url=flagUrl(t);
  if(url)return`<img class="${cls}" src="${url}" alt="${t}" onerror="this.style.display='none'">`;
  return`<div class="team-flag-fallback">⚽</div>`;
}
function flagSmEl(t){
  const c=FLAGS[t];
  return c?`<img class="team-flag-sm" src="https://flagcdn.com/w40/${c}.png" alt="${t}" onerror="this.style.display='none'">`:'';}
function avatarColor(n){let h=0;for(let c of n)h=((h<<5)-h)+c.charCodeAt(0);return COLORS[Math.abs(h)%COLORS.length];}
function initials(n){return n.split(/[\s_]/).map(w=>w[0]).join('').toUpperCase().slice(0,2);}

function calcGroupTable(group){
  const gm=state.matches.filter(m=>m.group===group);
  const teams={};
  gm.forEach(m=>{
    [m.home,m.away].forEach(t=>{if(!teams[t])teams[t]={name:t,sp:0,g:0,u:0,v:0,tore:0,gegen:0,pts:0};});
    if(m.status==='done'&&m.home_score!==null){
      const h=teams[m.home],a=teams[m.away];
      h.sp++;a.sp++;h.tore+=m.home_score;h.gegen+=m.away_score;
      a.tore+=m.away_score;a.gegen+=m.home_score;
      if(m.home_score>m.away_score){h.g++;h.pts+=3;a.v++;}
      else if(m.home_score<m.away_score){a.g++;a.pts+=3;h.v++;}
      else{h.u++;h.pts++;a.u++;a.pts++;}
    }
  });
  return Object.values(teams).sort((a,b)=>b.pts-a.pts||(b.tore-b.gegen)-(a.tore-a.gegen)||b.tore-a.tore);
}

function renderGroupTable(group){
  const rows=calcGroupTable(group);
  if(!rows.length)return'';
  let html=`<div class="grp-section-title">Gruppentabelle — Gruppe ${group}</div>
  <table class="grp-table"><thead><tr><th>Team</th><th>Sp</th><th>S</th><th>U</th><th>N</th><th>Tore</th><th>Pkt</th></tr></thead><tbody>`;
  rows.forEach((r,i)=>{
    const cls=i<2?'qualified':i===2?'qualified-3rd':'';
    html+=`<tr class="${cls}"><td>${flagSmEl(r.name)}${r.name}</td><td>${r.sp}</td><td>${r.g}</td><td>${r.u}</td><td>${r.v}</td><td>${r.tore}:${r.gegen}</td><td><strong>${r.pts}</strong></td></tr>`;
  });
  html+=`</tbody></table>
  <div class="grp-legend">
    <div style="display:flex;align-items:center;gap:5px;"><div class="grp-legend-dot" style="background:#16a34a;border-radius:2px;width:10px;height:10px;"></div><span>Direkt weiter (Platz 1 & 2)</span></div>
    <div style="display:flex;align-items:center;gap:5px;"><div class="grp-legend-dot" style="background:#ea580c;border-radius:2px;width:10px;height:10px;"></div><span>Evtl. weiter als bester Dritter</span></div>
  </div>`;
  return html;
}

async function saveTip(mid,side,delta){
  if(!state.user)return;
  const t=state.tips[mid]||{home:null,away:null};
  let hv=t.home,av=t.away;
  if(side==='h')hv=Math.max(0,Math.min(9,(hv===null?0:hv)+delta));
  else av=Math.max(0,Math.min(9,(av===null?0:av)+delta));
  state.tips[mid]={home:hv,away:av};
  render();
  if(hv!==null&&av!==null){
    try{await api('/api/tips',{method:'POST',body:JSON.stringify({match_id:mid,home_tip:hv,away_tip:av})});}
    catch(e){console.error(e);}
  }
}

function renderMobileGroupBar(){
  if(state.page !== 'spielplan') return '';
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];
  const koItems = [
    ['SF','16tel'],['AF','Achtel'],['VF','Viertel'],['HF','Halb'],['FIN','🏆 Finale']
  ];
  let html = '<div class="mobile-group-bar">';
  groups.forEach(g => {
    html += `<button class="mgb-btn${state.group===g?' active':''}" onclick="setGroup('${g}')">Gr. ${g}</button>`;
  });
  html += '<div class="mgb-sep"></div>';
  koItems.forEach(([id,label]) => {
    html += `<button class="mgb-btn${state.group===id?' active':''}" onclick="setGroup('${id}')">${label}</button>`;
  });
  html += '</div>';
  return html;
}

    ['welcome','🏠 Start'],

    const urls={spielplan:'/spielplan.html',spielbaum:'/spielbaum.html',tabelle:'/tabelle.html',auswertung:'/auswertung.html',profil:'/profil.html',kader:'/kader.html'};
    if(urls[id])return`<a href="${urls[id]}" style="text-decoration:none;${id===state.page?'color:var(--gold);border:1px solid var(--gold);padding:4px 8px;border-radius:5px;':''}">${label}</a>`;

  }).join('')}
    </nav>
    <div class="user-area">${uArea}</div>
  </header>
  <div class="de-stripe"></div>`;
}

function renderSpielplan(){
  const FLAG_MAP={Mexiko:'mx',Suedafrika:'za',Suedkorea:'kr',Tschechien:'cz',Kanada:'ca','Bosnien-Herzegowina':'ba',Katar:'qa',Schweiz:'ch',Brasilien:'br',Marokko:'ma',Haiti:'ht',Schottland:'gb-sct',USA:'us',Paraguay:'py',Australien:'au',Tuerkei:'tr',Deutschland:'de',Curacao:'cw',Elfenbeinkueste:'ci',Ecuador:'ec',Niederlande:'nl',Japan:'jp',Schweden:'se',Tunesien:'tn',Belgien:'be',Aegypten:'eg',Iran:'ir',Neuseeland:'nz',Spanien:'es','Kap Verde':'cv','Saudi-Arabien':'sa',Uruguay:'uy',Frankreich:'fr',Senegal:'sn',Irak:'iq',Norwegen:'no',Argentinien:'ar',Algerien:'dz',Oesterreich:'at',Jordanien:'jo',Portugal:'pt','DR Kongo':'cd',Usbekistan:'uz',Kolumbien:'co',England:'gb-eng',Kroatien:'hr',Ghana:'gh',Panama:'pa'};
  const spFlag=t=>{const c=FLAG_MAP[t];return c?`<img class="sp-flag" src="https://flagcdn.com/w40/${c}.png" alt="${t}" onerror="this.style.opacity=0">`:`<span class="sp-flag-ph"></span>`};
  const ROUND={'SF':'Sechzehntelfinale','AF':'Achtelfinale','VF':'Viertelfinale','HF':'Halbfinale','P3':'Platz 3','FIN':'Finale'};

  const all=[...(state.matches||[])].sort((a,b)=>{
    const da=a.date.split('.').reverse().join('')+a.time.replace(':','');
    const db=b.date.split('.').reverse().join('')+b.time.replace(':','');
    return da<db?-1:da>db?1:0;
  });
  if(!all.length)return`<div style="text-align:center;padding:40px;color:var(--muted)">Keine Spiele geladen</div>`;

  const f=state.spFilter||'';
  let filtered=all;
  if(f==='open')filtered=all.filter(m=>m.status==='open');
  else if(f==='live')filtered=all.filter(m=>m.status==='live');
  else if(f==='done')filtered=all.filter(m=>m.status==='done');
  else if(f==='gruppe')filtered=all.filter(m=>/^[A-L]$/.test(m.group));
  else if(f==='ko')filtered=all.filter(m=>!/^[A-L]$/.test(m.group));

  // Count live for filter badge
  const liveCount=all.filter(m=>m.status==='live').length;
  // Next upcoming match = first open match chronologically
  const nextMatchId=(all.find(m=>m.status==='open')||{}).id||null;

  let html=`<div class="sp-wrap">`;

  // Status hint
  const now=new Date();
  if(!state.user){
    html+=`<div class="sp-bar"><span class="sp-hint">💡 <a href="#" onclick="setPage('login');return false" style="color:var(--gold)">Anmelden</a> um Tipps abzugeben</span></div>`;
  } else {
    const tipped=Object.keys(state.tips||{}).length;
    const open=all.filter(m=>m.status==='open').length;
    html+=`<div class="sp-bar"><span class="sp-hint">🔄 Live-Update alle 30s &middot; Tipps bis Anpfiff möglich</span><span class="sp-hint" style="color:var(--green)">${tipped} Tipps abgegeben &middot; ${open} Spiele offen</span></div>`;
  }

  // Filter bar
  html+=`<div class="sp-filters">
    <button class="sp-flt${!f?' active':''}" onclick="setSpFilter('')">Alle (${all.length})</button>
    <button class="sp-flt${f==='open'?' active':''}" onclick="setSpFilter('open')">Offen (${all.filter(m=>m.status==='open').length})</button>
    <button class="sp-flt${f==='live'?' active':''}" onclick="setSpFilter('live')">${liveCount?'🔴 ':''}Live${liveCount?` (${liveCount})`:''}</button>
    <button class="sp-flt${f==='done'?' active':''}" onclick="setSpFilter('done')">Gespielt (${all.filter(m=>m.status==='done').length})</button>
    <button class="sp-flt${f==='gruppe'?' active':''}" onclick="setSpFilter('gruppe')">Gruppen</button>
    <button class="sp-flt${f==='ko'?' active':''}" onclick="setSpFilter('ko')">K.O.-Runde</button>
  </div>`;

  if(!filtered.length){
    html+=`<div style="text-align:center;padding:30px;color:var(--muted)">Keine Spiele für diesen Filter</div>`;
    html+=`</div>`;return html;
  }

  // Group by date
  const byDate={};
  filtered.forEach(m=>{if(!byDate[m.date])byDate[m.date]=[];byDate[m.date].push(m);});

  for(const [date,dayMs] of Object.entries(byDate)){
    const [d,mo,y]=date.split('.');
    const dateObj=new Date(+y,+mo-1,+d);
    const dayStr=dateObj.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'});
    html+=`<div class="sp-day">
      <div class="sp-day-hd"><span class="sp-day-date">${dayStr}</span><div class="sp-day-line"></div></div>`;

    for(const m of dayMs){
      const tip=state.tips?.[m.id]||{};
      const hv=tip.home,av=tip.away;
      const tipped=hv!=null&&av!=null;
      const isDone=m.status==='done'&&m.home_score!=null;
      const isLive=m.status==='live'&&m.home_score!=null;
      const canTip=!!state.user&&m.status==='open';
      const isKO=!/^[A-L]$/.test(m.group);
      const roundName=isKO?(ROUND[m.group.replace(/\d+$/,'')]||m.group.replace(/\d+$/,'')):`Gruppe ${m.group}`;

      // Pill
      let pill='';
      if(isLive)pill=`<span class="sp-pill live">🔴 LIVE</span>`;
      else if(isDone&&tipped){
        if(tip.points===3)pill=`<span class="sp-pill tipped">✅ +3 Pkt</span>`;
        else if(tip.points===1)pill=`<span class="sp-pill tipped" style="color:#ea580c;border-color:#ea580c">🟠 +1 Pkt</span>`;
        else if(tip.points===0)pill=`<span class="sp-pill done" style="color:#cc0000;border-color:#cc0000">❌ +0 Pkt</span>`;
        else pill=`<span class="sp-pill done">Gespielt</span>`;
      } else if(isDone)pill=`<span class="sp-pill done">Gespielt</span>`;
      else if(tipped)pill=`<span class="sp-pill tipped">✓ Getippt</span>`;
      else if(m.id===nextMatchId)pill=`<span class="sp-pill next">⏱ Nächstes</span>`;
    else pill=`<span class="sp-pill open">Offen</span>`;

      // Center content
      let center='';
      if(isDone){
        const hw=m.home_score>m.away_score,aw=m.away_score>m.home_score;
        center=`<div class="sp-score">
          <span class="sp-score-n ${hw?'win':aw?'lose':''}">${m.home_score}</span>
          <span class="sp-score-sep">:</span>
          <span class="sp-score-n ${aw?'win':hw?'lose':''}">${m.away_score}</span>
        </div>`;
        if(tipped){
          const cls=tip.points===3?'exact':tip.points===1?'tend':'wrong';
          const lbl=tip.points===3?`✅ ${hv}:${av} Exakt`:tip.points===1?`🟠 ${hv}:${av} Tendenz`:`❌ ${hv}:${av} Falsch`;
          center+=`<div class="sp-result-tip ${cls}">${lbl}</div>`;
        }
      } else if(isLive){
        center=`<div class="sp-score">
          <span class="sp-score-n sp-score-live">${m.home_score}</span>
          <span class="sp-score-sep" style="color:#cc0000">:</span>
          <span class="sp-score-n sp-score-live">${m.away_score}</span>
        </div>`;
        if(tipped)center+=`<div style="font-size:10px;color:#888">Tipp: ${hv}:${av}</div>`;
      } else if(canTip){
        center=`<div class="sp-tip-row">
          <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
            <button class="sp-tip-btn" onclick="saveTip(${m.id},'h',1)">+</button>
            <div class="sp-tip-n${hv==null?' unset':''}">${hv!=null?hv:'?'}</div>
            <button class="sp-tip-btn" onclick="saveTip(${m.id},'h',-1)">−</button>
          </div>
          <span class="sp-tip-sep">:</span>
          <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
            <button class="sp-tip-btn" onclick="saveTip(${m.id},'a',1)">+</button>
            <div class="sp-tip-n${av==null?' unset':''}">${av!=null?av:'?'}</div>
            <button class="sp-tip-btn" onclick="saveTip(${m.id},'a',-1)">−</button>
          </div>
        </div>`;
      } else {
        center=`<div class="sp-locked">
          <div class="sp-locked-score">${tipped?`${hv} : ${av}`:'– : –'}</div>
          ${!state.user?`<button class="sp-login-btn" onclick="setPage('login')">Anmelden</button>`:''}
        </div>`;
      }

      const cardClass=`sp-card${isLive?' live':m.id===nextMatchId?' next':isDone?' done':tipped?' tipped':''}`;
      html+=`<div class="${cardClass}">
        <div class="sp-card-top">
          <span class="sp-card-time">${m.time} Uhr</span>
          <span class="sp-card-round">${roundName}</span>
          ${pill}
        </div>
        <div class="sp-card-body">
          <div class="sp-team">
            ${spFlag(m.home)}
            <span class="sp-team-name">${m.home||'?'}</span>
          </div>
          <div class="sp-center">${center}</div>
          <div class="sp-team away">
            ${spFlag(m.away)}
            <span class="sp-team-name">${m.away||'?'}</span>
          </div>
        </div>
      </div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}

function renderTabelle(){
  if(!state.user){
    return`<div class="locked-overlay">
      <div class="lock-icon">🔒</div>
      <h3>Nur für Mitspieler sichtbar</h3>
      <p>Die Rangliste und Punkteübersicht ist nur für angemeldete Mitspieler sichtbar.<br>Melde dich an um deinen Platz in der Tabelle zu sehen!</p>
      <button onclick="setPage('login')">Jetzt anmelden</button>
    </div>`;
  }
  const max=state.rankings[0]?.points||1;
  const total=state.matches.length;
  const done=state.matches.filter(m=>m.status==='done').length;
  const players=state.rankings.length;

  let html=`<div class="stat-grid">
    <div class="stat-c"><div class="stat-v">${done}</div><div class="stat-l">Gespielt</div></div>
    <div class="stat-c"><div class="stat-v">${total-done}</div><div class="stat-l">Noch offen</div></div>
    <div class="stat-c"><div class="stat-v">${total}</div><div class="stat-l">Spiele gesamt</div></div>
    <div class="stat-c"><div class="stat-v">${players}</div><div class="stat-l">Mitspieler</div></div>
  </div>`;

  if(state.rankings.length){
    // Podium for top 3
    const podiumConfig=[
      {place:1,cls:'podium-1',avSize:52,label:'1. Platz'},
      {place:2,cls:'podium-2',avSize:44,label:'2. Platz'},
      {place:3,cls:'podium-3',avSize:38,label:'3. Platz'},
    ];

    html+=`<div class="podium-wrap">`;
    for(const {place,cls,avSize,label} of podiumConfig){
      const r=state.rankings[place-1];
      if(!r)continue;
      const col=avatarColor(r.username);
      const avEl=r.avatar
        ?`<img class="podium-av" src="${r.avatar}" alt="${r.username}" style="width:${avSize}px;height:${avSize}px;">`
        :`<div class="podium-av-ph" style="width:${avSize}px;height:${avSize}px;font-size:${Math.round(avSize*0.35)}px;background:${col};">${initials(r.username)}</div>`;
      html+=`<div class="podium-card ${cls}">
        <div class="podium-trophy-wrap">${wmTrophy(place)}</div>
        <div class="podium-info">
          <div class="podium-place-label">${label}</div>
          <div class="podium-name-row">
            ${avEl}
            <span class="podium-name">${r.username}</span>
          </div>
          <div class="podium-pts-row">
            <span class="podium-pts">${r.points} Punkte</span>
            <span class="podium-tips-label">${r.evaluated} Tipps</span>
          </div>
        </div>
      </div>`;
    }
    html+=`</div>`;

    // Rest of rankings (4th place onwards)
    if(state.rankings.length>3){
      html+=`<div class="rank-card"><div class="rank-head"><h2>Weitere Plätze</h2></div>`;
      state.rankings.slice(3).forEach((r,i)=>{
        const col=avatarColor(r.username);
        const av=r.avatar?`<img class="rav" src="${r.avatar}" alt="${r.username}">`:
          `<div class="rav-ph" style="background:${col};">${initials(r.username)}</div>`;
        html+=`<div class="rank-row">
          <div class="rpos">${i+4}.</div>
          <div class="rname">${av} ${r.username}</div>
          <div class="rbar-w"><div class="rbar" style="width:${Math.round(r.points/max*100)}%;background:${col};"></div></div>
          <div class="rtips">${r.evaluated} Tipps</div>
          <div class="rpts">${r.points} Pkt</div>
        </div>`;
      });
      html+=`</div>`;
    }
  }else{
    html+=`<div class="rank-card"><div class="empty-state"><p>Noch keine Mitspieler</p></div></div>`;
  }
  return html;
}

function renderAuswertung(){
  if(!state.user){
    return`<div class="locked-overlay">
      <div class="lock-icon">🔒</div>
      <h3>Nur für Mitspieler sichtbar</h3>
      <p>Die Tipp-Auswertungen sind nur für angemeldete Mitspieler sichtbar.<br>Melde dich an um zu sehen wie du im Vergleich abschneidest!</p>
      <button onclick="setPage('login')">Jetzt anmelden</button>
    </div>`;
  }
  if(!state.results.length){
    return`<div class="empty-state"><p>📊 Noch keine ausgewerteten Spiele</p></div>`;
  }
  let html='';
  const resColor={Exakt:var_green,Tendenz:'#ca8a04',Falsch:'#dc2626'};
  for(const res of state.results){
    html+=`<div class="res-card"><div class="res-head"><h3>⚽ ${res.match}</h3></div>`;
    for(const t of res.tips){
      const pts=t.points;
      const badge=pts===3?'badge-exact':pts===1?'badge-tend':'badge-wrong';
      const label=pts===3?'Exakt ✓':pts===1?'Tendenz ≈':'Falsch ✗';
      const col=pts===3?'#16a34a':pts===1?'#ca8a04':'#dc2626';
      html+=`<div class="res-row">
        <div class="res-name">${t.username}</div>
        <div class="res-tip">Tipp: <strong>${t.tip}</strong></div>
        <span class="badge ${badge}">${label}</span>
        <div class="res-pts" style="color:${col};">${pts>0?'+':''}${pts}</div>
      </div>`;
    }
    html+=`</div>`;
  }
  return html;
}

async function uploadAvatar(input){
  const file = input.files[0];
  if(!file) return;
  if(file.size > 5*1024*1024){ alert('Bild zu groß! Maximal 5MB.'); return; }
  const prog = document.getElementById('upload-progress');
  if(prog) prog.style.display='block';
  const formData = new FormData();
  formData.append('file', file);
  try{
    const r = await fetch('/api/upload-avatar', {method:'POST', credentials:'include', body:formData});
    if(!r.ok){ const e=await r.json(); throw new Error(e.detail||'Fehler'); }
    const data = await r.json();
    state.user.avatar = data.avatar;
    if(prog) prog.style.display='none';
    const sucEl = document.getElementById('prof-success');
    if(sucEl){ sucEl.textContent='✓ Profilbild erfolgreich hochgeladen!'; sucEl.style.display='block'; setTimeout(()=>sucEl.style.display='none',3000); }
    render();
  }catch(e){
    if(prog) prog.style.display='none';
    const errEl=document.getElementById('prof-err');
    if(errEl){ errEl.textContent=e.message; errEl.style.display='block'; }
  }
}

function previewAvatar(url){
  const el=document.getElementById('av-preview');
  if(!el)return;
  if(url&&url.startsWith('http')){
    el.outerHTML=`<img class="avatar-preview" src="${url}" alt="Vorschau" id="av-preview" onerror="this.style.opacity='.3'">`;
  }
}

async function saveProfile(){
  const name=document.getElementById('prof-name')?.value?.trim();
  const avatarUrl=document.getElementById('prof-avatar')?.value?.trim();
  const errEl=document.getElementById('prof-err');
  const sucEl=document.getElementById('prof-success');
  if(!name){if(errEl){errEl.textContent='Bitte einen Anzeigenamen eingeben.';errEl.style.display='block';}return;}
  try{
    await api('/api/profile',{method:'POST',body:JSON.stringify({username:name,avatar_url:avatarUrl})});
    state.user.username=name;
    if(avatarUrl)state.user.avatar=avatarUrl;
    if(errEl)errEl.style.display='none';
    if(sucEl){sucEl.style.display='block';setTimeout(()=>sucEl.style.display='none',3000);}
    render();
  }catch(e){
    if(errEl){errEl.textContent=e.message;errEl.style.display='block';}
  }
}

function admTab(n){
  document.querySelectorAll('.adm-tab').forEach((t,i)=>t.classList.toggle('active',i===n));
  document.querySelectorAll('.adm-tab-content').forEach((c,i)=>c.classList.toggle('active',i===n));
  if(n===0)admLoadDashboard();
  if(n===1)loadAdminUsers();
  if(n===2)admLoadMatches();
  if(n===3)admLoadTipStats();
  if(n===4)admLoadDiscord();
  if(n===5)admLoadSystem();
}

async function admLoadMatches(){
  const body=document.getElementById('adm-matches-body');
  if(!body)return;
  try{
    const matches=await api('/api/admin/all-matches');
    window._admMatches=matches;
    admRenderMatches(matches);
  }catch(e){body.innerHTML=`<div style="padding:12px;color:#cc0000;font-size:11px">Fehler: ${e.message}</div>`;}
}

function admFilterMatches(){
  if(!window._admMatches)return;
  const f=document.getElementById('adm-match-filter')?.value||'';
  const filtered=f?window._admMatches.filter(m=>m.status===f):window._admMatches;
  admRenderMatches(filtered);
}

function admRenderMatches(matches){
  const body=document.getElementById('adm-matches-body');
  if(!body)return;
  if(!matches.length){body.innerHTML='<div style="padding:12px;color:#555;font-size:11px">Keine Spiele</div>';return;}
  const statusBadge=s=>s==='done'?'<span class="adm-badge done">✓ Fertig</span>':
    s==='live'?'<span class="adm-badge live">🔴 Live</span>':
    '<span class="adm-badge open">○ Offen</span>';
  body.innerHTML=matches.map(m=>`
    <div class="adm-match-row">
      <div class="adm-match-teams">${m.home_team} vs ${m.away_team}</div>
      <div class="adm-match-meta">Gr.${m.group_name} · ${m.match_date||''}</div>
      ${statusBadge(m.status)}
      ${m.status==='done'?`<span style="color:#ffd700;font-size:11px;font-weight:700">${m.home_score}:${m.away_score}</span>`:''}
      <span style="color:#444;font-size:10px">${m.tip_count} Tipps</span>
      <div style="display:flex;gap:4px">
        ${m.status==='done'?`<button class="adm-btn" style="padding:3px 7px;font-size:9px" onclick="admSetMatchStatus(${m.id},'open')">↩ Öffnen</button>`:''}
        ${m.status==='done'?`<button class="adm-btn gold" style="padding:3px 7px;font-size:9px" onclick="admRecalculate(${m.id},'${m.home_team} vs ${m.away_team}')">🔁 Neu werten</button>`:''}
        <button class="adm-btn blue" style="padding:3px 7px;font-size:9px" onclick="admShowMatchTips(${m.id},'${m.home_team} vs ${m.away_team}')">📋 Tipps</button>
      </div>
    </div>
    <div class="adm-detail" id="match-detail-${m.id}"></div>
  `).join('');
}

async function admSetMatchStatus(id,status){
  if(!confirm(`Match-Status auf "${status}" setzen?`))return;
  try{
    await api(`/api/admin/match-status/${id}`,{method:'POST',body:JSON.stringify({status})});
    await admLoadMatches();
  }catch(e){alert('Fehler: '+e.message);}
}

async function admRecalculate(id,name){
  if(!confirm(`Punkte für "${name}" neu berechnen? Bestehende Punkte werden überschrieben.`))return;
  try{
    const r=await api(`/api/admin/recalculate/${id}`,{method:'POST'});
    alert(`✅ ${r.recalculated} Tipps neu bewertet!`);
    state.rankings=await api('/api/rankings');
    await admLoadMatches();
  }catch(e){alert('Fehler: '+e.message);}
}

async function admShowMatchTips(id,name){
  const panel=document.getElementById(`match-detail-${id}`);
  if(!panel)return;
  if(panel.classList.contains('open')){panel.classList.remove('open');return;}
  panel.classList.add('open');
  panel.innerHTML='<div style="color:#555;font-size:10px;padding:4px">⏳ Lade…</div>';
  try{
    const tips=await api(`/api/admin/match-tips/${id}`);
    if(!tips.length){panel.innerHTML='<div style="color:#555;font-size:10px;padding:4px">Keine Tipps</div>';return;}
    panel.innerHTML=`<div style="font-size:9px;color:#444;margin-bottom:5px;padding:2px 0">${name} — ${tips.length} Tipps</div>`+
      tips.map(t=>{
        const pClass=t.points===3?'p3':t.points===1?'p1':t.points===0?'p0':'pn';
        const pLabel=t.points===null?'—':(t.points>0?'+':'')+t.points;
        return `<div class="adm-tip-row">
          <div class="adm-tip-match">${t.username}</div>
          <div class="adm-tip-score">Tipp: ${t.home_tip}:${t.away_tip}</div>
          <div class="adm-tip-pts ${pClass}">${pLabel} Pkt</div>
        </div>`;
      }).join('');
  }catch(e){panel.innerHTML=`<div style="color:#cc0000;font-size:10px">Fehler</div>`;}
}

async function admLoadTipStats(){
  const body=document.getElementById('adm-tipstats-body');
  if(!body)return;
  try{
    const stats=await api('/api/admin/tip-stats');
    const done=stats.filter(m=>m.status==='done');
    if(!done.length){body.innerHTML='<div style="padding:12px;color:#555;font-size:11px">Noch keine abgeschlossenen Spiele</div>';return;}
    body.innerHTML=`<div style="overflow-x:auto"><table class="adm-table">
      <thead><tr><th>Spiel</th><th>Gruppe</th><th>Erg.</th><th>Tipps</th><th>Exakt</th><th>Tendenz</th><th>Falsch</th><th>Verteilung</th></tr></thead>
      <tbody>${done.map(m=>{
        const total=m.tips||1;
        const gPct=Math.round((m.exact_count||0)/total*100);
        const yPct=Math.round((m.tend_count||0)/total*100);
        const rPct=Math.round((m.wrong_count||0)/total*100);
        return `<tr>
          <td style="font-weight:600;color:#ddd">${m.home_team} vs ${m.away_team}</td>
          <td style="color:#555">${m.group_name}</td>
          <td style="font-weight:700;color:#ffd700">${m.home_score}:${m.away_score}</td>
          <td style="color:#888">${m.tips}</td>
          <td style="color:#16a34a">${m.exact_count||0}</td>
          <td style="color:#ca8a04">${m.tend_count||0}</td>
          <td style="color:#dc2626">${m.wrong_count||0}</td>
          <td style="min-width:80px">
            <div class="adm-bar">
              <div class="adm-bar-g" style="width:${gPct}%"></div>
              <div class="adm-bar-y" style="width:${yPct}%"></div>
              <div class="adm-bar-r" style="width:${rPct}%"></div>
            </div>
          </td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`;
  }catch(e){body.innerHTML=`<div style="padding:12px;color:#cc0000;font-size:11px">Fehler: ${e.message}</div>`;}
}

  const text=DISCORD_TEMPLATES[key];
  if(text){
    const ta=document.getElementById('adm-discord-msg');
    if(ta){ta.value=text;admUpdatePreview();admCountChars();}
  }
  // Empfohlenen Channel vorauswählen
  const recChannel=TEMPLATE_CHANNEL[key];
  if(recChannel&&_discordChannels[recChannel]){
    const sel=document.getElementById('adm-discord-channel');
    if(sel){
      for(let opt of sel.options){
        if(opt.dataset.key===recChannel){opt.selected=true;break;}
      }
    }
  }
}

function admCountChars(){
  const ta=document.getElementById('adm-discord-msg');
  const counter=document.getElementById('adm-discord-charcount');
  if(!ta||!counter)return;
  const len=ta.value.length;
  counter.textContent=`${len}/2000`;
  counter.style.color=len>1800?'#dc2626':len>1500?'#ca8a04':'#333';
  admUpdatePreview();
}

function admUpdatePreview(){
  const ta=document.getElementById('adm-discord-msg');
  const preview=document.getElementById('adm-discord-preview');
  if(!ta||!preview)return;
  const text=ta.value||'';
  if(!text.trim()){preview.innerHTML='<span style="color:#555;font-style:italic">Nachricht erscheint hier…</span>';return;}
  let html=text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/[*][*](.+?)[*][*]/g,'<strong>$1</strong>')
    .replace(/[*](.+?)[*]/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code style="background:#2f3136;padding:1px 4px;border-radius:3px">$1</code>')
    .replace(/\n/g,'<br>');
  preview.innerHTML=html;
}

function admClearDiscord(){
  const ta=document.getElementById('adm-discord-msg');

}

async function admSendDiscord(){
  const channelId=document.getElementById('adm-discord-channel')?.value;
  const msg=document.getElementById('adm-discord-msg')?.value?.trim();
  const res=document.getElementById('adm-discord-result');
  if(!channelId){if(res){res.textContent='⚠️ Bitte Channel auswählen';res.style.color='#ca8a04';}return;}
  if(!msg){if(res){res.textContent='⚠️ Bitte Nachricht eingeben';res.style.color='#ca8a04';}return;}
  if(msg.length>2000){if(res){res.textContent='❌ Nachricht zu lang (max 2000 Zeichen)';res.style.color='#dc2626';}return;}
  if(res){res.textContent='📤 Wird gesendet…';res.style.color='#60a5fa';}
  try{
    const r=await api('/api/admin/discord-broadcast',{method:'POST',body:JSON.stringify({channel_id:channelId,message:msg})});
    if(r.ok){
      if(res){res.textContent='✅ Erfolgreich gesendet!';res.style.color='#4ade80';}
      document.getElementById('adm-discord-msg').value='';
      document.getElementById('adm-discord-template').value='';
      admUpdatePreview();admCountChars();
      setTimeout(()=>{if(res){res.textContent='';res.style.color=''}},4000);
    } else {
      if(res){res.textContent=`❌ ${r.error||'Fehler beim Senden'}`;res.style.color='#dc2626';}
    }
  }catch(e){if(res){res.textContent='❌ '+e.message;res.style.color='#dc2626';}}
}

async function adminShowUserTips(id,name){
  const panel=document.getElementById(`tips-detail-${id}`);
  if(!panel)return;
  if(panel.classList.contains('open')){panel.classList.remove('open');return;}
  panel.classList.add('open');
  panel.innerHTML='<div style="color:#555;font-size:10px;padding:4px">⏳ Lade Tipps…</div>';
  try{
    const tips=await api(`/api/admin/user-tips/${id}`);
    if(!tips.length){panel.innerHTML='<div style="color:#555;font-size:10px;padding:4px">Noch keine Tipps</div>';return;}
    let html=`<div style="font-size:9px;color:#444;margin-bottom:5px;padding:2px 0;font-weight:700">${name} — ${tips.length} Tipps</div>`;
    tips.forEach(t=>{
      const pts=t.points;
      const pClass=pts===3?'p3':pts===1?'p1':pts===0?'p0':'pn';
      const pLabel=pts===null||pts===undefined?'—':(pts>0?'+':'')+pts;
      const result=t.home_score!==null&&t.home_score!==undefined?`${t.home_score}:${t.away_score}`:'offen';
      html+=`<div class="adm-tip-row">
        <div class="adm-tip-match">${t.home_team} vs ${t.away_team} <span style="color:#2a2a2a">(Gr.${t.group_name})</span></div>
        <div class="adm-tip-score">Tipp: ${t.home_tip}:${t.away_tip} · Erg: ${result}</div>
        <div class="adm-tip-pts ${pClass}">${pLabel} Pkt</div>
        <button class="adm-btn red" style="padding:2px 5px;font-size:9px" onclick="adminDeleteTip(${t.id},${id},'${name}')">✕</button>
      </div>`;
    });
    panel.innerHTML=html;
  }catch(e){panel.innerHTML=`<div style="color:#cc0000;font-size:10px">Fehler: ${e.message}</div>`;}
}

function togglePw(){const i=document.getElementById('f-pw');if(i)i.type=i.type==='password'?'text':'password';}
function checkStr(v){
  const f=document.getElementById('str-fill');if(!f)return;
  let s=0;if(v.length>=8)s++;if(/[A-Z]/.test(v))s++;if(/[0-9]/.test(v))s++;if(/[^A-Za-z0-9]/.test(v))s++;
  f.style.width=(s*25)+'%';f.style.background=s<=1?'#dc2626':s===2?'#ea580c':s===3?'#ca8a04':'#16a34a';
}
function showErr(m){const e=document.getElementById('err-msg');if(e){e.textContent=m;e.style.display='block';}}

    state.rankings=await api('/api/rankings');
