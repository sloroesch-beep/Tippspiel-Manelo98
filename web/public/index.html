}
function setGroup(g){state.group=g;state.page='spielplan';render();}
function setSpFilter(f){state.spFilter=f;render();}

function render(){
  const root=document.getElementById('root');
  if(state.loading){root.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:18px;color:#999;">⚽ Wird geladen…</div>`;return;}

  if(state.page==='login'){root.innerHTML=renderHeader()+renderLogin();return;}

  let content='';
  if(state.page==='welcome')content=renderWelcome();
  else if(state.page==='spielplan')content=renderSpielplan();
  else if(state.page==='tabelle')content=renderTabelle();
  else if(state.page==='auswertung')content=renderAuswertung();
  else if(state.page==='profil')content=renderProfil();
  else if(state.page==='admin')content=renderAdmin();
  else if(state.page==='spielbaum')content=renderSpielbaum();

  const hasSidebar=false;

  // Spielbaum: full width, no sidebar, no max-width
  if(state.page==='spielbaum'){
    root.innerHTML=renderHeader()+renderMobileGroupBar()+`<style>#sb-d{display:flex!important;}#sb-m{display:none!important;}@media(max-width:900px){#sb-d{display:none!important;}#sb-m{display:block!important;}}</style><div id="sb-wrap" style="width:100%;overflow:hidden;">${content}</div>`;
    return;
  }

  root.innerHTML=renderHeader()+renderMobileGroupBar()+`
    <div class="layout">
      ${hasSidebar?renderSidebar():''}
      <main class="main">${content}</main>
    </div>`;
  if(state.page==='admin')setTimeout(loadAdminUsers,100);
}


function renderSpielbaum(){
  const ms = state.matches || [];
  const tips = state.tips || {};
  const user = state.user;

  function fl(team, w=20, h=13){
    const c=FLAGS[team];
    if(!c||!team) return `<span style="display:inline-block;width:${w}px;height:${h}px;background:#2a2a2a;border-radius:2px;flex-shrink:0;"></span>`;
    return `<img style="width:${w}px;height:${h}px;object-fit:cover;border-radius:2px;flex-shrink:0;" src="https://flagcdn.com/w40/${c}.png" alt="${team}" onerror="this.style.opacity=0">`;
  }

  function getByGroup(g){ return ms.filter(m=>m.group===g).sort((a,b)=>a.id-b.id); }

  function scoreStr(m){
    if(!m) return '–:–';
    if(m.status==='done'&&m.home_score!==null) return `${m.home_score}:${m.away_score}`;
    if(m.status==='live'&&m.home_score!==null) return `🔴 ${m.home_score}:${m.away_score}`;
    return '–:–';
  }

  // Get tip color for a match
  function tipColor(m){
    if(!user) return null;
    const t = tips[m.id];
    if(!t) return null;
    if(t.points===3) return '#16a34a'; // grün - exakt
    if(t.points===1) return '#ea580c'; // orange - tendenz
    if(t.points===0) return '#cc0000'; // rot - falsch
    // Tipp abgegeben aber noch nicht ausgewertet
    if(t.home!==undefined) return '#3b82f6'; // blau - getippt
    return null;
  }

  function tipBadge(m){
    if(!user) return '';
    const t = tips[m.id];
    if(!t||t.home===undefined) return '';
    const col = tipColor(m);
    const icon = t.points===3?'✅':t.points===1?'🟠':t.points===0?'❌':'💙';
    return `<div style="font-size:8px;color:${col||'#888'};text-align:center;padding:2px 0;border-top:1px solid #1a1a1a;">${icon} ${t.home}:${t.away}</div>`;
  }

  function card(m, w=148){
    if(!m) return `<div style="width:${w}px;height:46px;border:1px dashed #2a2a2a;border-radius:5px;background:#0d0d0d;"></div>`;
    const done=m.status==='done'&&m.home_score!==null;
    const live=m.status==='live'&&m.home_score!==null;
    const hs=done||live?m.home_score:null, as=done||live?m.away_score:null;
    const hw=done&&hs>as, aw=done&&as>hs;
    const tc=tipColor(m);
    // Border: tip color if tipped, else gold if done, red if live, gray if open
    const bc=tc||(live?'#cc0000':done?'#ffd700':'#2a2a2a');
    const t=tips[m.id];
    return `<div style="width:${w}px;background:#111;border:1px solid ${bc};border-radius:5px;overflow:hidden;">
      <div style="display:flex;align-items:center;gap:4px;padding:4px 5px;border-bottom:1px solid #1a1a1a;${hw?'background:#0d1a0d;':''}">
        ${fl(m.home)}<span style="flex:1;font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${hw?'#ffd700':'#ccc'};font-weight:${hw?700:400};">${m.home||'?'}</span>
        <span style="font-size:10px;font-weight:700;color:${hw?'#ffd700':'#555'};min-width:12px;text-align:right;">${hs!==null?hs:''}</span>
      </div>
      <div style="display:flex;align-items:center;gap:4px;padding:4px 5px;${aw?'background:#0d1a0d;':''}">
        ${fl(m.away)}<span style="flex:1;font-size:9px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:${aw?'#ffd700':'#ccc'};font-weight:${aw?700:400};">${m.away||'?'}</span>
        <span style="font-size:10px;font-weight:700;color:${aw?'#ffd700':'#555'};min-width:12px;text-align:right;">${as!==null?as:''}</span>
      </div>
      ${tipBadge(m)}
    </div>`;
  }

  function gruppeCard(g){
    const spiele=getByGroup(g);
    if(!spiele.length) return `<div style="width:205px;height:40px;background:#111;border:1px solid #1a1a1a;border-radius:7px;display:flex;align-items:center;justify-content:center;color:#333;font-size:10px;">Gruppe ${g}</div>`;
    const teams=[...new Set([...spiele.map(m=>m.home),...spiele.map(m=>m.away)])];
    const st={};
    teams.forEach(t=>{st[t]={pts:0,gd:0,gf:0,sp:0};});
    spiele.filter(m=>m.status==='done'&&m.home_score!==null).forEach(m=>{
      st[m.home].sp++;st[m.away].sp++;
      st[m.home].gf+=m.home_score;st[m.home].gd+=m.home_score-m.away_score;
      st[m.away].gf+=m.away_score;st[m.away].gd+=m.away_score-m.home_score;
      if(m.home_score>m.away_score)st[m.home].pts+=3;
      else if(m.home_score<m.away_score)st[m.away].pts+=3;
      else{st[m.home].pts++;st[m.away].pts++;}
    });
    const sorted=[...teams].sort((a,b)=>st[b].pts-st[a].pts||st[b].gd-st[a].gd||st[b].gf-st[a].gf);

    const spielRows=spiele.map(m=>{
      const tc=tipColor(m);
      const t=tips[m.id];
      return `<tr style="border-bottom:1px solid #111;${tc?`background:${tc}18;`:''}">
        <td style="padding:1px 4px;font-size:8px;color:#444;white-space:nowrap;width:28px;">${(m.date||'').slice(0,6)}</td>
        <td style="padding:1px 4px;font-size:8px;color:#888;text-align:right;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.home}</td>
        <td style="padding:1px 4px;font-size:9px;font-weight:700;color:${m.status==='done'?'#ffd700':'#333'};text-align:center;width:30px;">${scoreStr(m)}</td>
        <td style="padding:1px 4px;font-size:8px;color:#888;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.away}</td>
        ${user&&t?`<td style="padding:1px 4px;font-size:8px;color:${tc||'#555'};text-align:right;white-space:nowrap;">${t.home}:${t.away}</td>`:''}
      </tr>`;
    }).join('');

    return `<div style="width:205px;background:#111;border:1px solid #2a2a2a;border-radius:7px;overflow:hidden;flex-shrink:0;">
      <div style="background:linear-gradient(135deg,#1a1200,#0d0d0d);border-bottom:2px solid #ffd700;padding:5px 8px;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:10px;font-weight:800;color:#ffd700;letter-spacing:1px;">GRUPPE ${g}</span>
        <div style="display:flex;gap:2px;">${teams.slice(0,4).map(t=>fl(t,17,11)).join('')}</div>
      </div>
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr style="background:#0a0a0a;">
          <th style="padding:2px 4px;font-size:8px;color:#444;text-align:left;width:12px;">#</th>
          <th style="padding:2px 2px;width:20px;"></th>
          <th style="padding:2px 4px;font-size:8px;color:#444;text-align:left;">Team</th>
          <th style="padding:2px 4px;font-size:8px;color:#444;text-align:center;width:16px;">Sp</th>
          <th style="padding:2px 4px;font-size:8px;color:#444;text-align:center;width:20px;">Pkt</th>
        </tr></thead>
        <tbody>${sorted.map((t,i)=>`<tr style="border-bottom:1px solid #161616;">
          <td style="padding:2px 4px;font-size:9px;color:${i<2?'#ffd700':'#555'};text-align:center;">${i+1}</td>
          <td style="padding:2px 2px;">${fl(t,17,11)}</td>
          <td style="padding:2px 4px;font-size:9px;color:#bbb;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70px;">${t}</td>
          <td style="padding:2px 4px;font-size:9px;color:#555;text-align:center;">${st[t].sp}</td>
          <td style="padding:2px 4px;font-size:10px;font-weight:700;color:${i<2?'#ffd700':'#888'};text-align:center;">${st[t].pts}</td>
        </tr>`).join('')}</tbody>
      </table>
      <div style="background:#0a0a0a;border-top:1px solid #1a1a1a;">
        <table style="width:100%;border-collapse:collapse;"><tbody>${spielRows}</tbody></table>
      </div>
    </div>`;
  }

  const sf=getByGroup('SF'),af=getByGroup('AF'),vf=getByGroup('VF');
  const hf=getByGroup('HF'),p3=getByGroup('P3'),fin=getByGroup('FIN');
  const finale=fin[0];
  const isDone=finale&&finale.status==='done'&&finale.home_score!==null;
  const winner=isDone?(finale.home_score>finale.away_score?finale.home:finale.away):'';
  const sfL=sf.slice(0,8),sfR=sf.slice(8);
  const afL=af.slice(0,4),afR=af.slice(4);
  const vfL=vf.slice(0,2),vfR=vf.slice(2);
  const hfL=hf.slice(0,1),hfR=hf.slice(1);
  const gL=['A','B','C','D','E','F'],gR=['G','H','I','J','K','L'];

  function scoreStr2(m){ return scoreStr(m); }

  const finaleCard=`<div style="flex-shrink:0;width:180px;display:flex;align-items:center;">
    <div style="background:linear-gradient(180deg,#1a1200,#0d0d0d);border:2px solid #ffd700;border-radius:10px;padding:12px;text-align:center;width:100%;">
      <div style="font-size:8px;letter-spacing:3px;color:#ffd700;font-weight:800;margin-bottom:4px;">🏆 FINALE</div>
      <div style="font-size:8px;color:#444;margin-bottom:8px;">19. Juli 2026 · New York</div>
      ${finale?`<div style="background:#0d0d0d;border:1px solid #2a2a2a;border-radius:5px;overflow:hidden;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:4px;padding:5px 7px;border-bottom:1px solid #1a1a1a;${isDone&&finale.home_score>finale.away_score?'background:#0d1a0d;':''}">
          ${fl(finale.home,22,15)}<span style="flex:1;font-size:10px;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${finale.home||'?'}</span>
          <span style="font-size:13px;font-weight:800;color:#ffd700;">${isDone?finale.home_score:''}</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px;padding:5px 7px;${isDone&&finale.away_score>finale.home_score?'background:#0d1a0d;':''}">
          ${fl(finale.away,22,15)}<span style="flex:1;font-size:10px;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${finale.away||'?'}</span>
          <span style="font-size:13px;font-weight:800;color:#ffd700;">${isDone?finale.away_score:''}</span>
        </div>
      </div>
      ${isDone?`<div style="background:#ffd700;color:#000;padding:6px;border-radius:5px;font-size:9px;font-weight:900;">🏆 ${winner}</div>`
      :`<div style="border:1px dashed #ffd700;color:#ffd700;padding:6px;border-radius:5px;font-size:8px;letter-spacing:1px;">WELTMEISTER 2026</div>`}`
      :`<div style="color:#333;font-size:11px;padding:10px;">Ausstehend</div>`}
      ${p3[0]?`<div style="margin-top:8px;padding-top:7px;border-top:1px solid #1a1a1a;">
        <div style="font-size:7px;color:#444;margin-bottom:3px;">🥉 Platz 3 · 18. Juli</div>
        <div style="font-size:8px;color:#666;">${p3[0].home||'?'} – ${p3[0].away||'?'}</div>
        <div style="font-size:9px;font-weight:700;color:#ffd700;">${scoreStr(p3[0])}</div>
      </div>`:''}
    </div>
  </div>`;

  // Legend
  const legend = user ? `<div style="display:flex;gap:10px;align-items:center;padding:8px 16px;background:#0d0d0d;border-bottom:1px solid #1a1a1a;font-size:10px;flex-wrap:wrap;">
    <span style="color:#666;">Deine Tipps:</span>
    <span style="color:#16a34a;">✅ Exakt (3 Pkt)</span>
    <span style="color:#ea580c;">🟠 Tendenz (1 Pkt)</span>
    <span style="color:#cc0000;">❌ Falsch (0 Pkt)</span>
    <span style="color:#3b82f6;">💙 Getippt</span>
  </div>` : '';

  // KO column helper
  function koCol(items, label, marginTop=0, gap=5){
    return `<div style="flex-shrink:0;width:152px;">
      <div style="font-size:7px;font-weight:800;color:#ffd700;letter-spacing:2px;text-align:center;margin-bottom:5px;text-transform:uppercase;">${label}</div>
      <div style="display:flex;flex-direction:column;gap:${gap}px;margin-top:${marginTop}px;">
        ${items.map(m=>card(m,152)).join('')}
      </div>
    </div>`;
  }

  function koColSpaced(items, label, marginTop=0, spaceBetween=0){
    return `<div style="flex-shrink:0;width:152px;">
      <div style="font-size:7px;font-weight:800;color:#ffd700;letter-spacing:2px;text-align:center;margin-bottom:5px;text-transform:uppercase;">${label}</div>
      <div style="margin-top:${marginTop}px;">
        ${items.map((m,i)=>`<div>${card(m,152)}${i<items.length-1?`<div style="height:${spaceBetween}px;"></div>`:''}</div>`).join('')}
      </div>
    </div>`;
  }

  const sep = (w=6)=>`<div style="width:${w}px;flex-shrink:0;"></div>`;

  // Mobile runde
  function mobileRunde(label, date, items){
    if(!items.length) return '';
    return `<div style="background:#111;border:1px solid #2a2a2a;border-radius:8px;margin-bottom:10px;overflow:hidden;">
      <div style="background:linear-gradient(135deg,#1a1200,#0d0d0d);border-bottom:2px solid #ffd700;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:12px;font-weight:700;color:#ffd700;">${label}</span>
        <span style="font-size:10px;color:#555;">${date}</span>
      </div>
      <div style="padding:8px;display:flex;flex-wrap:wrap;gap:6px;">
        ${items.map(m=>card(m,160)).join('')}
      </div>
    </div>`;
  }

  return `<div style="background:#0a0a0a;min-height:calc(100vh - 100px);">
    ${legend}
    <div style="text-align:center;padding:12px 16px 8px;border-bottom:1px solid #1a1a1a;">
      <div style="font-size:9px;letter-spacing:4px;color:#cc0000;font-weight:700;text-transform:uppercase;margin-bottom:2px;">Fanclub Manelo98</div>
      <h2 style="font-size:clamp(16px,3vw,22px);font-weight:900;color:#fff;margin:0;">FUSSBALL WM 2026 <span style="color:#ffd700;">— SPIELBAUM</span></h2>
      <p style="color:#444;font-size:11px;margin:3px 0 0;">Alle 104 Spiele · Gruppenphase · K.O.-Runde · Finale</p>
      <div style="display:flex;justify-content:center;margin-top:6px;">
        <div style="width:40px;height:3px;background:#000;border:1px solid #222;"></div>
        <div style="width:40px;height:3px;background:#cc0000;"></div>
        <div style="width:40px;height:3px;background:#ffd700;"></div>
      </div>
    </div>

    <!-- DESKTOP: horizontal bracket -->
    <div id="sb-d" style="display:flex;align-items:flex-start;gap:6px;overflow-x:auto;overflow-y:visible;padding:14px 16px 20px;scrollbar-width:thin;scrollbar-color:#ffd700 #1a1a1a;-webkit-overflow-scrolling:touch;">

      <!-- GRUPPEN L -->
      <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
        ${gL.map(g=>gruppeCard(g)).join('')}
      </div>
      ${sep(10)}

      <!-- SF L -->
      ${koCol(sfL,'Sechzehntelfinale',0,5)}
      ${sep()}

      <!-- AF L: 4 spiele, jedes zwischen 2 SF -->
      ${koColSpaced(afL,'Achtelfinale',28,28)}
      ${sep()}

      <!-- VF L: 2 spiele -->
      ${koColSpaced(vfL,'Viertelfinale',83,88)}
      ${sep()}

      <!-- HF L: 1 spiel -->
      ${koCol(hfL,'Halbfinale',193)}
      ${sep(10)}

      <!-- FINALE -->
      ${finaleCard}
      ${sep(10)}

      <!-- HF R -->
      ${koCol(hfR,'Halbfinale',193)}
      ${sep()}

      <!-- VF R -->
      ${koColSpaced(vfR,'Viertelfinale',83,88)}
      ${sep()}

      <!-- AF R -->
      ${koColSpaced(afR,'Achtelfinale',28,28)}
      ${sep()}

      <!-- SF R -->
      ${koCol(sfR,'Sechzehntelfinale',0,5)}
      ${sep(10)}

      <!-- GRUPPEN R -->
      <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0;">
        ${gR.map(g=>gruppeCard(g)).join('')}
      </div>
    </div>

    <!-- MOBILE: vertical -->
    <div id="sb-m" style="display:none;padding:10px;">
      <div style="background:#111;border:2px solid #ffd700;border-radius:10px;padding:14px;text-align:center;margin-bottom:12px;">
        <div style="font-size:9px;letter-spacing:3px;color:#ffd700;font-weight:800;margin-bottom:6px;">🏆 FINALE · 19. Juli 2026</div>
        ${finale?`<div style="background:#0d0d0d;border:1px solid #2a2a2a;border-radius:6px;overflow:hidden;margin-bottom:8px;max-width:280px;margin-left:auto;margin-right:auto;">
          <div style="display:flex;align-items:center;gap:6px;padding:7px 10px;border-bottom:1px solid #1a1a1a;">
            ${fl(finale.home,24,16)}<span style="flex:1;font-size:12px;color:#ddd;">${finale.home||'?'}</span>
            <span style="font-size:15px;font-weight:800;color:#ffd700;">${isDone?finale.home_score:''}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;padding:7px 10px;">
            ${fl(finale.away,24,16)}<span style="flex:1;font-size:12px;color:#ddd;">${finale.away||'?'}</span>
            <span style="font-size:15px;font-weight:800;color:#ffd700;">${isDone?finale.away_score:''}</span>
          </div>
        </div>
        ${isDone?`<div style="background:#ffd700;color:#000;padding:8px;border-radius:6px;font-size:12px;font-weight:900;display:inline-block;">🏆 ${winner}</div>`
        :`<div style="border:1px dashed #ffd700;color:#ffd700;padding:8px;border-radius:6px;font-size:10px;letter-spacing:1px;display:inline-block;">WELTMEISTER 2026</div>`}`
        :`<div style="color:#333;">Ausstehend</div>`}
      </div>
      ${p3.length?mobileRunde('🥉 Platz 3','18. Juli',p3):''}
      ${mobileRunde('Halbfinale','14.–15. Juli',hf)}
      ${mobileRunde('Viertelfinale','9.–11. Juli',vf)}
      ${mobileRunde('Achtelfinale','4.–8. Juli',af)}
      ${mobileRunde('Sechzehntelfinale','28. Juni–4. Juli',sf)}
      <div style="background:#111;border:1px solid #2a2a2a;border-radius:8px;overflow:hidden;">
        <div style="background:linear-gradient(135deg,#1a1200,#0d0d0d);border-bottom:2px solid #ffd700;padding:8px 12px;">
          <span style="font-size:12px;font-weight:700;color:#ffd700;">📋 Gruppenphase</span>
        </div>
        <div style="padding:8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">
          ${[...gL,...gR].map(g=>gruppeCard(g)).join('')}
        </div>
      </div>
    </div>

  </div>`;
}

// Spielbaum responsive toggle
function updateSpielbaum(){
  var d=document.getElementById('sb-desktop');
  var m=document.getElementById('sb-mobile');
  if(!d||!m)return;
  if(window.innerWidth<1100){d.style.display='none';m.style.display='block';}
  else{d.style.display='flex';m.style.display='none';}
}
window.addEventListener('resize', updateSpielbaum);
var _origRender=render;
render=function(){_origRender();setTimeout(updateSpielbaum,10);};

init();
